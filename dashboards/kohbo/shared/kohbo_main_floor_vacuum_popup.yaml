type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#main_floor_vacuum'
    close_by_clicking_outside: false
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml

  - type: custom:button-card
    template: kohbo_page_title
    name: Main Vacuum

  # 
  # Quick Actions
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:horizontal-layout
      layout:
        # grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
      cards:
        - type: horizontal-stack
          cards:            
            - type: custom:mushroom-chips-card
              chips:
                # - type: conditional
                #   conditions:
                #     - entity: vacuum.roborock_s7
                #       state: 'docked'
                #   chip:
                #     type: template
                #     card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                #     # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                #     # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                #     content: "{{ states(entity) }}"
                #     icon: mdi:play
                #     # entity: vacuum.roborock_s7
                #     tap_action:
                #       action: perform-action
                #       perform_action: vacuum.start
                #       data:
                #         entity_id: vacuum.roborock_s7
                # 
                # Pause Cleaning (if running)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'cleaning'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                    # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                    icon: mdi:pause
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.pause
                      data:
                        entity_id: vacuum.roborock_s7
                # 
                # Resume Cleaning (if paused)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'paused'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                    # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                    icon: mdi:play
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.start
                      data:
                        entity_id: vacuum.roborock_s7
                # 
                # Return to Dock (if cleaning)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 
                        - 'cleaning'
                        - 'paused'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                    # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                    icon: mdi:robot-vacuum-off
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.return_to_base
                      data:
                        entity_id: vacuum.roborock_s7
                # 
                # Clean Kitchen & Family (if docked)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    content: "Kitchen & Family"
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.send_command
                      data:
                        entity_id: vacuum.roborock_s7
                        command: app_segment_clean
                        params: [24, 26]

                # 
                # Clean Main Living (if docked)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    content: "Dining & Foyer"
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.send_command
                      data:
                        entity_id: vacuum.roborock_s7
                        command: app_segment_clean
                        params: [20, 23]

                # 
                # Clean Office (if docked)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    content: "Office"
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.send_command
                      data:
                        entity_id: vacuum.roborock_s7
                        command: app_segment_clean
                        params: [29]

  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --vertical-stack-card-gap: 8px;
        }
    cards:
      - type: custom:button-card
        entity: vacuum.roborock_s7
        label: Vacuum Status
        icon: |
          [[[
            if (entity.state == "docked")
              return "mdi:robot-vacuum-off"
            else if (entity.state == "cleaning")
              return "mdi:robot-vacuum"
            else
              return "mdi:robot-vacuum-off"
          ]]]
        show_state: true
        # state_display: |
        #   [[[
        #     if (entity.state == "Partially Secure")
        #       return "Home Partial Secure"
        #     else if (entity.state == "Totally Secure")
        #       return "Home Secure"
        #     else
        #       return "Home Vulnerable"
        #   ]]]
        show_icon: true
        show_name: false
        show_label: true
        layout: icon_name_state
        # tap_action:
        #   action: navigate
        #   navigation_path: '/dashboard-kohbo/security'
        styles:
          card:
            - background: transparent
            - backdrop-filter: none
            - -webkit-backdrop-filter: none
            - padding: 20px 20px 12px 20px
            - box-shadow: none
            - display: flex
            - align-items: center
            - justify-content: flex-start
            - gap: 12px
            - border: none
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: min-content 1fr
            - align-items: center
          icon:
            - color: >
                [[[
                  return entity.state === 'docked' ? '#06D6A0' : '#FFD166';
                ]]]
            - width: 38px
            - height: 38px
            - margin-right: 15px
          name:
            - font-size: 20px
            - font-weight: regular
            - color: white
            - justify-self: start
            - margin-bottom: 4px;
          label:
            - font-size: 12px
            - color: "#CED4DA"
            - justify-self: start


      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          # Battery level
          - type: custom:button-card
            entity: vacuum.roborock_s7
            name: Battery Level
            template: kohbo_security_item
            icon: mdi:battery
            state_display: |
              [[[
                return entity.attributes.battery_level + '%'
              ]]]
            state:
              - operator: template
                value:  "[[[ return Math.round(parseFloat(entity.attributes.battery_level)) <= 20 ]]]"
                color: var(--error-color)
              # - operator: template
              #   value:  "[[[ return Math.round(parseFloat(entity.attributes.battery_level)) >= 60 ]]]"
              #   color: var(--success-color)
              - operator: template
                value:  "[[[ return Math.round(parseFloat(entity.attributes.battery_level)) > 20 && Math.round(parseFloat(entity.attributes.battery_level)) < 60 ]]]"
                color: var(--warning-color)
          # Cleaning Area
          - type: custom:button-card
            entity: sensor.roborock_s7_current_clean_area
            name: Cleaning Area
            template: kohbo_security_item
            icon: mdi:map-marker-outline
            color: var(--light-grey-color)
          # Cleaning Time
          - type: custom:button-card
            entity: sensor.roborock_s7_last_clean_duration
            name: Cleaning Time
            template: kohbo_security_item
            icon: mdi:timer-outline
            color: var(--light-grey-color)

          # # Water level
          # - type: custom:button-card
          #   entity: binary_sensor.roborock_s7_water_shortage
          #   name: Water Level
          #   template: kohbo_security_item
          #   state:
          #     - value: "on"
          #       color: var(--error-color)
          #     - value: "off"
          #       color: var(--success-color)

          # # Filter life
          # - type: custom:button-card
          #   entity: sensor.roborock_s7_filter_left
          #   name: Filter Life
          #   template: kohbo_security_item
          #   state_display: |
          #     [[[
          #       return Math.round(parseFloat(entity.state) / 3600) + ' h';
          #     ]]]
          #   state:
          #     - operator: '<'
          #       value: 5000
          #       color: var(--error-color)
          #     - operator: '>'
          #       value: 5000
          #       color: var(--success-color)

          # # Sensors
          # - type: custom:button-card
          #   entity: sensor.roborock_s7_sensor_dirty_left
          #   name: Sensors
          #   template: kohbo_security_item
          #   state_display: |
          #     [[[
          #       return Math.round(parseFloat(entity.state) / 3600) + ' h';
          #     ]]]
          #   state:
          #     - operator: '<'
          #       value: 5000
          #       color: var(--error-color)
          #     - operator: '>'
          #       value: 5000
          #       color: var(--success-color)

   #
  
  # Vacuum Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # Main Brush
      - type: custom:template-entity-row
        entity: sensor.roborock_s7_main_brush_left
        icon: mdi:brush-variant
        name: Main Brush
        state: "{{ (states[config.entity].state | float(0) / 3600) | int }} h"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set main_brush_left = states[config.entity].state | int(0) %}
          {% if main_brush_left > 100000 %}
            var(--success-color)
          {% else %}
            var(--error-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # Side Brush
      - type: custom:template-entity-row
        entity: sensor.roborock_s7_side_brush_left
        icon: mdi:brush-variant
        name: Side Brush
        state: "{{ (states[config.entity].state | float(0) / 3600) | int }} h"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set main_brush_left = states[config.entity].state | int(0) %}
          {% if main_brush_left > 100000 %}
            var(--success-color)
          {% else %}
            var(--error-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      


