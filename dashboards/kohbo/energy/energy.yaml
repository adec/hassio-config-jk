type: custom:vertical-layout
title: Energy
path: energy
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: top_toolbar
    variables:
      - cards:
        - type: custom:button-card
          template: empty_column

        # Room Name
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Energy

        # Settings button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:dots-horizontal
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#energy_settings_popup'


  #===========================================================================
  # SECTION 1: TODAY'S ENERGY OVERVIEW
  #===========================================================================

  #---------------------------------------------------------------------------
  # Energy Hero Card - Usage Trend + Price (Security Overview Style)
  #---------------------------------------------------------------------------
  - type: custom:stack-in-card
    # card_mod:
    #   style: |
    #     :host {
    #       --keep-border_radius: 'true';
    #       --keep-background: 'true';
    #       --stack-card-gap: 0px !important;
    #     }
    # keep:
    #   border_radius: true
    #   background: true
    cards:
      #
      # TOP ROW: Usage Status Header (Security Overview Style)
      #
      - type: custom:button-card
        template: security_overview_header
        entity: sensor.energy_usage_trend_label
        show_icon: true
        show_name: false
        # show_state: true
        show_label: true
        label: Energy Overview
        layout: icon_name_state
        icon: |
          [[[
            const tier = entity?.attributes?.tier || 'normal';
            if (tier === 'very_high') return 'mdi:alert-circle';
            if (tier === 'high') return 'mdi:trending-up';
            if (tier === 'very_low' || tier === 'low') return 'mdi:leaf';
            return 'mdi:lightning-bolt';
          ]]]
        styles:
          icon:
            - color: |
                [[[
                  return entity?.attributes?.color || '#FFD166';
                ]]]
        custom_fields:
          score:
            card:
              type: custom:button-card
              entity: sensor.comed_current_hour_average_price
              show_icon: false
              show_state: true
              show_name: false
              state_display: |
                [[[
                  const price = parseFloat(states['sensor.comed_current_hour_average_price']?.state || 0);
                  return `${Math.round(price)}¢`;
                ]]]
              styles:
                card:
                  - background-color: 'var(--darker-primary-color)'
                  - border-radius: '25px'
                  - padding: '10px 3px'
                  - width: '42px'
                  - height: '42px'
                  - align-items: 'center'
                  - display: 'flex'
                  - background: |
                      [[[
                        const price = parseFloat(states['sensor.comed_current_hour_average_price']?.state || 0);
                        const pct = Math.min(100, (price / 12) * 100);
                        const color = states['sensor.energy_price_tier']?.attributes?.color || 'var(--accent-color)';
                        return `radial-gradient(var(--dark-primary-color) 60%, transparent calc(60% + 1px)), conic-gradient(${color} ${pct}% 0%, var(--divider-color) 0% 100%)`;
                      ]]]
                  - position: 'relative'
                state:
                  - font-size: '14px'
                  - color: 'var(--primary-text-color)'

      #
      # BOTTOM SECTION: Stats + Chart (Dark Background)
      #
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
            
            ha-card {
              background: var(--darker-primary-color);
              border-radius: 0;
              box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.05);
              padding-bottom: 20px !important;
            }
        cards:
          #
          # Stats Row: Real Time | Today | Forecast
          #
          - type: custom:stack-in-card
            mode: horizontal
            card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
            cards:
              # Real Time Power
              - type: custom:button-card
                template: kohbo_energy_stat_bar
                entity: sensor.energy_current_consumption
                name: Real Time
                state_display: |
                  [[[
                    const watts = parseFloat(entity?.state || 0);
                    if (watts >= 1000) {
                      return (watts / 1000).toFixed(1);
                    }
                    return Math.round(watts);
                  ]]]
                variables:
                  unit_label: |
                    [[[
                      const watts = parseFloat(states['sensor.energy_current_consumption']?.state || 0);
                      return watts >= 1000 ? 'kW' : 'W';
                    ]]]
                  show_divider: true
                  bar_mode: realtime
              
              # Today (actual usage so far)
              - type: custom:button-card
                template: kohbo_energy_stat_bar
                entity: sensor.whole_home_energy_daily_usage
                name: Today
                state_display: |
                  [[[
                    return parseFloat(entity?.state || 0).toFixed(1);
                  ]]]
                variables:
                  unit_label: kWh
                  show_divider: true
                  bar_mode: today

              # Forecast (EOD prediction)
              - type: custom:button-card
                template: kohbo_energy_stat_bar
                entity: sensor.energy_forecast_end_of_day
                name: Forecast
                state_display: |
                  [[[
                    return parseFloat(entity?.state || 0).toFixed(1);
                  ]]]
                variables:
                  unit_label: kWh
                  show_divider: false
                  bar_mode: forecast

          #
          # 24h CHART: Actual + Forecast + Price
          #
          - type: custom:apexcharts-card
            experimental:
              color_threshold: true
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  border-radius: 0;
                  backdrop-filter: none;
                  -webkit-backdrop-filter: none;
                  box-shadow: none;
                  border: none;
                  padding-bottom: 16px;
                }
                .apexcharts-legend {
                  padding: 0 !important;
                  margin: 0 !important;
                  margin-top: 10px !important;
                  display: flex !important;
                  flex-direction: row !important;
                  flex-wrap: wrap !important;
                  justify-content: center !important;
                }
                .apexcharts-legend-group {
                  display: contents !important;
                }
                .apexcharts-legend-series {
                  display: inline-flex !important;
                  margin: 0 8px !important;
                }
            graph_span: 24h
            span:
              start: day
            header:
              show: false
            apex_config:
              chart:
                height: 200
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              legend:
                show: true
                position: bottom
                horizontalAlign: center
                floating: false
                fontSize: '11px'
                markers:
                  width: 8
                  height: 8
                itemMargin:
                  horizontal: 16
                  vertical: 0
              xaxis:
                labels:
                  format: 'HH'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - id: energy
                  seriesName: Actual
                  min: 0
                  forceNiceScale: true
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${val.toFixed(1)}` : '0'
                - id: energy2
                  seriesName: Forecast
                  show: false
                  min: 0
                  forceNiceScale: true
                - id: price
                  seriesName: Price
                  opposite: true
                  min: 0
                  max: 12
                  tickAmount: 4
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => `${Math.round(val)}¢`
              tooltip:
                x:
                  format: 'HH:mm'
            series:
              # Actual hourly usage (bars)
              # Using utility meter which handles daily cycles properly
              - entity: sensor.whole_home_energy_daily_usage
                type: column
                name: Actual
                unit: kWh
                group_by:
                  func: diff
                  duration: 1h
                color_threshold:
                  - value: 0
                    color: var(--success-color)
                  - value: 0.5
                    color: var(--accent-color)
                  - value: 1.0
                    color: var(--orange-color)
                  - value: 1.5
                    color: var(--error-color)
                yaxis_id: energy
                show:
                  extremas: false
                  in_header: true
                  legend_value: true
              
              # Hourly forecast (dynamic - adjusted for today's pace)
              - entity: sensor.energy_hourly_forecast_json
                type: line
                name: Forecast
                color: var(--accent-color)
                unit: kWh
                stroke_width: 2
                curve: smooth
                yaxis_id: energy2
                extend_to: end
                float_precision: 2
                show:
                  extremas: false
                  in_header: true
                  legend_value: true
                data_generator: |
                  let forecasts = entity.attributes.forecasts || [];
                  // Parse JSON string if needed
                  if (typeof forecasts === 'string') {
                    try {
                      forecasts = JSON.parse(forecasts);
                    } catch (e) {
                      forecasts = [];
                    }
                  }
                  const now = new Date();
                  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                  const data = [];
                  for (let h = 0; h < 24; h++) {
                    const timestamp = new Date(startOfDay.getTime() + h * 3600000);
                    const value = parseFloat(forecasts[h]) || 0;
                    data.push([timestamp.getTime(), value]);
                  }
                  return data;
              
              # Energy price (line on secondary axis)
              - entity: sensor.comed_current_hour_average_price
                type: line
                name: Price
                color: var(--light-primary-color)
                unit: ¢
                stroke_width: 2
                curve: stepline
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 1h
                show:
                  extremas: false
                  in_header: true
                  legend_value: true




  #===========================================================================
  # SECTION 3: ENERGY HISTORY - Period Comparisons & Trends
  #===========================================================================

  - type: custom:stack-in-card
    card_mod:
      style: |
        ha-card {
          background: var(--darker-primary-color);
        }
    cards:
      #-----------------------------------------------------------------------
      # Section Header
      #-----------------------------------------------------------------------
      - type: custom:button-card
        show_icon: false
        show_state: false
        show_name: true
        name: Energy History
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - padding: 16px 16px 8px
          name:
            - font-size: 12px
            - font-weight: 600
            - color: var(--secondary-text-color)
            - text-transform: uppercase
            - letter-spacing: 0.5px
            - justify-self: start
        tap_action:
          action: none

      #-----------------------------------------------------------------------
      # Comparison Cards: Today | This Week | This Month
      # Uses dividers like the top section
      #-----------------------------------------------------------------------
      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            ha-card {
              background: transparent;
              box-shadow: none;
              padding: 0 0 8px;
            }
        cards:
          # TODAY Card
          - type: custom:button-card
            template: kohbo_energy_stat_comparison
            entity: sensor.whole_home_energy_daily_usage
            name: Today
            variables:
              comparison_type: daily
              comparison_label: vs avg
              show_divider: true

          # THIS WEEK Card
          - type: custom:button-card
            template: kohbo_energy_stat_comparison
            entity: sensor.whole_home_energy_weekly_usage
            name: This Week
            variables:
              comparison_type: weekly
              comparison_label: vs last
              show_divider: true

          # THIS MONTH Card
          - type: custom:button-card
            template: kohbo_energy_stat_comparison
            entity: sensor.whole_home_energy_monthly_usage
            name: This Month
            variables:
              comparison_type: monthly
              comparison_label: vs last
              show_divider: false

      #-----------------------------------------------------------------------
      # Timeframe Tabs
      #-----------------------------------------------------------------------
      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            ha-card {
              background: rgba(0,0,0,0.2);
              border-radius: 20px;
              margin: 8px 16px;
              padding: 3px;
              box-shadow: none;
            }
        cards:
          - type: custom:button-card
            entity: input_select.energy_history_timeframe
            name: Week
            show_icon: false
            show_state: false
            styles:
              card:
                - background: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'This Week' ? 'var(--accent-color)' : 'transparent';
                    ]]]
                - border-radius: 16px
                - padding: 6px 2px
                - box-shadow: none
              name:
                - font-size: 12px
                - font-weight: 500
                - color: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'This Week' ? 'var(--dark-primary-color)' : 'var(--secondary-text-color)';
                    ]]]
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.energy_history_timeframe
                option: This Week

          - type: custom:button-card
            entity: input_select.energy_history_timeframe
            name: 30 Days
            show_icon: false
            show_state: false
            styles:
              card:
                - background: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'Past 30 Days' ? 'var(--accent-color)' : 'transparent';
                    ]]]
                - border-radius: 16px
                - padding: 6px 2px
                - box-shadow: none
              name:
                - font-size: 12px
                - font-weight: 500
                - color: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'Past 30 Days' ? 'var(--dark-primary-color)' : 'var(--secondary-text-color)';
                    ]]]
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.energy_history_timeframe
                option: Past 30 Days

          - type: custom:button-card
            entity: input_select.energy_history_timeframe
            name: Weekly
            show_icon: false
            show_state: false
            styles:
              card:
                - background: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'Weekly' ? 'var(--accent-color)' : 'transparent';
                    ]]]
                - border-radius: 16px
                - padding: 6px 2px
                - box-shadow: none
              name:
                - font-size: 12px
                - font-weight: 500
                - color: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'Weekly' ? 'var(--dark-primary-color)' : 'var(--secondary-text-color)';
                    ]]]
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.energy_history_timeframe
                option: Weekly

          - type: custom:button-card
            entity: input_select.energy_history_timeframe
            name: Monthly
            show_icon: false
            show_state: false
            styles:
              card:
                - background: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'Monthly' ? 'var(--accent-color)' : 'transparent';
                    ]]]
                - border-radius: 16px
                - padding: 6px 2px
                - box-shadow: none
              name:
                - font-size: 12px
                - font-weight: 500
                - color: |
                    [[[
                      const state = states['input_select.energy_history_timeframe']?.state || 'This Week';
                      return state === 'Monthly' ? 'var(--dark-primary-color)' : 'var(--secondary-text-color)';
                    ]]]
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.energy_history_timeframe
                option: Monthly

      #-----------------------------------------------------------------------
      # Chart - Switches based on selected timeframe
      #-----------------------------------------------------------------------
      - type: custom:state-switch
        entity: input_select.energy_history_timeframe
        default: This Week
        states:
          #--- This Week (7 days, daily bars) ---
          "This Week":
            type: custom:apexcharts-card
            experimental:
              color_threshold: true
            graph_span: 7d
            span:
              end: day
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  border: none;
                }
            header:
              show: false
            apex_config:
              chart:
                height: 160
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              xaxis:
                labels:
                  format: 'ddd'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - min: 0
                  forceNiceScale: true
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${val.toFixed(0)}` : '0'
              legend:
                show: false
              tooltip:
                x:
                  format: 'ddd MMM d'
            series:
              - entity: sensor.daily_energy_consumption
                type: column
                name: Daily Usage
                statistics:
                  type: change
                  period: day
                  align: start
                color_threshold:
                  - value: 0
                    color: var(--success-color)
                  - value: 10
                    color: var(--accent-color)
                  - value: 15
                    color: var(--orange-color)
                  - value: 20
                    color: var(--error-color)

          #--- Past 30 Days (daily bars) ---
          "Past 30 Days":
            type: custom:apexcharts-card
            experimental:
              color_threshold: true
            graph_span: 30d
            span:
              end: day
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  border: none;
                }
            header:
              show: false
            apex_config:
              chart:
                height: 160
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              xaxis:
                labels:
                  format: 'MMM d'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - min: 0
                  forceNiceScale: true
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${val.toFixed(0)}` : '0'
              legend:
                show: false
              tooltip:
                x:
                  format: 'ddd MMM d'
            series:
              - entity: sensor.daily_energy_consumption
                type: column
                name: Daily Usage
                statistics:
                  type: change
                  period: day
                  align: start
                color_threshold:
                  - value: 0
                    color: var(--success-color)
                  - value: 10
                    color: var(--accent-color)
                  - value: 15
                    color: var(--orange-color)
                  - value: 20
                    color: var(--error-color)

          #--- Weekly (12 weeks, weekly aggregated bars) ---
          "Weekly":
            type: custom:apexcharts-card
            experimental:
              color_threshold: true
            graph_span: 12w
            span:
              end: week
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  border: none;
                }
            header:
              show: false
            apex_config:
              chart:
                height: 160
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              xaxis:
                labels:
                  format: 'MMM d'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - min: 0
                  forceNiceScale: true
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${val.toFixed(0)}` : '0'
              legend:
                show: false
              tooltip:
                x:
                  format: "'Week of' MMM d"
            series:
              - entity: sensor.daily_energy_consumption
                type: column
                name: Weekly Usage
                statistics:
                  type: change
                  period: week
                  align: start
                color_threshold:
                  - value: 0
                    color: var(--success-color)
                  - value: 70
                    color: var(--accent-color)
                  - value: 105
                    color: var(--orange-color)
                  - value: 140
                    color: var(--error-color)

          #--- Monthly (12 months, monthly aggregated bars) ---
          "Monthly":
            type: custom:apexcharts-card
            experimental:
              color_threshold: true
            graph_span: 12M
            span:
              end: month
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  box-shadow: none;
                  border: none;
                }
            header:
              show: false
            apex_config:
              chart:
                height: 160
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              xaxis:
                labels:
                  format: 'MMM'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - min: 0
                  forceNiceScale: true
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${val.toFixed(0)}` : '0'
              legend:
                show: false
              tooltip:
                x:
                  format: 'MMMM yyyy'
            series:
              - entity: sensor.daily_energy_consumption
                type: column
                name: Monthly Usage
                statistics:
                  type: change
                  period: month
                  align: start
                color_threshold:
                  - value: 0
                    color: var(--success-color)
                  - value: 300
                    color: var(--accent-color)
                  - value: 450
                    color: var(--orange-color)
                  - value: 600
                    color: var(--error-color)

      #-----------------------------------------------------------------------
      # Progress Bar Row: Week & Month at a glance
      #-----------------------------------------------------------------------
      - type: custom:stack-in-card
        mode: horizontal
        card_mod:
          style: |
            ha-card {
              background: transparent;
              padding: 8px 16px 16px;
            }
        cards:
          # Weekly Progress
          - type: custom:button-card
            entity: sensor.whole_home_energy_weekly_usage
            name: This Week
            show_icon: false
            show_state: true
            show_name: true
            state_display: |
              [[[
                return parseFloat(entity?.state || 0).toFixed(1) + ' kWh';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"n s" "b b"'
                - grid-template-columns: 1fr auto
              card:
                - background: transparent
                - padding: 8px
                - box-shadow: none
              name:
                - font-size: 11px
                - font-weight: 600
                - color: var(--secondary-text-color)
                - text-align: left
                - justify-self: start
              state:
                - font-size: 11px
                - font-weight: 600
                - color: var(--primary-text-color)
                - text-align: right
                - justify-self: end
              custom_fields:
                b:
                  - margin-top: 6px
                  - display: flex
                  - gap: 2px
                  - height: 5px
                  - width: 100%
            custom_fields:
              b: |
                [[[
                  const weekly = parseFloat(states['sensor.whole_home_energy_weekly_usage']?.state || 0);
                  const target = 100;
                  const pct = Math.min((weekly / target) * 100, 100);
                  let color = 'var(--success-color)';
                  if (weekly > 70) color = 'var(--accent-color)';
                  if (weekly > 105) color = 'var(--orange-color)';
                  if (weekly > 140) color = 'var(--error-color)';
                  const empty = 'var(--divider-color)';
                  let output = '<div style="display:flex;gap:2px;width:100%;height:5px;">';
                  for (let i = 1; i <= 10; i++) {
                    const filled = pct >= (i * 10);
                    const bg = filled ? color : empty;
                    output += `<div style="flex:1;height:100%;border-radius:2px;background:${bg};"></div>`;
                  }
                  output += '</div>';
                  return output;
                ]]]

          # Monthly Progress
          - type: custom:button-card
            entity: sensor.whole_home_energy_monthly_usage
            name: This Month
            show_icon: false
            show_state: true
            show_name: true
            state_display: |
              [[[
                return parseFloat(entity?.state || 0).toFixed(1) + ' kWh';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"n s" "b b"'
                - grid-template-columns: 1fr auto
              card:
                - background: transparent
                - padding: 8px
                - box-shadow: none
              name:
                - font-size: 11px
                - font-weight: 600
                - color: var(--secondary-text-color)
                - text-align: left
                - justify-self: start
              state:
                - font-size: 11px
                - font-weight: 600
                - color: var(--primary-text-color)
                - text-align: right
                - justify-self: end
              custom_fields:
                b:
                  - margin-top: 6px
                  - display: flex
                  - gap: 2px
                  - height: 5px
                  - width: 100%
            custom_fields:
              b: |
                [[[
                  const monthly = parseFloat(states['sensor.whole_home_energy_monthly_usage']?.state || 0);
                  const target = 450;
                  const pct = Math.min((monthly / target) * 100, 100);
                  let color = 'var(--success-color)';
                  if (monthly > 300) color = 'var(--accent-color)';
                  if (monthly > 450) color = 'var(--orange-color)';
                  if (monthly > 600) color = 'var(--error-color)';
                  const empty = 'var(--divider-color)';
                  let output = '<div style="display:flex;gap:2px;width:100%;height:5px;">';
                  for (let i = 1; i <= 10; i++) {
                    const filled = pct >= (i * 10);
                    const bg = filled ? color : empty;
                    output += `<div style="flex:1;height:100%;border-radius:2px;background:${bg};"></div>`;
                  }
                  output += '</div>';
                  return output;
                ]]]


