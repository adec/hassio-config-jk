type: custom:vertical-layout
title: Energy
path: energy
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: top_toolbar
    variables:
      - cards:
        - type: custom:button-card
          template: empty_column

        # Room Name
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Energy

        # Settings button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:dots-horizontal
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#energy_settings_popup'


  #===========================================================================
  # TODAY'S ENERGY OVERVIEW
  #===========================================================================
  - !include /config/dashboards/kohbo/energy/partials/todays_overview.yaml


  #===========================================================================
  # ENERGY HISTORY
  #===========================================================================
  - !include /config/dashboards/kohbo/energy/partials/energy_history.yaml


  #===========================================================================
  # ACTIVE DEVICES
  #===========================================================================
  - !include /config/dashboards/kohbo/energy/partials/active_devices.yaml


  #===========================================================================
  # TOP CONSUMERS TODAY
  #===========================================================================
  - !include /config/dashboards/kohbo/energy/partials/top_consumers.yaml


  #===========================================================================
  # Navbar
  #===========================================================================
  - !include /config/dashboards/templates/includes/navbar.yaml

  
  #===========================================================================
  # Energy Settings Popup
  #===========================================================================
  - !include /config/dashboards/kohbo/energy/partials/settings_popup.yaml
