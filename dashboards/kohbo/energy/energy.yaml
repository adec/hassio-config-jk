type: custom:vertical-layout
title: Energy
path: energy
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: top_toolbar
    variables:
      - cards:
        - type: custom:button-card
          template: empty_column

        # Room Name
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Energy

        # Settings button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:dots-horizontal
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#energy_settings_popup'


  #===========================================================================
  # SECTION 1: TODAY'S ENERGY OVERVIEW
  #===========================================================================

  #---------------------------------------------------------------------------
  # Energy Hero Card - Usage Trend + Price (Security Overview Style)
  #---------------------------------------------------------------------------
  - type: custom:stack-in-card
    # card_mod:
    #   style: |
    #     :host {
    #       --keep-border_radius: 'true';
    #       --keep-background: 'true';
    #       --stack-card-gap: 0px !important;
    #     }
    # keep:
    #   border_radius: true
    #   background: true
    cards:
      #
      # TOP ROW: Usage Status Header (Security Overview Style)
      #
      - type: custom:button-card
        template: security_overview_header
        entity: sensor.energy_usage_trend_label
        show_icon: true
        show_name: false
        # show_state: true
        show_label: true
        label: Energy Overview
        layout: icon_name_state
        icon: |
          [[[
            const tier = entity?.attributes?.tier || 'normal';
            if (tier === 'very_high') return 'mdi:alert-circle';
            if (tier === 'high') return 'mdi:trending-up';
            if (tier === 'very_low' || tier === 'low') return 'mdi:leaf';
            return 'mdi:lightning-bolt';
          ]]]
        styles:
          icon:
            - color: |
                [[[
                  return entity?.attributes?.color || '#FFD166';
                ]]]
        custom_fields:
          score:
            card:
              type: custom:button-card
              entity: sensor.comed_current_hour_average_price
              show_icon: false
              show_state: true
              show_name: false
              state_display: |
                [[[
                  const price = parseFloat(states['sensor.comed_current_hour_average_price']?.state || 0);
                  return `${Math.round(price)}¢`;
                ]]]
              styles:
                card:
                  - background-color: 'var(--darker-primary-color)'
                  - border-radius: '25px'
                  - padding: '10px 3px'
                  - width: '42px'
                  - height: '42px'
                  - align-items: 'center'
                  - display: 'flex'
                  - background: |
                      [[[
                        const price = parseFloat(states['sensor.comed_current_hour_average_price']?.state || 0);
                        const pct = Math.min(100, (price / 12) * 100);
                        const color = states['sensor.energy_price_tier']?.attributes?.color || 'var(--accent-color)';
                        return `radial-gradient(var(--dark-primary-color) 60%, transparent calc(60% + 1px)), conic-gradient(${color} ${pct}% 0%, var(--divider-color) 0% 100%)`;
                      ]]]
                  - position: 'relative'
                state:
                  - font-size: '14px'
                  - color: 'var(--primary-text-color)'

      #
      # BOTTOM SECTION: Stats + Chart (Dark Background)
      #
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }
            
            ha-card {
              background: var(--darker-primary-color);
              border-radius: 0;
              box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.05);
            }
        cards:
          #
          # Stats Row: Actual | Expected | EOD Forecast
          #
          - type: custom:stack-in-card
            mode: horizontal
            card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
            cards:
              # Actual Usage
              - type: custom:button-card
                template: kohbo_energy_stat_item
                entity: sensor.whole_home_energy_daily_usage
                name: Actual
                variables:
                  state_color: var(--success-color)
                  show_divider: true
                icon: |
                  [[[
                    const actual = parseFloat(states['sensor.whole_home_energy_daily_usage']?.state || 0);
                    const expected = parseFloat(states['sensor.energy_expected_so_far']?.state || 0);
                    return actual > expected ? 'mdi:menu-up' : actual < expected ? 'mdi:menu-down' : 'mdi:minus';
                  ]]]
                styles:
                  icon:
                    - color: |
                        [[[
                          const actual = parseFloat(states['sensor.whole_home_energy_daily_usage']?.state || 0);
                          const expected = parseFloat(states['sensor.energy_expected_so_far']?.state || 0);
                          return actual > expected ? 'var(--error-color)' : actual < expected ? 'var(--success-color)' : 'var(--secondary-text-color)';
                        ]]]
              
              # Expected (baseline for this time of day)
              - type: custom:button-card
                template: kohbo_energy_stat_item
                entity: sensor.energy_expected_so_far
                name: Expected
                show_icon: false
                variables:
                  state_color: var(--secondary-text-color)
                  show_divider: true

              # EOD Forecast
              - type: custom:button-card
                template: kohbo_energy_stat_item
                entity: sensor.energy_forecast_end_of_day
                name: Forecast
                variables:
                  state_color: var(--secondary-text-color)
                  show_divider: false
                icon: |
                  [[[
                    const forecast = parseFloat(states['sensor.energy_forecast_end_of_day']?.state || 0);
                    const expected = parseFloat(states['sensor.energy_expected_full_day']?.state || 0);
                    return forecast > expected * 1.05 ? 'mdi:menu-up' : forecast < expected * 0.95 ? 'mdi:menu-down' : 'mdi:minus';
                  ]]]
                styles:
                  icon:
                    - color: |
                        [[[
                          const forecast = parseFloat(states['sensor.energy_forecast_end_of_day']?.state || 0);
                          const expected = parseFloat(states['sensor.energy_expected_full_day']?.state || 0);
                          return forecast > expected * 1.05 ? 'var(--error-color)' : forecast < expected * 0.95 ? 'var(--success-color)' : 'var(--secondary-text-color)';
                        ]]]
                  card:
                    - border-right: none


          #
          # 24h CHART: Actual + Forecast + Price
          #
          - type: custom:apexcharts-card
            card_mod:
              style: |
                ha-card {
                  background: transparent;
                  border-radius: 0;
                  backdrop-filter: none;
                  -webkit-backdrop-filter: none;
                  box-shadow: none;
                  border: none;
                }
                .apexcharts-legend {
                  padding: 0 !important;
                  margin: 0 !important;
                  margin-top: 10px !important;
                  display: flex !important;
                  flex-direction: row !important;
                  flex-wrap: wrap !important;
                  justify-content: center !important;
                }
                .apexcharts-legend-group {
                  display: contents !important;
                }
                .apexcharts-legend-series {
                  display: inline-flex !important;
                  margin: 0 8px !important;
                }
            graph_span: 24h
            span:
              start: day
            header:
              show: false
            apex_config:
              chart:
                height: 200
              grid:
                borderColor: 'rgba(255,255,255,0.05)'
              legend:
                show: true
                position: bottom
                horizontalAlign: center
                floating: false
                fontSize: '11px'
                markers:
                  width: 8
                  height: 8
                itemMargin:
                  horizontal: 16
                  vertical: 0
              xaxis:
                labels:
                  format: 'HH'
                axisBorder:
                  show: false
                axisTicks:
                  show: false
              yaxis:
                - id: energy
                  seriesName: Actual
                  min: 0
                  forceNiceScale: true
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => val ? `${val.toFixed(1)}` : '0'
                - id: energy2
                  seriesName: Forecast
                  show: false
                  min: 0
                  forceNiceScale: true
                - id: price
                  seriesName: Price
                  opposite: true
                  min: 0
                  max: 12
                  tickAmount: 4
                  labels:
                    style:
                      fontSize: '10px'
                    formatter: |
                      EVAL: (val) => `${Math.round(val)}¢`
              tooltip:
                x:
                  format: 'HH:mm'
            series:
              # Actual hourly usage (bars)
              # Using utility meter which handles daily cycles properly
              - entity: sensor.whole_home_energy_daily_usage
                type: column
                name: Actual
                color: var(--success-color)
                unit: kWh
                group_by:
                  func: diff
                  duration: 1h
                yaxis_id: energy
                show:
                  extremas: false
                  in_header: true
                  legend_value: true
              
              # Hourly forecast (dynamic - adjusted for today's pace)
              - entity: sensor.energy_hourly_forecast_json
                type: line
                name: Forecast
                color: var(--accent-color)
                unit: kWh
                stroke_width: 2
                curve: smooth
                yaxis_id: energy2
                extend_to: end
                float_precision: 2
                show:
                  extremas: false
                  in_header: true
                  legend_value: true
                data_generator: |
                  let forecasts = entity.attributes.forecasts || [];
                  // Parse JSON string if needed
                  if (typeof forecasts === 'string') {
                    try {
                      forecasts = JSON.parse(forecasts);
                    } catch (e) {
                      forecasts = [];
                    }
                  }
                  const now = new Date();
                  const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                  const data = [];
                  for (let h = 0; h < 24; h++) {
                    const timestamp = new Date(startOfDay.getTime() + h * 3600000);
                    const value = parseFloat(forecasts[h]) || 0;
                    data.push([timestamp.getTime(), value]);
                  }
                  return data;
              
              # Energy price (line on secondary axis)
              - entity: sensor.comed_current_hour_average_price
                type: line
                name: Price
                color: var(--light-primary-color)
                unit: ¢
                stroke_width: 2
                curve: stepline
                yaxis_id: price
                group_by:
                  func: avg
                  duration: 1h
                show:
                  extremas: false
                  in_header: true
                  legend_value: true




  #===========================================================================
  # SECTION 3: HISTORY - Longer-term Patterns
  #===========================================================================

  #---------------------------------------------------------------------------
  # Energy Usage - Daily (30 days)
  #---------------------------------------------------------------------------
  - type: custom:apexcharts-card
    experimental:
      color_threshold: true
    graph_span: 30d
    stacked: true
    header:
      show: true
      title: Energy Usage - Daily
    series:
      - entity: sensor.daily_energy_consumption
        type: column
        name: Total Energy Usage
        statistics:
          type: change
          period: day
          align: start
        color_threshold:
          - value: 0
            color: "#06D6A0"
          - value: 10.0
            color: "#FFD166"
          - value: 15.0
            color: "#E36001"
          - value: 20.0
            color: "#ED4747"
          - value: 25.0
            color: "#ED4747"
  

  #---------------------------------------------------------------------------
  # Weekly & Monthly Gauges
  #---------------------------------------------------------------------------
  - type: grid
    columns: 2
    square: false
    cards:
      # Weekly Energy Usage
      - type: gauge
        name: Weekly Energy Usage
        unit: 'kWh'
        entity: sensor.whole_home_energy_weekly_usage
        min: 0
        max: 300
        needle: true
        segments:
          - from: 0
            color: var(--success-color)
          - from: 100
            color: var(--warning-color)
          - from: 200
            color: var(--error-color)

      # Monthly Energy Usage
      - type: gauge
        name: Monthly Energy Usage
        unit: 'kWh'
        entity: sensor.whole_home_energy_monthly_usage
        min: 0
        max: 1000
        needle: true
        segments:
          - from: 0
            color: var(--success-color)
          - from: 333
            color: var(--warning-color)
          - from: 666
            color: var(--error-color)


  #===========================================================================
  # SECTION 4: DEVICES - What's Consuming Power
  #===========================================================================

  - type: energy-devices-graph
    title: Individual Devices
    max_devices: 8
    hide_compound_stats: true


  #===========================================================================
  # Navbar
  #===========================================================================
  - !include /config/dashboards/templates/includes/navbar.yaml

  
  #===========================================================================
  # Energy Settings Popup
  #===========================================================================
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#energy_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 425px)
        margin_top_desktop: calc(100vh - 425px)
        
      # Title
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Settings

      # Automations
      - type: custom:button-card
        template: section_title
        name: Automations
      - type: entities
        entities:
          # High energy price automations
          - entity: input_boolean.climate_energy_price_automations
            name: High Energy Price Automations
            icon: kohbo:kohbo-light-2
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true
