#===========================================================================
# TOP CONSUMERS TODAY
# Daily energy usage by device (sorted by consumption)
#===========================================================================

type: custom:stack-in-card
card_mod:
  style: |
    ha-card {
      background: var(--card-background-color);
    }
cards:
  #-----------------------------------------------------------------------
  # Section Header
  #-----------------------------------------------------------------------
  - type: custom:button-card
    show_icon: false
    show_state: false
    show_name: true
    name: Top Consumers Today
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - padding: 16px 16px 0
      name:
        - font-size: 12px
        - font-weight: 600
        - color: var(--secondary-text-color)
        - text-transform: uppercase
        - letter-spacing: 0.3px
        - text-align: left
        - justify-self: start

  #-----------------------------------------------------------------------
  # Energy by Device List (sorted by consumption)
  # Uses daily utility meters that reset at midnight
  #-----------------------------------------------------------------------
  - type: custom:auto-entities
    show_empty: false
    unique: true
    card:
      type: vertical-stack
    card_param: cards
    filter:
      include:
        # Daily energy meters - only show if > 0.1 kWh today
        - entity_id: "sensor.*_daily_energy"
          state: "> 0.1"
          options:
            type: custom:button-card
            entity: this.entity_id
            show_icon: true
            show_name: true
            show_state: true
            icon: mdi:lightning-bolt
            layout: icon_name_state2nd
            state_display: |
              [[[
                const kwh = parseFloat(entity.state) || 0;
                if (kwh >= 100) return kwh.toFixed(0) + ' kWh';
                if (kwh >= 10) return kwh.toFixed(1) + ' kWh';
                return kwh.toFixed(2) + ' kWh';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"i n s" "b b b"'
                - grid-template-columns: 32px 1fr auto
                - grid-template-rows: auto auto
              card:
                - background: transparent
                - padding: 10px 16px 12px
                - box-shadow: none
                - border-bottom: 1px solid rgba(255,255,255,0.05)
              icon:
                - color: |
                    [[[
                      const kwh = parseFloat(entity.state) || 0;
                      if (kwh > 5) return 'var(--error-color)';
                      if (kwh > 2) return 'var(--orange-color)';
                      if (kwh > 0.5) return 'var(--accent-color)';
                      return 'var(--success-color)';
                    ]]]
                - width: 20px
              name:
                - font-size: 13px
                - font-weight: 500
                - color: var(--primary-text-color)
                - text-align: left
                - justify-self: start
              state:
                - font-size: 13px
                - font-weight: 600
                - color: |
                    [[[
                      const kwh = parseFloat(entity.state) || 0;
                      if (kwh > 5) return 'var(--error-color)';
                      if (kwh > 2) return 'var(--orange-color)';
                      if (kwh > 0.5) return 'var(--accent-color)';
                      return 'var(--success-color)';
                    ]]]
                - text-align: right
              custom_fields:
                b:
                  - margin-top: 6px
                  - grid-column: span 3
            custom_fields:
              b: |
                [[[
                  const kwh = parseFloat(entity.state) || 0;
                  const maxKwh = 10;
                  const pct = Math.min((kwh / maxKwh) * 100, 100);
                  let color = 'var(--success-color)';
                  if (kwh > 0.5) color = 'var(--accent-color)';
                  if (kwh > 2) color = 'var(--orange-color)';
                  if (kwh > 5) color = 'var(--error-color)';
                  return `<div style="width:100%;height:4px;background:var(--divider-color);border-radius:2px;overflow:hidden;">
                    <div style="width:${pct}%;height:100%;background:${color};border-radius:2px;transition:width 0.3s ease;"></div>
                  </div>`;
                ]]]
      exclude:
        - entity_id: "*home_energy_meter*"
        - entity_id: "*ups*"
        - entity_id: "*UPS*"
    sort:
      method: state
      numeric: true
      reverse: true
