#
# Climate — HVAC Tab
#
# All thermostats and per-room temperatures.
#   - Nest main + upper floor HVAC
#   - Radiant floor zones (conditional)
#   - Room temperature grid (main floor, upper floor, misc)
#   - 24h trend across all main rooms
#
type: custom:vertical-layout
title: HVAC
path: climate-hvac
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout_tabbed_nav.yaml
cards:
  #
  # Page Header (with tab navbar)
  #
  - !include /config/dashboards/templates/includes/climate/climate_header.yaml

  #
  # HVAC Controls — Nest
  #
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: climate.nest_main_floor
        name: Main Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#main_floor_thermostat'

      - type: custom:button-card
        entity: climate.nest_2nd_floor
        name: Upper Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#upper_floor_thermostat'

  #
  # Radiant Floor Heating — collapsed state
  #
  - type: conditional
    conditions:
      - condition: state
        entity: group.radiant_floor_heating_group
        state: 'off'
    card:
      type: entities
      card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
      entities:
        - entity: group.radiant_floor_heating_group
          icon: mdi:radiator
          name: Radiant Floor Heating
          secondary_info: last-changed
          state_color: true
          card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml
          tap_action:
            action: navigate
            navigation_path: '#radiant_floor_heating'

  #
  # Radiant Floor Heating — expanded state
  #
  - type: conditional
    conditions:
      - condition: state
        entity: group.radiant_floor_heating_group
        state: 'on'
    card:
      type: grid
      columns: 2
      square: false
      cards:
        - type: custom:button-card
          entity: climate.jr_suite
          name: Jr Suite
          template: kohbo_thermostat_entity
          tap_action:
            action: navigate
            navigation_path: '#jr_suite_thermostat'

        - type: custom:button-card
          entity: climate.main_bedroom
          name: Main Bedroom
          template: kohbo_thermostat_entity
          tap_action:
            action: navigate
            navigation_path: '#main_bedroom_thermostat'

        - type: custom:button-card
          entity: climate.ninos_bedroom
          name: "Nino's Bedroom"
          template: kohbo_thermostat_entity
          tap_action:
            action: navigate
            navigation_path: '#ninos_bedroom_thermostat'

        - type: custom:button-card
          entity: climate.basement
          name: Basement
          template: kohbo_thermostat_entity
          tap_action:
            action: navigate
            navigation_path: '#basement_thermostat'

  #
  # Main Floor Room Temperatures
  #
  - type: custom:button-card
    name: Main Floor
    template: section_title

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Kitchen
          - entity: sensor.kitchen_awair_temperature
          - icon: mdi:fridge

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Family Room
          - entity: sensor.kitchen_awair_temperature
          - icon: mdi:sofa

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Playroom
          - entity: sensor.playroom_temperature
          - icon: kohbo:kohbo-lego

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Jr. Suite
          - entity: sensor.jr_suite_awair_temperature
          - icon: kohbo:kohbo-bed

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Office
          - entity: sensor.office_awair_temperature
          - icon: kohbo:kohbo-laptop

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Mudroom
          - entity: sensor.mudroom_motion_sensor_air_temperature
          - icon: kohbo:kohbo-foot-print

  #
  # Upper Floor Room Temperatures
  #
  - type: custom:button-card
    name: Upper Floor
    template: section_title

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Main Bedroom
          - entity: sensor.main_bedroom_mean_temperature
          - icon: kohbo:kohbo-bed-king

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Main Bathroom
          - entity: sensor.main_bathroom_temperature
          - icon: mdi:shower

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Gianluca's Bedroom
          - entity: sensor.gianluca_room_mean_temperature
          - icon: kohbo:kohbo-bed-single

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Nino's Bedroom
          - entity: sensor.nino_room_mean_temperature
          - icon: kohbo:kohbo-bed-single

  #
  # Misc. Climate
  #
  - type: custom:button-card
    name: Misc.
    template: section_title

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Attic
          - entity: sensor.attic_climate_temperature
          - icon: mdi:home-floor-a

      - type: custom:decluttering-card
        template: kohbo_room_temperature_card
        variables:
          - name: Datacenter
          - entity: sensor.basement_datacenter_climate_temperature
          - icon: mdi:server

  #
  # Room Temperature Trend — Last 24h
  #
  - type: custom:button-card
    name: Room Temperatures — Last 24h
    template: section_title

  - type: custom:apexcharts-card
    card_mod:
      style: |
        ha-card {
          background: transparent;
          box-shadow: none;
          border: none;
        }
        .apexcharts-legend {
          padding: 0 !important;
          display: flex !important;
          justify-content: center !important;
          flex-wrap: wrap !important;
        }
    graph_span: 24h
    span:
      end: hour
    header:
      show: false
    apex_config:
      chart:
        height: 240
      grid:
        borderColor: 'rgba(255,255,255,0.05)'
      legend:
        show: true
        position: bottom
        horizontalAlign: center
        fontSize: '11px'
        markers:
          width: 8
          height: 8
      stroke:
        curve: smooth
        width: 2
      xaxis:
        labels:
          format: 'HH'
        axisBorder:
          show: false
        axisTicks:
          show: false
      yaxis:
        - forceNiceScale: true
          decimalsInFloat: 0
    series:
      - entity: sensor.kitchen_awair_temperature
        name: Kitchen
        type: line
      - entity: sensor.jr_suite_awair_temperature
        name: Jr Suite
        type: line
      - entity: sensor.office_awair_temperature
        name: Office
        type: line
      - entity: sensor.main_bedroom_mean_temperature
        name: Main Bedroom
        type: line
      - entity: sensor.gianluca_room_mean_temperature
        name: Gianluca
        type: line
      - entity: sensor.nino_room_mean_temperature
        name: Nino
        type: line

  #
  # Navbar
  #
  - !include /config/dashboards/templates/includes/navbar.yaml

  #
  # Thermostat Popups
  #
  - !include /config/dashboards/kohbo/climate/_main_floor_thermostat_popup.yaml
  - !include /config/dashboards/kohbo/climate/_upper_floor_thermostat_popup.yaml

  - type: custom:decluttering-card
    template: thermostat_radiant_floor_popup
    variables:
      - hash: "#jr_suite_thermostat"
      - entity: climate.jr_suite
      - name: Jr Suite
      - temperature_sensor: sensor.jr_suite_awair_temperature
      - outside_temperature_sensor: sensor.tempest_temperature

  - type: custom:decluttering-card
    template: thermostat_radiant_floor_popup
    variables:
      - hash: "#main_bedroom_thermostat"
      - entity: climate.main_bedroom
      - name: Main Bedroom
      - temperature_sensor: sensor.main_bedroom_mean_temperature
      - outside_temperature_sensor: sensor.tempest_temperature

  - type: custom:decluttering-card
    template: thermostat_radiant_floor_popup
    variables:
      - hash: "#ninos_bedroom_thermostat"
      - entity: climate.ninos_bedroom
      - name: "Nino's Bedroom"
      - temperature_sensor: sensor.nino_room_mean_temperature
      - outside_temperature_sensor: sensor.tempest_temperature

  - type: custom:decluttering-card
    template: thermostat_radiant_floor_popup
    variables:
      - hash: "#basement_thermostat"
      - entity: climate.basement
      - name: Basement
      - temperature_sensor: sensor.sensor.basement_temperature
      - outside_temperature_sensor: sensor.tempest_temperature

  #
  # Radiant Floor Heating Group Popup
  #
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#radiant_floor_heating'
        close_by_clicking_outside: false
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 500px)
        margin_top_desktop: calc(100vh - 500px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Floor Heating

      - type: custom:bubble-card
        card_type: climate
        entity: climate.main_bedroom
        sub_button:
          - name: HVAC modes menu
            select_attribute: hvac_modes
            state_background: false
            show_arrow: false
            entity: climate.main_bedroom
            icon: ""
        name: Main Bedroom
        icon: mdi:heat-wave
        show_state: true
        show_last_changed: true
        show_last_updated: false
        show_attribute: false
        force_icon: false
        hide_temperature: false
        state_color: false

      - type: custom:bubble-card
        card_type: climate
        entity: climate.ninos_bedroom
        sub_button:
          - name: HVAC modes menu
            select_attribute: hvac_modes
            state_background: false
            show_arrow: false
            entity: climate.ninos_bedroom
            icon: ""
        name: "Nino's Bedroom"
        icon: mdi:heat-wave
        show_state: true
        show_last_changed: true
        show_last_updated: false
        show_attribute: false
        force_icon: false
        hide_temperature: false
        state_color: false

      - type: custom:bubble-card
        card_type: climate
        entity: climate.jr_suite
        sub_button:
          - name: HVAC modes menu
            select_attribute: hvac_modes
            state_background: false
            show_arrow: false
            entity: climate.jr_suite
            icon: ""
        name: Jr Suite
        icon: mdi:heat-wave
        show_state: true
        show_last_changed: true
        show_last_updated: false
        show_attribute: false
        force_icon: false
        hide_temperature: false
        state_color: false

      - type: custom:bubble-card
        card_type: climate
        entity: climate.basement
        sub_button:
          - name: HVAC modes menu
            select_attribute: hvac_modes
            state_background: false
            show_arrow: false
            entity: climate.basement
            icon: ""
        name: Basement
        icon: mdi:heat-wave
        show_state: true
        show_last_changed: true
        show_last_updated: false
        show_attribute: false
        force_icon: false
        hide_temperature: false
        state_color: false

  #
  # Climate Settings Popup (accessible from header chip)
  #
  - !include /config/dashboards/kohbo/climate/_climate_settings_popup.yaml
