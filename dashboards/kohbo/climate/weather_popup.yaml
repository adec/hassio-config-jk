  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }
    cards:
      - type: custom:button-card
        name: Next Precipitation
        styles:
          card:
            - padding: 20px 20px 0 20px
          name:
            - color: var(--primary-text-color)
            - font-size: 14px
            - font-weight: 500
            - text-align: left
            - justify-self: start

      # 
      # Next Precipitation
      # 
      - type: custom:apexcharts-card
        header:
          show: true
        graph_span: 10h
        span:
          start: hour
        now:
          show: true
        apex_config:
          dataLabels:
            enabled: false
          chart:
            height: 150
          grid:
            yaxis:
              lines:
                show: false
          xaxis:
            crosshairs:
              show: false
            tooltip:
              enabled: false
          yaxis:
            - id: rain
              opposite: false
        series:
          - entity: sensor.pirateweather_hourly_forecast
            name: Rain
            type: column
            # yaxis_id: rain
            data_generator: |
              return entity.attributes.forecast.map(f => {
                let val = f.precipitation;
                let color = '#9e9e9e';
                if (val > 0 && val < 2.5) {
                  color = '#4FC3F7';
                } else if (val < 7.6) {
                  color = '#0288D1';
                } else if (val < 35) {
                  color = '#01579B';
                } else {
                  color = '#311B92';
                }
                return {
                  x: new Date(f.datetime).getTime(),
                  y: val,
                  fillColor: color
                };
              });
          # - entity: sensor.pirateweather_hourly_forecast
          #   name: Temp
          #   type: line
          #   curve: smooth
          #   yaxis_id: temp
          #   stroke_width: 2
          #   color: '#E53935'
