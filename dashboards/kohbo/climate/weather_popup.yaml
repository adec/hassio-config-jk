# 
# Weather Popup
# 
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#weather'
    close_by_clicking_outside: false
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    
  # Popup Title
  - type: custom:button-card
    template: kohbo_page_title
    name: Weather
  
  # 
  # Current Weather Overview
  # 
  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }

        ha-card {
          background: transparent !important;
          border: none !important;
          box-shadow: none !important;
          padding: 0 !important;
          margin: 0 !important;
        }
    cards:
      - type: custom:simple-weather-card
        entity: weather.tempest_weather_station
        name: " "
        card_mod:
          style: |
            .weather__info__state,
            .weather__info--add {
              display: none !important;
            }

            .weather__info:first-child {
              justify-content: center !important;
            }

            ha-card {
              grid-template-columns: 1fr;
              justify-content: center !important;
              background: transparent !important;
              border: none !important;
              box-shadow: none !important;
              padding: 0 !important;
              margin: 0 0 10px 0 !important;
            }

            .weather__info__title {
              font-size: 42px !important;
            }

            .weather__icon {
              width: 60px !important;
              height: 60px !important;
              flex: 0 0 60px !important;
              margin-right: 6px !important;
            }

      # 
      # Current Weather Details
      # 
      - type: custom:button-card
        name: "[[[ return states['weather.kpwk'].state.replace('_', ' ') ]]]"
        custom_fields:
          weather_details: >
            [[[
              const feels_like = Math.ceil(states['sensor.pirateweather_apparent_temperature'].state);
              const day_high = Math.ceil(states['sensor.pirateweather_daytime_high_temperature_0d'].state);
              const night_low = Math.ceil(states['sensor.pirateweather_overnight_low_temperature_0d'].state);
              
              return `Feels Like ${feels_like}° – High ${day_high}° Low ${night_low}°`;
            ]]]
        styles:
          grid:
            - grid-template-areas: '"n n" "weather_details weather_details"'
            - grid-template-rows: 1fr
          card:
            - padding: 0
            - background: transparent
            - border: none
            - box-shadow: none
            - margin: 0 0 20px 0
            - padding-bottom: 0
            - align-items: center
            - justify-content: center
          name:
            - font-size: 16px
            - font-weight: 700
            - color: var(--primary-text-color)
            - text-transform: capitalize
            - margin-bottom: 5px
          custom_fields:
            weather_details:
              - font-size: 12px
              - font-weight: 400
              - color: var(--secondary-text-color)


  # 
  # Weather Forecast
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:mod-card
        card_mod:
          style:
            tabbed-card$: |
              mwc-tab-bar {
                padding: 20px 20px 8px 20px !important;
              }
              mwc-tab-bar mwc-tab {
                flex: 0 0 auto !important;
                height: 22px !important;
                margin-right: 16px !important;
              }

            tabbed-card $ mwc-tab$: |
              .mdc-tab {
                min-width: auto !important;
                text-transform: none !important;
                padding-bottom: 10px !important;
                font-family: Inter, sans-serif !important;
                letter-spacing: normal !important;
              }

              .mdc-tab--active {
                color: var(--light-grey-color) !important;
              }

              .mdc-tab:not(.mdc-tab--active) {
                color: var(--semi-dark-grey-color) !important;
              }

              mwc-ripple {
                display: none !important;
              }
        card:
          type: custom:tabbed-card
          styles:
            --mdc-tab-horizontal-padding: 0 !important;
            --mdc-tab-height: auto !important;
            --mdc-ripple-press-opacity: 0 !important;
          tabs:
            - card:
                type: weather-forecast
                show_current: false
                show_forecast: true
                entity: weather.kpwk
                forecast_type: hourly
                forecast_slots: 20
                card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/climate_forecast_card_styles.yaml
              attributes:
                label: Hourly  

            - card:
                type: weather-forecast
                show_current: false
                show_forecast: true
                entity: weather.kpwk
                forecast_type: twice_daily
                forecast_slots: 10
                card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/climate_forecast_card_styles.yaml
              attributes:
                label: Outlook

      - type: custom:button-card
        layout: icon_name
        size: 20px
        name: |
          [[[
            const rising = new Date(states['sensor.sun_next_rising'].state);
            const setting = new Date(states['sensor.sun_next_setting'].state);
            const now = new Date();

            const nextEvent = rising < setting ? 'rise' : 'set';
            const nextTime = nextEvent === 'rise' ? rising : setting;
            const hours = Math.floor((nextTime - now) / 1000 / 60 / 60);

            const options = { hour: 'numeric', minute: '2-digit' };
            const timeStr = nextTime.toLocaleTimeString([], options);

            return `Sun ${nextEvent}s in ${hours} hours (${timeStr})`;
          ]]]
        icon: |
          [[[

            const rising = new Date(states['sensor.sun_next_rising'].state);
            const setting = new Date(states['sensor.sun_next_setting'].state);
            const now = new Date();

            const nextEvent = rising < setting ? 'rise' : 'set';

            return nextEvent === 'rise' ? 'mdi:weather-sunset-up' : 'mdi:weather-sunset-down';
          ]]]
        styles:
          grid:
            - grid-template-columns: 20px 1fr;
          card:
            - background: transparent !important
            - border: none !important
            - box-shadow: none !important
            - padding: 5px 20px 20px 20px !important
            - margin: 0 !important
          name:
            - font-size: 15px
            - font-weight: 400
            - color: var(--secondary-text-color)
            - justify-self: start !important
            - margin-left: 10px !important
          

