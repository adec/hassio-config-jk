#
# Climate — Overview Tab
#
# Landing view for the climate dashboard. Glanceable summary of:
#   - current weather (tap-through to full weather popup)
#   - main + upper floor climate/AQI
#   - 24h temperature trend (indoor vs outdoor)
#
type: custom:vertical-layout
title: Climate
path: climate
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout_tabbed_nav.yaml
cards:
  #
  # Page Header (with tab navbar)
  #
  - !include /config/dashboards/templates/includes/climate/climate_header.yaml

  #
  # Current Weather
  #
  - type: weather-forecast
    show_current: true
    show_forecast: false
    forecast_type: hourly
    name: Current Weather
    entity: weather.kpwk
    tap_action:
      action: navigate
      navigation_path: "#weather"
      haptic: light

  #
  # Main Floor Climate Summary
  #
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - room_name: Main Floor
      - navigation_path: /dashboard-kohbo/climate
      - temperature_sensor: sensor.main_floor_temperature
      - humidity_sensor: sensor.main_floor_humidity
      - pm25_sensor: sensor.main_floor_air_quality_pm2_5
      - carbon_dioxide_sensor: sensor.main_floor_air_quality_co2
      - vocs_sensor: sensor.main_floor_air_quality_tvoc
      - aqi_score_sensor: sensor.main_floor_air_quality_score
      - action_cards:
        - type: custom:button-card
          template: empty_column

  #
  # Upper Floor Climate Summary
  #
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - room_name: Upper Floor
      - navigation_path: /dashboard-kohbo/climate
      - temperature_sensor: sensor.second_floor_temperature
      - humidity_sensor: sensor.second_floor_humidity
      - pm25_sensor: sensor.upper_floor_air_quality_pm2_5
      - carbon_dioxide_sensor: sensor.upper_floor_air_quality_co2
      - vocs_sensor: sensor.upper_floor_air_quality_tvoc
      - aqi_score_sensor: sensor.upper_floor_air_quality_score
      - action_cards:
        - type: custom:button-card
          template: empty_column

  #
  # 24h Temperature Trend — Indoor vs Outdoor
  #
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }
    cards:
      - type: custom:button-card
        template: kohbo_card_header
        name: Temperature — Last 24h

      - type: custom:apexcharts-card
        card_mod:
          style: |
            ha-card {
              background: transparent;
              border-radius: 0;
              backdrop-filter: none;
              -webkit-backdrop-filter: none;
              box-shadow: none;
              border: none;
              padding-bottom: 16px;
            }
            .apexcharts-legend {
              padding: 0 !important;
              margin: 0 !important;
              margin-top: 10px !important;
              display: flex !important;
              flex-direction: row !important;
              flex-wrap: wrap !important;
              justify-content: center !important;
            }
            .apexcharts-legend-series {
              display: inline-flex !important;
              margin: 0 8px !important;
            }
        graph_span: 24h
        span:
          end: hour
        header:
          show: false
        apex_config:
          chart:
            height: 200
          grid:
            borderColor: 'rgba(255,255,255,0.05)'
          legend:
            show: true
            position: bottom
            horizontalAlign: center
            floating: false
            fontSize: '11px'
            markers:
              width: 8
              height: 8
            itemMargin:
              horizontal: 16
              vertical: 0
          stroke:
            curve: smooth
            width: 2
          xaxis:
            labels:
              format: 'HH'
            axisBorder:
              show: false
            axisTicks:
              show: false
          yaxis:
            - forceNiceScale: true
              decimalsInFloat: 0
              labels:
                style:
                  fontSize: '10px'
                formatter: |
                  EVAL: (val) => val ? `${val.toFixed(0)}°` : '0°'
          tooltip:
            x:
              format: 'HH:mm'
        series:
          - entity: sensor.main_floor_temperature
            name: Main Floor
            type: line
            color: var(--primary-color)
            stroke_width: 2
          - entity: sensor.second_floor_temperature
            name: Upper Floor
            type: line
            color: var(--accent-color)
            stroke_width: 2
          - entity: sensor.tempest_temperature
            name: Outdoor
            type: line
            color: var(--secondary-text-color)
            stroke_width: 2

  #
  # Navbar
  #
  - !include /config/dashboards/templates/includes/navbar.yaml

  #
  # Weather Popup
  #
  - !include /config/dashboards/kohbo/climate/weather_popup.yaml

  #
  # Climate Settings Popup
  #
  - !include /config/dashboards/kohbo/climate/_climate_settings_popup.yaml
