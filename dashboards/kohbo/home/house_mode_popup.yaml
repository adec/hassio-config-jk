# 
# House Mode Popup
# 
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#house_mode'
    close_by_clicking_outside: true
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    margin_top_mobile: calc(100vh - 750px)
    margin_top_desktop: calc(100vh - 750px)

  # 
  # Popup Title
  # 
  - type: custom:button-card
    template: kohbo_popup_page_title
    name: House Mode

  # 
  # House Mode Overview
  # 
  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --stack-card-gap: 20px;
          --vertical-stack-card-gap: 20px !important;
        }
    cards:
      - type: custom:button-card
        template: kohbo_stacked_card_top
        entity: input_select.house
        label: Current state of the house
        state:
          - value: "Auto"
            icon: kohbo:kohbo-house-auto
            color: var(--primary-color)
          - value: "Away"
            icon: kohbo:kohbo-house-away
            color: var(--warning-color)
          - value: "Quiet"
            icon: kohbo:kohbo-house-quiet
            color: var(--orange-color)
          - value: "Bedtime"
            icon: kohbo:kohbo-house-quiet
            color: var(--orange-color)
          - value: "Entertainment"
            icon: kohbo:kohbo-house-entertain
            color: var(--success-color)
          - value: "Vacation"
            icon: kohbo:kohbo-house-away
            color: var(--error-color)
        state_display: |
          [[[
            return `${entity.state} Mode`
          ]]]

      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: custom:button-card
            entity: input_boolean.speech_notifications
            name: Voice
            icon: kohbo:kohbo-announcement
            template: kohbo_security_item
            state_display: |
              [[[
                if (states['input_select.house'].state == "Quiet")
                  return "Quiet";
                else
                  return entity.state == "on" ? "Enabled" : "Disabled";
              ]]]
          - type: custom:button-card
            entity: input_boolean.lighting_automations
            name: Lighting
            icon: kohbo:kohbo-light-2
            template: kohbo_security_item
            state_display: |
              [[[
                return entity.state == "on" ? "Enabled" : "Disabled";
              ]]]
          - type: custom:button-card
            entity: input_boolean.camera_notifications
            name: Camera Alerts
            icon: kohbo:kohbo-notification
            template: kohbo_security_item
            state_display: |
              [[[
                return entity.state == "on" ? "Active" : "Inactive";
              ]]]

  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      - entity: input_select.house
        name: House Mode
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml                  
            
      # Quiet Mode
      - entity: input_boolean.quiet_mode
        name: Quiet Mode
        icon: kohbo:kohbo-house-quiet
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      
      # Entertainment Mode
      - entity: input_boolean.entertainment_mode
        name: Entertainment Mode
        icon: kohbo:kohbo-house-entertain
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Guest Mode
      - entity: input_boolean.guest_mode
        name: Guest Mode
        icon: mdi:account-group
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Vacation Mode
      - entity: input_boolean.vacation_mode
        name: Vacation Mode
        icon: kohbo:kohbo-house-away
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Turn off the house
  # 
  - type: custom:stack-in-card
    mode: vertical
    card_mod:
      style: |
        :host {
          --stack-card-gap: 0;
          --vertical-stack-card-gap: 0 !important;
        }

        ha-card {
          margin-top: 50px !important;
          border-color: var(--error-color) !important;
          border-width: 1px !important;
          border-style: solid !important;
          border-radius: 12px !important;
        }
    cards:
      - type: custom:button-card
        name: Danger Zone
        template: kohbo_card_section_title
        styles:
          card:
            - padding: 20px 20px 10px 20px

      - type: custom:button-card
        name: This will turn OFF the house. The alarm will be activated, lights and devices shut off, and automations will be turned off. There is typically no reason to manually trigger this as it will automatically run when the house is empty. Proceed with caution.
        template: kohbo_card_section_description
        styles:
          card:
            - padding: 0 20px
      

      - type: custom:button-card
        name: Turn Off the House
        show_icon: false
        entity: input_boolean.house_occupied
        tap_action:
          action: perform-action
          perform_action: input_boolean.turn_off
          data:
            entity_id: input_boolean.john_dnd
        confirmation: 
          text: "Are you sure you want to turn off the house?"
        card_mod:
          style: |
            :host {
              padding: 20px !important;
            }
            ha-card {
              background: var(--error-color) !important;
              color: var(--primary-text-color) !important;
              border-radius: 30px !important;
              font-size: 14px !important;
              font-weight: 500 !important;
              padding: 15px 10px !important;
            }

