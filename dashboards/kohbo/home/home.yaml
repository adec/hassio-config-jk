  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
        gap: 5px
      cards:
        # - type: custom:button-card
        #   template: kohbo_header_page_title
        #   name: Home
        #   styles:
        #     name:
        #       - justify-self: start
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  gap: 5px !important;
                }
          card:
            type: horizontal-stack
            cards:
              # 
              # House Mode
              # 
              - type: custom:button-card
                template: kohbo_chip_card
                entity: input_select.house
                state:
                  - value: "Auto"
                    icon: kohbo:kohbo-house-auto
                    color: var(--primary-color)
                  - value: "Away"
                    icon: kohbo:kohbo-house-away
                    color: var(--warning-color)
                  - value: "Quiet"
                    icon: kohbo:kohbo-house-quiet
                    color: var(--orange-color)
                  - value: "Bedtime"
                    icon: kohbo:kohbo-house-quiet
                    color: var(--orange-color)
                  - value: "Entertainment"
                    icon: kohbo:kohbo-house-entertain
                    color: var(--success-color)
                  - value: "Vacation"
                    icon: kohbo:kohbo-house-away
                    color: var(--error-color)
                tap_action:
                  action: navigate
                  navigation_path: '#house_mode'
                  haptic: light

              # 
              # Electricity Usage
              # 
              - type: custom:button-card
                template: kohbo_chip_card
                name: Energy Usage
                icon: mdi:lightning-bolt
                entity: sensor.energy_current_consumption
                tap_action:
                  action: navigate
                  navigation_path: '/dashboard-kohbo/energy'
                  haptic: light
                show_state: true
                styles:
                  state:
                    - margin-left: 3px
                state:
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 1000 ]]]"
                    color: var(--error-color)
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 6000 ]]]"
                    color: var(--orange-color)
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 2000 ]]]"
                    color: var(--warning-color)
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 0 ]]]"
                    color: var(--success-color)


        # 
        # People in the room
        # 
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  display: flex;
                  justify-content: flex-end;
                  align-items: start;
                }
              .: |
                ha-card {
                  height: 100% !important;
                  align-self: center !important;
                }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.john_koht
                template: kohbo_person_entity
                variables:
                  status: |
                    [[[
                      if (states['input_select.john_sleep_state'].state == "Sleep") {
                        return "sleeping";
                      } else if (states['input_boolean.john_dnd'].state == "on") {
                        return "dnd";
                      }
                    ]]]
                tap_action:
                  action: navigate
                  haptic: light
                  navigation_path: '#john'
              - type: custom:button-card
                entity: person.cristina_falbo
                template: kohbo_person_entity
                variables:
                  status: |
                    [[[
                      if (states['input_select.cristina_sleep_state'].state == "Sleep") {
                        return "sleeping";
                      }
                    ]]]
                tap_action:
                  haptic: light
                  action: navigate
                  navigation_path: '#cristina'
              - type: custom:button-card
                entity: person.mary_falbo
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: input_boolean.nonna_home
                    state: "on"
                tap_action:
                  action: navigate
                  haptic: light
                  navigation_path: '#nonna'
              - type: custom:button-card
                entity: person.katia
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: input_boolean.katia_home
                    state: "on"
                tap_action:
                  action: navigate
                  haptic: light
                  navigation_path: '#katia'


