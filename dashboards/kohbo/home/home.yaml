type: custom:vertical-layout
title: Home
path: home
theme: kohbo
layout: !include /config/dashboards/templates/includes/kohbo_screen_layout.yaml
cards:

  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:            
        - type: custom:mushroom-chips-card
          alignment: end
          chips:
            # Assist
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:comment-processing
              icon_color: var(--secondary-text-color)
              tap_action:
                action: assist
            # Notifications
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:bell
              icon_color: var(--secondary-text-color)
              tap_action:
                action: navigate
                navigation_path: '#notifications'


  # 
  # Home Title and People
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
      cards:
        # 
        # Home Title
        # 
        - type: custom:button-card
          template: kohbo_page_title
          name: Home

        # 
        # People in the room
        # 
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  display: flex;
                  justify-content: flex-end;
                  align-items: center;
                }
              .: |
                ha-card {
                  height: 100% !important;
                  align-self: center !important;
                }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.john_koht
                template: kohbo_person_entity
                variables:
                  status: |
                    [[[
                      if (states['input_select.john_sleep_state'].state == "Sleep") {
                        return "sleeping";
                      } else if (states['input_boolean.john_dnd'].state == "on") {
                        return "dnd";
                      }
                    ]]]
                tap_action:
                  action: navigate
                  haptic: heavy
                  navigation_path: '#john'
              - type: custom:button-card
                entity: person.cristina_falbo
                template: kohbo_person_entity
                variables:
                  status: |
                    [[[
                      if (states['input_select.cristina_sleep_state'].state == "Sleep") {
                        return "sleeping";
                      }
                    ]]]
                tap_action:
                  haptic: heavy
                  action: navigate
                  navigation_path: '#cristina'
              - type: custom:button-card
                entity: person.mary_falbo
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: input_boolean.nonna_home
                    state: "on"
                tap_action:
                  action: navigate
                  navigation_path: '#nonna'
              - type: custom:button-card
                entity: person.katia
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: input_boolean.katia_home
                    state: "on"
                tap_action:
                  action: navigate
                  navigation_path: '#katia'

  
  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    style: |
      ha-card {
        display: flex;
        flex-direction: row;
        gap: 10px;
        justify-content: flex-start;
        align-items: center;
        flex-wrap: wrap;
        height: 45px !important;
      }
    card:
      type: horizontal-stack
      cards:
        # 
        # House Mode
        # 
        - type: custom:button-card
          template: kohbo_chip_card
          entity: input_select.house
          state:
            - value: "Auto"
              icon: kohbo:kohbo-house-auto
              color: var(--primary-color)
            - value: "Away"
              icon: kohbo:kohbo-house-away
              color: var(--warning-color)
            - value: "Quiet"
              icon: kohbo:kohbo-house-quiet
              color: var(--orange-color)
            - value: "Bedtime"
              icon: kohbo:kohbo-house-quiet
              color: var(--orange-color)
            - value: "Entertainment"
              icon: kohbo:kohbo-house-entertain
              color: var(--success-color)
            - value: "Vacation"
              icon: kohbo:kohbo-house-away
              color: var(--error-color)
          tap_action:
            action: navigate
            navigation_path: '#house_mode'

        
        # 
        # Weather
        # 
        - type: custom:button-card
          template: kohbo_chip_card
          name: Weather
          icon: mdi:weather-sunny
          entity: weather.pirateweather
          show_state: true
          state_display: >
            [[[
              return Math.round(states['sensor.tempest_temperature'].state) + "°";
            ]]]
          tap_action:
            action: navigate
            navigation_path: '#weather'
        
        # 
        # Electricity Usage
        # 
        - type: custom:button-card
          template: kohbo_chip_card
          name: Electricity Usage
          icon: mdi:lightning-bolt
          entity: sensor.energy_current_consumption
          show_state: true
          styles:
            state:
              - margin-left: 3px
          state:
            - operator: template
              value:  "[[[ return Math.round(parseFloat(entity.state)) > 1000 ]]]"
              color: var(--error-color)
            - operator: template
              value:  "[[[ return Math.round(parseFloat(entity.state)) > 6000 ]]]"
              color: var(--orange-color)
            - operator: template
              value:  "[[[ return Math.round(parseFloat(entity.state)) > 2000 ]]]"
              color: var(--warning-color)
            - operator: template
              value:  "[[[ return Math.round(parseFloat(entity.state)) > 0 ]]]"
              color: var(--success-color)
          # tap_action:
          #   action: navigate
          #   navigation_path: '#main_floor_quick_clean_popup'
          
        # # 
        # # Guest Mode
        # # 
        # - type: custom:button-card
        #   template: kohbo_chip_card
        #   entity: input_boolean.guest_mode
        #   show_state: false
        #   icon: mdi:account-group
        #   color: var(--primary-color)
        #   state:
        #     - value: "on"
        #       icon: mdi:account-group
        #       color: var(--primary-color)
        #     - value: "off"
        #       icon: mdi:account-group
        #       color: var(--light-grey-color)

        # 
        # Quick Clean
        # 
        - type: conditional
          conditions:
            - entity: vacuum.roborock_s7
              state: 'docked'
          card:
            type: custom:button-card
            template: kohbo_chip_card
            name: Quick Clean
            icon: mdi:robot-vacuum
            color: var(--light-grey-color)
            tap_action:
              action: navigate
              navigation_path: '#main_floor_quick_clean_popup'
          
          

        
      
  # 
  # Security Overview
  # 
  - !include /config/dashboards/templates/button_cards/cards/kohbo_security_overview.yaml

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - room_name: Indoor Climate
      - temperature_sensor: sensor.average_indoor_temperature
      - humidity_sensor: sensor.average_indoor_humidity
      - pm25_sensor: sensor.indoor_air_quality_pm2_5
      - carbon_dioxide_sensor: sensor.indoor_air_quality_co2
      - vocs_sensor: sensor.indoor_air_quality_tvoc


  # 
  # Overview section
  # Includes Interior Lights, Exterior Lights, Exterior Doors, Windows
  # 
  - type: custom:button-card
    template: section_title
    name: Overview

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: light.interior_lights
        name: Interior Lights
        template: kohbo_device_entity
        icon: kohbo:kohbo-light
        state_display: >
          [[[
            if (states['light.interior_lights'].state == "on")
              return `${states['sensor.interior_lights_on'].state} Lights On`
            else
              return "Off"
          ]]]

      - type: custom:button-card
        entity: light.exterior_lights
        name: Exterior Lights
        template: kohbo_device_entity
        icon: kohbo:kohbo-lamp

      # Main floor HVAC
      - type: custom:button-card
        entity: climate.nest_main_floor
        name: Main Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#main_floor_thermostat'

      # Upper floor HVAC
      - type: custom:button-card
        entity: climate.nest_2nd_floor
        name: Upper Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#upper_floor_thermostat'

      # Exterior Doors
      - type: custom:button-card
        entity: binary_sensor.exterior_doors
        name: Exterior Doors
        template: kohbo_device_entity
        icon: |
          [[[
            if (entity.state == "on")
              return "kohbo:kohbo-door-open"
            else
              return "kohbo:kohbo-door-closed"
          ]]]

      # Windows
      - type: custom:button-card
        entity: binary_sensor.windows
        name: Windows
        template: kohbo_device_entity
        icon: >
          [[[
            if (entity.state == "on")
              return "kohbo:kohbo-window-open"
            else
              return "kohbo:kohbo-window-closed"
          ]]]

      # Main Floor Vacuum
      - type: custom:button-card
        entity: vacuum.roborock_s7
        name: Main Floor Vacuum
        template: kohbo_device_entity
        icon: mdi:robot-vacuum
        tap_action:
          action: navigate
          # navigation_path: '#main_floor_vacuum'
          navigation_path: '/dashboard-kohbo/main-floor-vacuum'

      # Upstairs Vacuum
      - type: custom:button-card
        entity: vacuum.upstairs_robot_vacuum
        name: Upstairs Vacuum
        template: kohbo_device_entity
        icon: mdi:robot-vacuum


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      - entity: input_boolean.speech_notifications
        icon: kohbo:kohbo-announcement
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.lighting_automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.camera_notifications
        icon: kohbo:kohbo-notification
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml

  # 
  # People
  # 
  - type: vertical-stack
    cards: !include /config/dashboards/kohbo/shared/people.yaml

  # 
  # Vacuums
  # 
  - !include /config/dashboards/kohbo/shared/main_floor_vacuum_popup.yaml
  # - !include /config/dashboards/kohbo/shared/kohbo_upstairs_vacuum_popup.yaml


  # 
  # Main Floor Thermostat Popup
  # 
  - type: custom:decluttering-card
    template: thermostat_popup
    variables:
      - hash: "#main_floor_thermostat"
      - entity: climate.nest_main_floor
      - eco_mode: binary_sensor.main_floor_nest_in_eco
      - name: Main Floor
      - temperature_sensor: sensor.main_floor_temperature
      - outside_temperature_sensor: sensor.tempest_temperature

  
  # 
  # Upper Floor Thermostat Popup
  # 
  - type: custom:decluttering-card
    template: thermostat_popup
    variables:
      - hash: "#upper_floor_thermostat"
      - entity: climate.nest_2nd_floor
      - eco_mode: binary_sensor.second_floor_nest_in_eco
      - name: Upper Floor
      - temperature_sensor: sensor.second_floor_temperature
      - outside_temperature_sensor: sensor.tempest_temperature
    
  
  # 
  # Front Door Camera Notification
  # 
  - type: custom:button-card
    name: "Person detected at the front door"
    icon: mdi:alert-circle
    layout: icon_name
    show_icon: true
    size: 24px;
    tap_action:
      action: navigate
      navigation_path: '#front_door_camera'
    styles:
      card:
        - backdrop-filter: blur(10px)
        - -webkit-backdrop-filter: blur(10px)
        - padding: 10px
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 40px 1fr
      name:
        - justify-self: start
        - font-weight: 600
    card_mod:
      style: |
        ha-card {
          background: rgba(237, 71, 71, 0.8) !important;
          position: fixed !important;
          bottom: 110px !important;
          z-index: 1 !important;
          height: 50px !important;
          left: 24px !important;
          right: 24px !important;
          width: calc(100% - 48px) !important;
        }
    visibility:
      - condition: state
        entity: binary_sensor.front_door_person_occupancy
        state: "on"


  # 
  # Driveway Front Camera Notification
  # 
  - type: custom:button-card
    name: "Person detected on the driveway"
    icon: mdi:alert-circle
    layout: icon_name
    show_icon: true
    size: 24px;
    tap_action:
      action: navigate
      navigation_path: '#driveway_front_camera'
    styles:
      card:
        - backdrop-filter: blur(10px)
        - -webkit-backdrop-filter: blur(10px)
        - padding: 10px
      grid:
        - grid-template-areas: '"i n"'
        - grid-template-columns: 40px 1fr
      name:
        - justify-self: start
        - font-weight: 600
    card_mod:
      style: |
        ha-card {
          background: rgba(237, 71, 71, 0.8) !important;
          position: fixed !important;
          bottom: 110px !important;
          z-index: 1 !important;
          height: 50px !important;
          left: 24px !important;
          right: 24px !important;
          width: calc(100% - 48px) !important;
        }
    visibility:
      - condition: state
        entity: binary_sensor.driveway_front_person_occupancy
        state: "on"


  # 
  # Front Door Camera Popup
  # 
  - type: custom:decluttering-card
    template: camera_popup
    variables:
      - hash: '#front_door_camera'
      - name: Front Door
      - notifications_entity: input_boolean.front_door_camera_notifications
      - timer_entity: timer.front_door_camera_notifications_snooze_timer
      - countdown_sensor: sensor.front_door_timer_countdown
      - camera_entity: camera.front_door
      - motion_entity: binary_sensor.front_door_motion
      - person_entity: binary_sensor.front_door_person_occupancy


  # 
  # Driveway Front Camera Popup
  # 
  - type: custom:decluttering-card
    template: camera_popup
    variables:
      - hash: '#driveway_front_camera'
      - name: Driveway Front
      - notifications_entity: input_boolean.driveway_front_camera_notifications
      - timer_entity: timer.driveway_front_camera_notifications_snooze_timer
      - countdown_sensor: sensor.driveway_front_timer_countdown
      - camera_entity: camera.driveway_front
      - motion_entity: binary_sensor.driveway_front_motion
      - person_entity: binary_sensor.driveway_front_person_occupancy


  # 
  # Notifications Popup
  # 
  - !include /config/dashboards/kohbo/shared/kohbo_notification_popup.yaml


  # 
  # Weather Popup
  # 
  - !include /config/dashboards/kohbo/climate/weather_popup.yaml


  # 
  # House Mode Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#house_mode'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 650px)
        margin_top_desktop: calc(100vh - 650px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: House Mode

      - type: custom:stack-in-card
        cards:
          - type: custom:button-card
            entity: input_select.house
            label: Current state of the house
            state:
              - value: "Auto"
                icon: kohbo:kohbo-house-auto
                color: var(--primary-color)
              - value: "Away"
                icon: kohbo:kohbo-house-away
                color: var(--warning-color)
              - value: "Quiet"
                icon: kohbo:kohbo-house-quiet
                color: var(--orange-color)
              - value: "Bedtime"
                icon: kohbo:kohbo-house-quiet
                color: var(--orange-color)
              - value: "Entertainment"
                icon: kohbo:kohbo-house-entertain
                color: var(--success-color)
              - value: "Vacation"
                icon: kohbo:kohbo-house-away
                color: var(--error-color)
            show_state: true
            state_display: |
              [[[
                return `${entity.state} Mode`
              ]]]
            show_icon: true
            show_name: false
            show_label: true
            layout: icon_name_state
            tap_action:
              action: nothing
            styles:
              card:
                - background: transparent
                - backdrop-filter: none
                - -webkit-backdrop-filter: none
                - padding: 20px 20px 12px 20px
                - box-shadow: none
                - display: flex
                - align-items: center
                - justify-content: flex-start
                - gap: 12px
                - border: none
              grid:
                - grid-template-areas: "\"i n\" \"i l\""
                - grid-template-columns: min-content 1fr
                - align-items: center
              icon:
                - width: 38px
                - height: 38px
                - margin-right: 15px
              name:
                - font-size: 20px
                - font-weight: regular
                - color: white
                - justify-self: start
                - margin-bottom: 4px;
              label:
                - font-size: 12px
                - color: "#CED4DA"
                - justify-self: start

          - type: custom:stack-in-card
            mode: vertical
            card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack_bg.yaml
            cards:
              - type: entities
                card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_entities_container.yaml
                entities:
                  - entity: input_select.house
                    name: House Mode
                    card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_no_icon.yaml                  
                        
                  # Quiet Mode
                  - entity: input_boolean.quiet_mode
                    name: Quiet Mode
                    icon: kohbo:kohbo-house-quiet
                    card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                    secondary_info: last-changed
                    state_color: true
                  
                  # Entertainment Mode
                  - entity: input_boolean.entertainment_mode
                    name: Entertainment Mode
                    icon: kohbo:kohbo-house-entertain
                    card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                    secondary_info: last-changed
                    state_color: true

                  # Guest Mode
                  - entity: input_boolean.guest_mode
                    name: Guest Mode
                    icon: mdi:account-group
                    card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                    secondary_info: last-changed
                    state_color: true

                  # Vacation Mode
                  - entity: input_boolean.vacation_mode
                    name: Vacation Mode
                    icon: kohbo:kohbo-house-away
                    card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                    secondary_info: last-changed
                    state_color: true


      # 
      # Turn off the house
      # 
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --stack-card-gap: 0;
              --vertical-stack-card-gap: 0 !important;
            }

            ha-card {
              margin-top: 50px !important;
              border-color: var(--error-color) !important;
              border-width: 1px !important;
              border-style: solid !important;
              border-radius: 12px !important;
            }
        cards:
          - type: custom:button-card
            name: Danger Zone
            template: kohbo_card_section_title
            styles:
              card:
                - padding: 20px 20px 10px 20px

          - type: custom:button-card
            name: This will turn OFF the house. The alarm will be activated, lights and devices shut off, and automations will be turned off. There is typically no reason to manually trigger this as it will automatically run when the house is empty. Proceed with caution.
            template: kohbo_card_section_description
            styles:
              card:
                - padding: 0 20px
          

          - type: custom:button-card
            name: Turn Off the House
            show_icon: false
            entity: input_boolean.house_occupied
            tap_action:
              action: perform-action
              perform_action: input_boolean.turn_off
              data:
                entity_id: input_boolean.john_dnd
            confirmation: 
              text: "Are you sure you want to turn off the house?"
            card_mod:
              style: |
                :host {
                  padding: 20px !important;
                }
                ha-card {
                  background: var(--error-color) !important;
                  color: var(--primary-text-color) !important;
                  border-radius: 30px !important;
                  font-size: 14px !important;
                  font-weight: 500 !important;
                  padding: 15px 10px !important;
                }

          # - type: entities
          #   entities:
          #     # Daily Clean When House Empty
          #     - entity: automation.main_level_vacuum_daily_clean_when_house_empty
          #       name: Daily Clean When House Empty
          #       icon: mdi:robot
          #       card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
          #       secondary_info: last-changed
          #       state_color: true
          #       tap_action:
          #         action: toggle
          #         confirmation:
          #           text: "Are you sure????"


  # # 
  # # Front Door Camera Popup
  # # 
  # - type: vertical-stack
  #   cards:
  #     - type: custom:bubble-card
  #       card_type: pop-up
