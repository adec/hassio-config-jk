type: custom:vertical-layout
title: Home
path: home
theme: kohbo
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
# layout: !include /config/dashboards/templates/includes/layouts/kohbo_homepage_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        # # Assist
        # - type: custom:button-card
        #   template: kohbo_header_chip_card
        #   icon: mdi:comment-processing
        #   icon_color: var(--secondary-text-color)
        #   tap_action: 
        #     action: assist

        - type: custom:button-card
          template: empty_column

        - type: custom:button-card
          template: kohbo_header_page_title
          name: Home

        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:bell
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#notifications'


  # 
  # Quick Overview
  # House mode, energy usage, and people in the room
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
        gap: 5px
      cards:
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  gap: 5px !important;
                }
          card:
            type: horizontal-stack
            cards:
              # 
              # House Mode
              # 
              - type: custom:button-card
                template: kohbo_chip_card
                entity: input_select.house
                state:
                  - value: "Auto"
                    icon: kohbo:kohbo-house-auto
                    color: var(--primary-color)
                  - value: "Away"
                    icon: kohbo:kohbo-house-away
                    color: var(--warning-color)
                  - value: "Quiet"
                    icon: kohbo:kohbo-house-quiet
                    color: var(--orange-color)
                  - value: "Bedtime"
                    icon: kohbo:kohbo-house-quiet
                    color: var(--orange-color)
                  - value: "Entertainment"
                    icon: kohbo:kohbo-house-entertain
                    color: var(--success-color)
                  - value: "Vacation"
                    icon: kohbo:kohbo-house-away
                    color: var(--error-color)
                tap_action:
                  action: navigate
                  navigation_path: '#house_mode'
                  haptic: light

              # 
              # Electricity Usage
              # 
              - type: custom:button-card
                template: kohbo_chip_card
                name: Energy Usage
                icon: mdi:lightning-bolt
                entity: sensor.energy_current_consumption
                tap_action:
                  action: navigate
                  navigation_path: '/dashboard-kohbo/energy'
                  haptic: light
                show_state: true
                styles:
                  state:
                    - margin-left: 3px
                state:
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 1000 ]]]"
                    color: var(--error-color)
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 6000 ]]]"
                    color: var(--orange-color)
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 2000 ]]]"
                    color: var(--warning-color)
                  - operator: template
                    value:  "[[[ return Math.round(parseFloat(entity.state)) > 0 ]]]"
                    color: var(--success-color)


        # 
        # People in the room
        # 
        - type: custom:mod-card
          card_mod:
            style:
              hui-horizontal-stack-card$: |
                #root {
                  display: flex;
                  justify-content: flex-end;
                  align-items: start;
                }
              .: |
                ha-card {
                  height: 100% !important;
                  align-self: center !important;
                }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.john_koht
                template: kohbo_person_entity
                variables:
                  status: |
                    [[[
                      if (states['input_select.john_sleep_state'].state == "Sleep") {
                        return "sleeping";
                      } else if (states['input_boolean.john_dnd'].state == "on") {
                        return "dnd";
                      }
                    ]]]
                tap_action:
                  action: navigate
                  haptic: light
                  navigation_path: '#john'
              - type: custom:button-card
                entity: person.cristina_falbo
                template: kohbo_person_entity
                variables:
                  status: |
                    [[[
                      if (states['input_select.cristina_sleep_state'].state == "Sleep") {
                        return "sleeping";
                      }
                    ]]]
                tap_action:
                  haptic: light
                  action: navigate
                  navigation_path: '#cristina'
              - type: custom:button-card
                entity: person.mary_falbo
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: input_boolean.nonna_home
                    state: "on"
                tap_action:
                  action: navigate
                  haptic: light
                  navigation_path: '#nonna'
              - type: custom:button-card
                entity: person.katia
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: input_boolean.katia_home
                    state: "on"
                tap_action:
                  action: navigate
                  haptic: light
                  navigation_path: '#katia'

      
  # 
  # Security Overview
  # 
  - !include /config/dashboards/templates/button_cards/cards/kohbo_security_overview.yaml

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - room_name: Indoor
      - temperature_sensor: sensor.average_indoor_temperature
      - humidity_sensor: sensor.average_indoor_humidity
      - pm25_sensor: sensor.indoor_air_quality_pm2_5
      - carbon_dioxide_sensor: sensor.indoor_air_quality_co2
      - vocs_sensor: sensor.indoor_air_quality_tvoc
      - aqi_score_sensor: sensor.indoor_air_quality_score
      - action_cards:
        # Open windows details
        - type: custom:button-card
          template: kohbo_chip_icon_action_card
          icon: mdi:chevron-right
          tap_action:
            action: navigate
            navigation_path: "/dashboard-kohbo/climate"
            haptic: light

  # 
  # Occupied Rooms
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: >
          [[[
            const occupiedRoomsCount = states['sensor.house'].attributes.occupied_rooms_count;
            return `${occupiedRoomsCount} Rooms Occupied `;
          ]]]

      - type: custom:mod-card
        card_mod:
          style:
            .: |
              ha-card {
                padding: 10px 0 20px 16px !important;
              }

            hui-horizontal-stack-card$: |
              #root {
                overflow-x: auto;
                width: 100% !important;
                gap: 5px !important;

                button-card {
                  flex: 0 0 100px !important;
                }
              }
        card:
          type: custom:auto-entities
          card:
            type: entities
            card_mod:
              style: |
                ha-card #states {
                  display: flex !important;
                  padding: 0 !important;
                  gap: 5px !important;
                  overflow-x: auto !important;
                  flex-direction: initial !important;

                  &::-webkit-scrollbar {
                    display: none !important;
                  }

                  > div {
                    margin: 0 !important;
                  }
                }
          filter:
            include:
              - group: group.room_sensors
                state: "on"
                options:
                  secondary_info: last-changed
                  type: custom:button-card
                  template: occupied_room_card
          sort:
            method: last_changed
            reverse: true
            ignore_case: true
            numeric: false


  # 
  # Overview section
  # Includes Interior Lights, Exterior Lights, Exterior Doors, Windows
  # 
  - type: custom:button-card
    template: section_title
    name: Overview

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: light.interior_lights
        name: Interior Lights
        template: kohbo_device_entity
        icon: kohbo:kohbo-light
        state_display: >
          [[[
            if (states['light.interior_lights'].state == "on")
              return `${states['sensor.interior_lights_on'].state} Lights On`
            else
              return "Off"
          ]]]
        # tap_action:
        #   action: navigate
        #   navigation_path: '/dashboard-kohbo/interior-lights'

      - type: custom:button-card
        entity: light.exterior_lights
        name: Exterior Lights
        template: kohbo_device_entity
        icon: kohbo:kohbo-lamp
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/exterior-lighting'
          haptic: light

      # Main floor HVAC
      - type: custom:button-card
        entity: climate.nest_main_floor
        name: Main Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#main_floor_thermostat'
          haptic: light

      # Upper floor HVAC
      - type: custom:button-card
        entity: climate.nest_2nd_floor
        name: Upper Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#upper_floor_thermostat'
          haptic: light

      # Exterior Doors
      - type: custom:button-card
        entity: binary_sensor.exterior_doors
        name: Exterior Doors
        template: kohbo_device_entity
        icon: |
          [[[
            if (entity.state == "on")
              return "kohbo:kohbo-door-open"
            else
              return "kohbo:kohbo-door-closed"
          ]]]
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/security-exterior-doors'
          haptic: light

      # Windows
      - type: custom:button-card
        entity: binary_sensor.windows
        name: Windows
        template: kohbo_device_entity
        icon: >
          [[[
            if (entity.state == "on")
              return "kohbo:kohbo-window-open"
            else
              return "kohbo:kohbo-window-closed"
          ]]]
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/security-windows'
          haptic: light

      # Main Floor Vacuum
      - type: custom:button-card
        entity: vacuum.main_floor_vacuum
        name: Main Floor Vacuum
        template: kohbo_device_entity
        icon: mdi:robot-vacuum
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/main-floor-vacuum'
          haptic: light

      # # Upstairs Vacuum
      # - type: custom:button-card
      #   entity: vacuum.upstairs_robot_vacuum
      #   name: Upstairs Vacuum
      #   template: kohbo_device_entity
      #   icon: mdi:robot-vacuum



  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack.yaml
    entities:
      - entity: input_boolean.speech_notifications
        icon: kohbo:kohbo-announcement
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.lighting_automations
        icon: kohbo:kohbo-light-2
        name: Lighting Automations
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.camera_notifications
        icon: kohbo:kohbo-notification
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml

  # 
  # People
  # 
  - type: vertical-stack
    cards: !include /config/dashboards/kohbo/shared/people.yaml


  # 
  # Main Floor Thermostat Popup
  # 
  - !include /config/dashboards/kohbo/climate/_main_floor_thermostat_popup.yaml

  
  # 
  # Upper Floor Thermostat Popup
  # 
  - !include /config/dashboards/kohbo/climate/_upper_floor_thermostat_popup.yaml

  
  # 
  # Vacuum Running Notification
  # 
  - !include /config/dashboards/kohbo/home/_vacuum_active_notification.yaml
    
  
  #
  # Camera Notification
  # 
  - !include /config/dashboards/kohbo/home/_front_door_camera_notification.yaml


  # 
  # Driveway Front Camera Notification
  # 
  - !include /config/dashboards/kohbo/home/_driveway_front_camera_notification.yaml


  # 
  # Front Door Camera Popup
  # 
  - !include /config/dashboards/kohbo/security/cameras/_front_door_camera_popup.yaml


  # 
  # Driveway Front Camera Popup
  # 
  - !include /config/dashboards/kohbo/security/cameras/_driveway_front_camera_popup.yaml


  # 
  # Notifications Popup
  # 
  - !include /config/dashboards/kohbo/shared/kohbo_notification_popup.yaml


  # 
  # Weather Popup
  # 
  - !include /config/dashboards/kohbo/climate/weather_popup.yaml


  # 
  # House Mode Popup
  # 
  - !include /config/dashboards/kohbo/home/house_mode_popup.yaml
