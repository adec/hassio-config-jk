  # 
  # Security Overview
  # 
  - !include /config/dashboards/templates/button_cards/cards/kohbo_security_overview.yaml

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - room_name: Indoor
      - temperature_sensor: sensor.average_indoor_temperature
      - humidity_sensor: sensor.average_indoor_humidity
      - pm25_sensor: sensor.indoor_air_quality_pm2_5
      - carbon_dioxide_sensor: sensor.indoor_air_quality_co2
      - vocs_sensor: sensor.indoor_air_quality_tvoc
      - aqi_score_sensor: sensor.indoor_air_quality_score
      - action_cards:
        # Open windows details
        - type: custom:button-card
          template: kohbo_chip_icon_action_card
          icon: mdi:chevron-right
          tap_action:
            action: navigate
            navigation_path: "/dashboard-kohbo/climate"
            haptic: light

  # 
  # Occupied Rooms
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: >
          [[[
            const occupiedRoomsCount = states['sensor.house'].attributes.occupied_rooms_count;
            return `${occupiedRoomsCount} Rooms Occupied `;
          ]]]

      - type: custom:mod-card
        card_mod:
          style:
            .: |
              ha-card {
                padding: 10px 0 20px 16px !important;
              }

            hui-horizontal-stack-card$: |
              #root {
                overflow-x: auto;
                width: 100% !important;
                gap: 5px !important;

                button-card {
                  flex: 0 0 100px !important;
                }
              }
        card:
          type: custom:auto-entities
          card:
            type: entities
            card_mod:
              style: |
                ha-card #states {
                  display: flex !important;
                  padding: 0 !important;
                  gap: 5px !important;
                  overflow-x: auto !important;
                  flex-direction: initial !important;

                  &::-webkit-scrollbar {
                    display: none !important;
                  }

                  > div {
                    margin: 0 !important;
                  }
                }
          filter:
            include:
              - group: group.room_sensors
                state: "on"
                options:
                  secondary_info: last-changed
                  type: custom:button-card
                  template: occupied_room_card
          sort:
            method: last_changed
            reverse: true
            ignore_case: true
            numeric: false


  # 
  # Overview section
  # Includes Interior Lights, Exterior Lights, Exterior Doors, Windows
  # 
  - type: custom:button-card
    template: section_title
    name: Overview

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: light.interior_lights
        name: Interior Lights
        template: kohbo_device_entity
        icon: kohbo:kohbo-light
        state_display: >
          [[[
            if (states['light.interior_lights'].state == "on")
              return `${states['sensor.interior_lights_on'].state} Lights On`
            else
              return "Off"
          ]]]
        # tap_action:
        #   action: navigate
        #   navigation_path: '/dashboard-kohbo/interior-lights'

      - type: custom:button-card
        entity: light.exterior_lights
        name: Exterior Lights
        template: kohbo_device_entity
        icon: kohbo:kohbo-lamp
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/exterior-lighting'
          haptic: light

      # Main floor HVAC
      - type: custom:button-card
        entity: climate.nest_main_floor
        name: Main Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#main_floor_thermostat'
          haptic: light

      # Upper floor HVAC
      - type: custom:button-card
        entity: climate.nest_2nd_floor
        name: Upper Floor
        template: kohbo_thermostat_entity
        tap_action:
          action: navigate
          navigation_path: '#upper_floor_thermostat'
          haptic: light

      # Exterior Doors
      - type: custom:button-card
        entity: binary_sensor.exterior_doors
        name: Exterior Doors
        template: kohbo_device_entity
        icon: |
          [[[
            if (entity.state == "on")
              return "kohbo:kohbo-door-open"
            else
              return "kohbo:kohbo-door-closed"
          ]]]
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/security-exterior-doors'
          haptic: light

      # Windows
      - type: custom:button-card
        entity: binary_sensor.windows
        name: Windows
        template: kohbo_device_entity
        icon: >
          [[[
            if (entity.state == "on")
              return "kohbo:kohbo-window-open"
            else
              return "kohbo:kohbo-window-closed"
          ]]]
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/security-windows'
          haptic: light

      # Main Floor Vacuum
      - type: custom:button-card
        entity: vacuum.main_floor_vacuum
        name: Main Floor Vacuum
        template: kohbo_device_entity
        icon: mdi:robot-vacuum
        tap_action:
          action: navigate
          navigation_path: '/dashboard-kohbo/main-floor-vacuum'
          haptic: light

      # # Upstairs Vacuum
      # - type: custom:button-card
      #   entity: vacuum.upstairs_robot_vacuum
      #   name: Upstairs Vacuum
      #   template: kohbo_device_entity
      #   icon: mdi:robot-vacuum



  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_vertical_stack.yaml
    entities:
      - entity: input_boolean.speech_notifications
        icon: kohbo:kohbo-announcement
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.lighting_automations
        icon: kohbo:kohbo-light-2
        name: Lighting Automations
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      - entity: input_boolean.camera_notifications
        icon: kohbo:kohbo-notification
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml

  # 
  # People
  # 
  - type: vertical-stack
    cards: !include /config/dashboards/kohbo/shared/people.yaml


