type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#office'
    styles: !include /config/dashboards/templates/includes/people/kohbo_person_popup_styles.yaml

  - type: custom:button-card
    template: kohbo_page_title
    name: Office

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    card_mod:
      style:
        # layout-card $ grid-layout $: "#root { --masonry-view-card-margin: 0; }"
        layout-card $ grid-layout $: |
          #root {
            --masonry-view-card-margin: 0;
            --horizontal-stack-card-gap: 8px;
          }
          
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
      cards:
        - type: horizontal-stack
          cards:            
            - type: custom:mushroom-chips-card
              # card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
              chips:
                - type: template
                  card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                  icon: >
                    {% if states(entity) == 'Auto' %}
                      kohbo:kohbo-house-auto
                    {% elif states(entity) == 'Off' %}
                      kohbo:kohbo-house-away
                    {% elif states(entity) == 'DnD' %}
                      kohbo:kohbo-dnd-on
                    {% endif %}
                  icon_color: >
                    {% if states(entity) == 'DnD' %}
                      red
                    {% elif states(entity) == 'Off' %}
                      light-grey
                    {% else %}
                      primary
                    {% endif %}
                  content: "{{ states(entity) }}"
                  entity: input_select.office

                - type: template
                  card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod_occupancy.yaml
                  icon: mdi:circle
                  entity: input_boolean.office_occupied
                  content: "{{ 'Occupied' if states(entity) == 'on' else 'Unoccupied' }}"
                  icon_color: >
                    {% if states(entity) == 'on' %}
                      primary
                    {% else %}
                      light-grey
                    {% endif %}


        - type: custom:mod-card
          style:
            hui-horizontal-stack-card$: |
              #root {
                display: flex;
                justify-content: flex-end;
                align-items: flex-end;
              }
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.john_koht
                template: kohbo_person_entity
                tap_action:
                  action: navigate
                  navigation_path: '#john'
                visibility:
                  - condition: state
                    entity: sensor.john_room_presence
                    state: "office"
              - type: custom:button-card
                entity: person.cristina_falbo
                template: kohbo_person_entity
                tap_action:
                  action: navigate
                  navigation_path: '#cristina'
                visibility:
                  - condition: state
                    entity: sensor.cristina_room_presence
                    state: "office"
              - type: custom:button-card
                entity: person.mary_falbo
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: sensor.mary_room_presence
                    state: "office"
              - type: custom:button-card
                entity: person.katia
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: sensor.katia_room_presence
                    state: "office"




                    
    
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: custom:mushroom-light-card
    entity: light.office_lights
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info

  - type: custom:mushroom-light-card
    entity: light.office_el_gato_light
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info

  - type: custom:mushroom-light-card
    entity: light.office_shelves
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info

  
