type: custom:vertical-layout
title: Rooms
path: rooms
theme: kohbo
layout: !include /config/dashboards/templates/includes/kohbo_screen_layout.yaml
cards:
  - type: custom:button-card
    template: kohbo_page_title
    name: Rooms

  - type: custom:simple-tabs
    pre-load: true
    alignment: center
    border-color: transparent
    active-background: transparent
    tabs:
        - title: Main
          card: !include /config/dashboards/kohbo/rooms/partials/main_floor_room_cards.yaml
        - title: Upper
          card: !include /config/dashboards/kohbo/rooms/partials/upper_floor_room_cards.yaml
        - title: Laundry
          card: !include /config/dashboards/kohbo/rooms/partials/laundry_room_cards.yaml
        - title: Exterior
          card: !include /config/dashboards/kohbo/rooms/partials/exterior_room_cards.yaml
        - title: More
          card: !include /config/dashboards/kohbo/rooms/partials/more_room_cards.yaml

  
  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml

  # 
  # Office Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_office
      - hash: '#office_media_player'

  # 
  # Kitchen Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_kitchen
      - hash: '#kitchen_media_player'

  # 
  # Dining Room Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_living_room
      - hash: '#dining_room_media_player'

  # 
  # Family Room Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_family_room
      - hash: '#family_room_media_player'

  # 
  # Playroom Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_playroom
      - hash: '#playroom_media_player'
