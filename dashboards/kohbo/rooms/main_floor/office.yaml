  #           variables:
  #             - scene_id: 035b6ecf-414e-4781-abc7-3911556097cb

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Concentrate
  #           variables:
  #             - scene_id: 0cbec4e8-d064-4457-986a-fe6078a63f39

  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Tokyo
  #           variables:
  #             - scene_id: de7eda64-84bf-4ed6-a4fa-76e0ebdd1968

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Soho
  #           variables:
  #             - scene_id: 3580a7b2-ef38-4f34-bb5b-6416dde9df81

  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Tyrell
  #           variables:
  #             - scene_id: 66893c7e-4535-46d4-b9c7-fb6f5a80faa9

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Resplendent
  #           variables:
  #             - scene_id: ce4a5344-e052-43da-904a-123d7c024bf3


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.sonos_office
      - room_name: Office
      - navigation_path: '#office_media_player'
  
  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: fan.office_air_purifier
        name: Air Purifier
        template: kohbo_device_air_purifier_entity

      - type: custom:button-card
        entity: switch.smart_plug_11_switch
        name: Desk Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_11_active_power
          confirmation: true
    
      - type: custom:button-card
        entity: binary_sensor.office_doors
        name: Doors
        template: kohbo_device_door_entity
        state_display: >
          [[[
            if (entity.state == "on")
              if (states['binary_sensor.office_door_left_status'].state == "on" && states['binary_sensor.office_door_right_status'].state == "on")
                return "Open";
              else if (states['binary_sensor.office_door_left_status'].state == "on")
                return "Left Door Open";
              else if (states['binary_sensor.office_door_right_status'].state == "on")
                return "Right Door Open";
            else
              return "Closed";
          ]]]
        

      - type: custom:button-card
        entity: binary_sensor.office_window_sensor
        name: Window
        template: kohbo_device_window_entity
        
  
  # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # Air Quality Sensor Detections
      - entity: automation.office_air_quality_detections
        name: Air Quality Automations
        icon: mdi:air-filter
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Music Automation
      - entity: automation.office_music_resume
        name: Music Automation
        icon: mdi:music-note
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Deep Work Lighting
      - entity: automation.office_shelf_lights_turn_on_deep_work_lighting
        name: Deep Work Lighting
        icon: mdi:lightbulb-variant
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Treadmill Off
      - entity: automation.office_treadmill_off
        name: Treadmill Off
        icon: mdi:walk
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # DnD Toggle
      - entity: input_boolean.office_dnd
        name: Do Not Disturb
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Guest Mode Toggle
      - entity: input_boolean.office_guest_mode
        name: Guest Mode
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      - entity: input_boolean.office_speech_notifications
        name: Speech Notifications
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.office_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_office
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_office
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # BLE Base Station
      - type: custom:template-entity-row
        icon: mdi:bluetooth
        name: BLE Base Station
        entity: binary_sensor.espresense_office
        state: "{{ 'Connected' if states['binary_sensor.espresense_office'].state == 'on' else 'Disconnected' }}"
        secondary: "{{ states['binary_sensor.espresense_office'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.office_aqara_occupancy
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.office_aqara_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.office_aqara_motion_sensor
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.office_aqara_motion_sensor'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml


  # 
  # Ceiling Lights Pop Up
  # 
  - type: custom:decluttering-card
    template: light_popup
    variables:
      - light_entity: light.office_lights
      - popup_hash: '#office_ceiling_lights'
      - popup_title: 'Ceiling Lights'
      - entity_id: 
        - light.office_1
        - light.office_2
        - light.office_3
        - light.office_4
          

  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_office
      - hash: '#office_media_player'


  # 
  # Office Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_page_title
        name: Office Settings

  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml