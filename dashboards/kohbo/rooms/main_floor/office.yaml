type: custom:vertical-layout
title: Office
path: rooms-office
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:decluttering-card
    template: room_page_top_toolbar
    variables:
      - name: Office
      - navigation_path: /dashboard-kohbo/rooms-main-floor
      - settings_path: '#office_settings_popup'
  
  # 
  # Room Overview
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - occupancy: input_boolean.office_occupied
      - mode: input_select.office
      - ble_presence: sensor.office_people_list


  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview_linkable
    variables:
      - temperature_sensor: sensor.office_awair_temperature
      - humidity_sensor: sensor.office_awair_humidity
      - carbon_dioxide_sensor: sensor.office_awair_carbon_dioxide
      - vocs_sensor: sensor.office_awair_vocs
      - pm25_sensor: sensor.office_awair_pm2_5
      - room_name: Office
      - navigation_path: '#office_climate_popup'
                    
  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  # Ceiling Lights
  - type: tile
    entity: light.office_lights
    name: Ceiling Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
    tap_action:
      action: navigate
      navigation_path: '#office_ceiling_lights'
      haptic: light
  
  # Desk Lamp
  - type: tile
    entity: light.office_el_gato_light
    name: Desk Lamp
    icon: mdi:desk-lamp
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # Shelf Lights
  - type: tile
    entity: light.office_shelves
    name: Shelf Lights
    icon: kohbo:kohbo-device-string-light
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # - type: custom:simple-swipe-card
  #   view_mode: carousel
  #   card_min_width: 400
  #   card_spacing: 14
  #   show_pagination: false
  #   auto_hide_pagination: 0
