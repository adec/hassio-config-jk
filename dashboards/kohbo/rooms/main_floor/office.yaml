  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Read
  #           variables:
  #             - scene_id: 035b6ecf-414e-4781-abc7-3911556097cb

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Concentrate
  #           variables:
  #             - scene_id: 0cbec4e8-d064-4457-986a-fe6078a63f39

  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Tokyo
  #           variables:
  #             - scene_id: de7eda64-84bf-4ed6-a4fa-76e0ebdd1968

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Soho
  #           variables:
  #             - scene_id: 3580a7b2-ef38-4f34-bb5b-6416dde9df81

  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Tyrell
  #           variables:
  #             - scene_id: 66893c7e-4535-46d4-b9c7-fb6f5a80faa9

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Resplendent
  #           variables:
  #             - scene_id: ce4a5344-e052-43da-904a-123d7c024bf3


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.sonos_office
      - room_name: Office
      - navigation_path: '#office_media_player'
  
  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: fan.office_air_purifier
        name: Air Purifier
        template: kohbo_device_air_purifier_entity

      - type: custom:button-card
        entity: switch.smart_plug_11_switch
        name: Desk Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_11_active_power
          confirmation: true
      
      # Awair AQI
      - type: custom:button-card
        entity: sensor.office_awair_score
        name: Awair AQI
        template: kohbo_device_aqi_entity
    
      - type: custom:button-card
        entity: binary_sensor.office_doors
        name: Doors
        template: kohbo_device_door_entity
        state_display: >
          [[[
            if (entity.state == "on")
              if (states['binary_sensor.office_door_left_status'].state == "on" && states['binary_sensor.office_door_right_status'].state == "on")
                return `Open - ${variables.last_changed}`;
              else if (states['binary_sensor.office_door_left_status'].state == "on")
                return "Left Door Open";
              else if (states['binary_sensor.office_door_right_status'].state == "on")
                return "Right Door Open";
            else
              return `Closed - ${variables.last_changed}`;
          ]]]
        

      - type: custom:button-card
        entity: binary_sensor.office_window_sensor
        name: Window
        template: kohbo_device_window_entity
        
  

  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # DnD Toggle
      - entity: input_boolean.office_dnd
        name: Do Not Disturb
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Guest Mode Toggle
      - entity: input_boolean.office_guest_mode
        name: Guest Mode
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      - entity: input_boolean.office_speech_notifications
        name: Speech Notifications
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.office_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_office
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_office
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Ceiling Lights Pop Up
  # 
  - type: custom:decluttering-card
    template: light_popup
    variables:
      - light_entity: light.office_lights
      - popup_hash: '#office_ceiling_lights'
      - popup_title: 'Ceiling Lights'
      - entity_id: 
        - light.office_1
        - light.office_2
        - light.office_3
        - light.office_4
          

  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_office
      - hash: '#office_media_player'


  # 
  # Office Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 900px)
        margin_top_desktop: calc(100vh - 900px)
        
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Settings

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Automations
      
      - type: entities
        entities:
          # Air Quality Sensor Detections
          - entity: automation.office_air_quality_detections
            name: Air Quality Automations
            icon: mdi:air-filter
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Music Automation
          - entity: automation.office_music_resume
            name: Music Automation
            icon: mdi:music-note
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Deep Work Lighting
          - entity: automation.office_shelf_lights_turn_on_deep_work_lighting
            name: Deep Work Lighting
            icon: mdi:lightbulb-variant
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Treadmill Off
          - entity: automation.office_treadmill_off
            name: Treadmill Off
            icon: mdi:walk
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Clean Office When Rio is at Daycare
          - entity: automation.vacuum_clean_office_when_dog_is_at_daycare
            name: Clean Office When Rio is at Daycare
            icon: mdi:dog
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Clean Office at Night
          - entity: input_boolean.vacuum_office_at_night
            name: Clean at Night
            icon: mdi:robot-vacuum
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

      # 
      # Sensors
      # 
      - type: custom:button-card
        template: section_title
        name: Sensors
      - type: entities
        entities:
          # BLE Base Station
          - entity: binary_sensor.espresense_office
            icon: mdi:bluetooth
            name: BLE Base Station
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Occupancy Sensor
          - entity: binary_sensor.office_aqara_occupancy
            icon: kohbo:kohbo-room-occupancy
            name: Occupancy Sensor
            secondary_info: last-changed
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          # Motion Sensor
          - entity: binary_sensor.office_aqara_motion_sensor
            icon: mdi:motion-sensor
            name: Motion Sensor
            secondary_info: last-changed
            state_color: true
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_generic_styles.yaml

          - type: custom:template-entity-row
            icon: mdi:air-filter
            name: Air Purifier Filter Life
            entity: sensor.office_air_purifier_filter_life
            state: "{{ states[config.entity].state }}%"
            secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
            card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
            # color: green
            color: >
              {% set filter_left = states[config.entity].state | int(0) %}
              {% if filter_left < 20 %}
                var(--error-color)
              {% else %}
                var(--success-color)
              {% endif %}

  
  # 
  # Office Climate Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_climate_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 750px)
        margin_top_desktop: calc(100vh - 750px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Climate
      
      - type: custom:button-card
        template: kohbo_horizontal_info_card
        entity: sensor.office_air_quality
        label: Office Air Quality Overview
        state:
          - value: "Acceptable"
            icon: mdi:check-decagram
            color: var(--primary-color)
          - value: "Moderate"
            icon: mdi:alert-circle
            color: var(--warning-color)
          - value: "Unhealthy"
            icon: mdi:alert
            color: var(--error-color)
          - value: "Hazardous"
            icon: mdi:alert
            color: var(--error-color)
        state_display: |
          [[[
            return `${entity.state} Air Quality`
          ]]]
      

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.office_awair_temperature
            name: Temperature
            card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
            hours_to_show: 12
            points_per_hour: 2
            line_width: 4
            decimals: 0
            lower_bound: 0
            smoothing: true
            color_thresholds_transition: smooth
            color_thresholds:
              - color: "#59A5D8"
                value: 14
              - color: "#ADD2EB"
                value: 45
              - color: "#06D6A0"
                value: 67
              - color: "#FFD166"
                value: 78
              - color: "#ED4747"
                value: 90

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.office_awair_score
            name: AQI Score
            card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
            hours_to_show: 12
            points_per_hour: 4
            line_width: 4
            decimals: 0
            smoothing: true
            color_thresholds_transition: smooth
            color_thresholds:
              - color: "#6155F5"
                value: 0
              - color: "#ED4747"
                value: 20
              - color: "#E36001"
                value: 40
              - color: "#FFD166"
                value: 60
              - color: "#06D6A0"
                value: 100
                
          # Humidity
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: Humidity
              - entity: sensor.office_awair_humidity
              - icon: mdi:water-percent
              - value_1: 14
              - value_2: 25
              - value_3: 40
              - value_4: 65
              - value_5: 90
          
          # Carbon Dioxide
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: Carbon Dioxide
              - entity: sensor.office_awair_carbon_dioxide
              - icon: mdi:molecule-co2
              - value_1: 600 # blue / acceptable
              - value_2: 1000 # light blue / moderate
              - value_3: 5 # green / great
              - value_4: 2000 # yellow / poor
              - value_5: 4500 # red / hazardous

          # VOCs
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: VOCs
              - entity: sensor.office_awair_vocs
              - icon: mdi:molecule
              - value_1: 300 # blue / acceptable
              - value_2: 500 # light blue / moderate
              - value_3: 5 # green / great
              - value_4: 3000 # yellow / poor
              - value_5: 25000 # red / hazardous

          # PM2.5
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: PM2.5
              - entity: sensor.office_awair_pm2_5
              - icon: phu:pm2-5
              - value_1: 12 # blue / acceptable
              - value_2: 35 # light blue / moderate
              - value_3: 5 # green / great
              - value_4: 55 # yellow / poor
              - value_5: 150 # red / hazardous

  
  
  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml