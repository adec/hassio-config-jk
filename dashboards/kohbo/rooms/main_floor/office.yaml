        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_office
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_office
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # BLE Base Station
      - type: custom:template-entity-row
        icon: mdi:bluetooth
        name: BLE Base Station
        entity: binary_sensor.espresense_office
        state: "{{ 'Connected' if states['binary_sensor.espresense_office'].state == 'on' else 'Disconnected' }}"
        secondary: "{{ states['binary_sensor.espresense_office'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.office_aqara_occupancy
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.office_aqara_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
