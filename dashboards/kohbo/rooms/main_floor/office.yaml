type: custom:vertical-layout
title: Office
path: office
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_nested_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        # Back button
        - type: custom:button-card
          template: kohbo_page_back_button
          tap_action:
            action: navigate
            navigation_path: /dashboard-kohbo/rooms
        # Settings button
        - type: custom:button-card
          template: kohbo_page_settings_button
          tap_action:
            action: navigate
            navigation_path: "#office_settings_popup"

            
  # 
  # Room Header
  # 
  - type: custom:decluttering-card
    template: room_header
    variables:
      - room_name: Office
      - room: "office"


  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - mode: input_select.office
      - occupancy: input_boolean.office_occupied
      - room: "office"


  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - temperature_sensor: sensor.office_awair_temperature
      - humidity_sensor: sensor.office_awair_humidity
      - carbon_dioxide_sensor: sensor.office_awair_carbon_dioxide
      - vocs_sensor: sensor.office_awair_vocs
      - pm25_sensor: sensor.office_awair_pm2_5
      - room_name: Office

                    
  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  # Ceiling Lights
  - type: tile
    entity: light.office_lights
    name: Ceiling Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
    tap_action:
      action: navigate
      navigation_path: '#office_ceiling_lights'
  
  # Desk Lamp
  - type: tile
    entity: light.office_el_gato_light
    name: Desk Lamp
    icon: mdi:desk-lamp
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # Shelf Lights
  - type: tile
    entity: light.office_shelves
    name: Shelf Lights
    icon: kohbo:kohbo-device-string-light
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # - type: custom:simple-swipe-card
  #   view_mode: carousel
  #   card_min_width: 400
  #   card_spacing: 14
  #   show_pagination: false
  #   auto_hide_pagination: 0
  #   loop_mode: none
  #   cards:
  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
