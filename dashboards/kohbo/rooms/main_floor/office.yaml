type: custom:vertical-layout
title: Office
path: office
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/layouts/kohbo_nested_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        # Back button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:arrow-left
          tap_action:
            action: navigate
            navigation_path: /dashboard-kohbo/rooms-main-floor
        
        # Room Name
        - type: custom:button-card
          template: kohbo_header_page_title
          name: Office

        # Settings button
        - type: custom:button-card
          template: kohbo_header_chip_card
          icon: mdi:cog
          icon_color: var(--secondary-text-color)
          tap_action:
            action: navigate
            navigation_path: '#office_settings_popup'

            
  # 
  # Room Overview
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - occupancy: input_boolean.office_occupied
      - mode: input_select.office
      - ble_presence: sensor.office_people_list


  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview_linkable
    variables:
      - temperature_sensor: sensor.office_awair_temperature
      - humidity_sensor: sensor.office_awair_humidity
      - carbon_dioxide_sensor: sensor.office_awair_carbon_dioxide
      - vocs_sensor: sensor.office_awair_vocs
      - pm25_sensor: sensor.office_awair_pm2_5
      - room_name: Office
      - navigation_path: '#office_climate_popup'
                    
  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  # Ceiling Lights
  - type: tile
    entity: light.office_lights
    name: Ceiling Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
    tap_action:
      action: navigate
      navigation_path: '#office_ceiling_lights'
  
  # Desk Lamp
  - type: tile
    entity: light.office_el_gato_light
    name: Desk Lamp
    icon: mdi:desk-lamp
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # Shelf Lights
  - type: tile
    entity: light.office_shelves
    name: Shelf Lights
    icon: kohbo:kohbo-device-string-light
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # - type: custom:simple-swipe-card
  #   view_mode: carousel
  #   card_min_width: 400
  #   card_spacing: 14
  #   show_pagination: false
  #   auto_hide_pagination: 0
  #   loop_mode: none
  #   cards:
  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Read
  #           variables:
  #             - scene_id: 035b6ecf-414e-4781-abc7-3911556097cb

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Concentrate
  #           variables:
  #             - scene_id: 0cbec4e8-d064-4457-986a-fe6078a63f39

  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Tokyo
  #           variables:
  #             - scene_id: de7eda64-84bf-4ed6-a4fa-76e0ebdd1968

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Soho
  #           variables:
  #             - scene_id: 3580a7b2-ef38-4f34-bb5b-6416dde9df81

  #     - type: horizontal-stack
  #       cards:
  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Tyrell
  #           variables:
  #             - scene_id: 66893c7e-4535-46d4-b9c7-fb6f5a80faa9

  #         - type: custom:decluttering-card
  #           template: office_ceiling_lights_scenes_button
  #           name: Resplendent
  #           variables:
  #             - scene_id: ce4a5344-e052-43da-904a-123d7c024bf3


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.sonos_office
      - room_name: Office
      - navigation_path: '#office_media_player'
  
  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: fan.office_air_purifier
        name: Air Purifier
        template: kohbo_device_air_purifier_entity

      - type: custom:button-card
        entity: switch.smart_plug_11_switch
        name: Desk Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_11_active_power
          confirmation: true
      
      # Awair AQI
      - type: custom:button-card
        entity: sensor.office_awair_score
        name: Awair AQI
        template: kohbo_device_aqi_entity
    
      - type: custom:button-card
        entity: binary_sensor.office_doors
        name: Doors
        template: kohbo_device_door_entity
        state_display: >
          [[[
            if (entity.state == "on")
              if (states['binary_sensor.office_door_left_status'].state == "on" && states['binary_sensor.office_door_right_status'].state == "on")
                return "Open";
              else if (states['binary_sensor.office_door_left_status'].state == "on")
                return "Left Door Open";
              else if (states['binary_sensor.office_door_right_status'].state == "on")
                return "Right Door Open";
            else
              return "Closed";
          ]]]
        

      - type: custom:button-card
        entity: binary_sensor.office_window_sensor
        name: Window
        template: kohbo_device_window_entity
        
  

  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # DnD Toggle
      - entity: input_boolean.office_dnd
        name: Do Not Disturb
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Guest Mode Toggle
      - entity: input_boolean.office_guest_mode
        name: Guest Mode
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      - entity: input_boolean.office_speech_notifications
        name: Speech Notifications
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.office_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_office
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_office
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Ceiling Lights Pop Up
  # 
  - type: custom:decluttering-card
    template: light_popup
    variables:
      - light_entity: light.office_lights
      - popup_hash: '#office_ceiling_lights'
      - popup_title: 'Ceiling Lights'
      - entity_id: 
        - light.office_1
        - light.office_2
        - light.office_3
        - light.office_4
          

  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_office
      - hash: '#office_media_player'


  # 
  # Office Settings Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_settings_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 750px)
        margin_top_desktop: calc(100vh - 750px)
        
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Settings

      # 
      # Automations
      # 
      - type: custom:button-card
        template: section_title
        name: Automations
      
      - type: entities
        entities:
          # Air Quality Sensor Detections
          - entity: automation.office_air_quality_detections
            name: Air Quality Automations
            icon: mdi:air-filter
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Music Automation
          - entity: automation.office_music_resume
            name: Music Automation
            icon: mdi:music-note
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Deep Work Lighting
          - entity: automation.office_shelf_lights_turn_on_deep_work_lighting
            name: Deep Work Lighting
            icon: mdi:lightbulb-variant
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Treadmill Off
          - entity: automation.office_treadmill_off
            name: Treadmill Off
            icon: mdi:walk
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

          # Clean Office When Rio is at Daycare
          - entity: automation.vacuum_clean_office_when_dog_is_at_daycare
            name: Clean Office When Rio is at Daycare
            icon: mdi:dog
            card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
            secondary_info: last-changed
            state_color: true

      # 
      # Sensors
      # 
      - type: custom:button-card
        template: section_title
        name: Sensors
      - type: entities
        entities:
          # BLE Base Station
          - type: custom:template-entity-row
            icon: mdi:bluetooth
            name: BLE Base Station
            entity: binary_sensor.espresense_office
            state: "{{ 'Connected' if states['binary_sensor.espresense_office'].state == 'on' else 'Disconnected' }}"
            secondary: "{{ states['binary_sensor.espresense_office'].last_changed | relative_time }} ago"
            card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
            color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
            
          # Occupancy Sensor
          - type: custom:template-entity-row
            icon: kohbo:kohbo-room-occupancy
            name: Occupancy Sensor
            entity: binary_sensor.office_aqara_occupancy
            state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
            secondary: "{{ states['binary_sensor.office_aqara_occupancy'].last_changed | relative_time }} ago"
            card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
            color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

          # Motion Sensor
          - type: custom:template-entity-row
            icon: mdi:motion-sensor
            name: Motion Sensor
            entity: binary_sensor.office_aqara_motion_sensor
            state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
            secondary: "{{ states['binary_sensor.office_aqara_motion_sensor'].last_changed | relative_time }} ago"
            card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
            color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

  
  # 
  # Office Climate Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#office_climate_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 750px)
        margin_top_desktop: calc(100vh - 750px)

      - type: custom:button-card
        template: kohbo_popup_page_title
        name: Office Climate

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mini-graph-card
            entities:
              - entity: sensor.office_awair_temperature
              # - entity: sensor.office_awair_score
            name: Temperature
            card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
            hours_to_show: 12
            points_per_hour: 2
            line_width: 4
            decimals: 0
            smoothing: true
            color_thresholds_transition: smooth
            color_thresholds:
              - color: "#59A5D8"
                value: 14
              - color: "#ADD2EB"
                value: 45
              - color: "#06D6A0"
                value: 67
              - color: "#FFD166"
                value: 78
              - color: "#ED4747"
                value: 90

          - type: custom:mini-graph-card
            entities:
              - entity: sensor.office_awair_score
            name: AQI Score
            card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_graph_styles.yaml
            hours_to_show: 12
            points_per_hour: 4
            line_width: 4
            decimals: 0
            smoothing: true
            color_thresholds_transition: smooth
            color_thresholds:
              - color: "#6155F5"
                value: 0
              - color: "#ED4747"
                value: 20
              - color: "#E36001"
                value: 40
              - color: "#FFD166"
                value: 60
              - color: "#06D6A0"
                value: 100
                
          # Humidity
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: Humidity
              - entity: sensor.office_awair_humidity
              - icon: mdi:water-percent
          
          # Carbon Dioxide
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: Carbon Dioxide
              - entity: sensor.office_awair_carbon_dioxide
              - icon: mdi:molecule-co2

          # VOCs
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: VOCs
              - entity: sensor.office_awair_vocs
              - icon: mdi:molecule

          # PM2.5
          - type: custom:decluttering-card
            template: kohbo_room_temperature_card
            variables:
              - name: PM2.5
              - entity: sensor.office_awair_pm2_5
              - icon: phu:pm2-5

  
  
  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml