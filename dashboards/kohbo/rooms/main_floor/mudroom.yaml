type: custom:vertical-layout
title: Mudroom
path: mudroom
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_nested_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:            
        # Left side buttons
        - type: custom:mushroom-chips-card
          alignment: start
          chips:
            # Back button
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:arrow-left
              icon_color: var(--secondary-text-color)
              tap_action:
                action: navigate
                navigation_path: /dashboard-kohbo/rooms
        # Right side buttons
        - type: custom:mushroom-chips-card
          alignment: end
          chips:
            # Assist
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:comment-processing
              icon_color: var(--secondary-text-color)
              tap_action:
                action: assist
            # Settings button
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:cog
              icon_color: var(--secondary-text-color)
              tap_action:
                action: navigate
                navigation_path: "#mudroom_settings_popup"
  
  # 
  # Room Header
  # 
  - type: custom:decluttering-card
    template: room_header
    variables:
      - room_name: Mudroom
      - room: "mudroom"

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    style: !include /config/dashboards/templates/includes/card_mod/chips/page_chip_layout.yaml
    card:
      type: horizontal-stack
      cards:
        # Mudroom Mode
        - type: custom:button-card
          template: kohbo_chip_card_room_mode
          entity: input_select.mudroom
        # Mudroom Occupancy
        - type: custom:button-card
          template: kohbo_chip_card_room_occupancy
          entity: input_boolean.mudroom_occupied
        # Mudroom Motion
        - type: custom:button-card
          template: kohbo_chip_card
          entity: binary_sensor.mudroom_motion_sensor_motion_detection
          show_state: false
        # Vacuum the mudroom now
        - type: custom:button-card
          template: kohbo_chip_card
          entity: vacuum.roborock_s7
          show_state: false
          tap_action:
            action: perform-action
            perform_action: script.main_level_vacuum_clean_selected_rooms
            data:
              rooms: 
                - mudroom

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_temperature_only
    variables:
      - temperature_sensor: sensor.mudroom_motion_sensor_air_temperature
      - room_name: Mudroom

  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  # Ceiling Lights
  - type: tile
    entity: light.mudroom_main_lights
    name:  Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      # Garage Door Lock
      - type: custom:button-card
        entity: lock.garage_entry_door
        name: Garage Door Lock
        template: kohbo_device_entity
      
      # Interior Garage Door
      - type: custom:button-card
        entity: binary_sensor.interior_garage_door
        name: Interior Garage Door
        template: kohbo_device_door_entity


  # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # Garage Entry Door - Unlock Upon Arrival
      - entity: automation.garage_entry_door_unlock_upon_arrival
        name: Unlock Upon Arrival
        icon: mdi:door-open
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      # Autolock Garage Entry Door
      - entity: automation.garage_entry_door_lock_at_bedtime
        name: Autolock Garage Entry Door
        icon: mdi:lock
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_mudroom_laundry
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_mudroom_laundry
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.mudroom_motion_sensor_motion_detection
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Illuminance
      - type: custom:template-entity-row
        icon: mdi:brightness-5
        name: Illuminance
        entity: sensor.mudroom_motion_sensor_illuminance
        state: "{{ states[config.entity].state }} lx"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      - type: custom:template-entity-row
        # icon: mdi:battery
        icon: !include /config/dashboards/templates/includes/people/kohbo_person_battery_icon.yaml
        name: Lock Battery Level
        entity: sensor.garage_entry_door_battery_level
        state: "{{ states[config.entity].state }}%"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/people/kohbo_person_battery_icon_color.yaml

      
        

  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml