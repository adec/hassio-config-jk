type: custom:vertical-layout
title: Dining Room
path: dining-room
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_screen_layout.yaml
cards:
  - type: custom:button-card
    template: kohbo_page_title
    name: Dining Room

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - mode: input_select.dining_room
      - occupancy: input_boolean.dining_room_occupied
      - room: "dining_room"


  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: custom:mushroom-light-card
    entity: light.dining_room_main_lights
    name: South Lights
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info

  - type: custom:mushroom-light-card
    entity: light.living_room_main_lights
    name: North Lights
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: "custom:mediocre-media-player-card"
    entity_id: media_player.sonos_living_room
    tap_opens_popup: true
    card_mod:
      style: |
        .mmpc-1pnwwh8 {
          align-items: end !important;
        }
    ma_entity_id: media_player.sonos_living_room
    speaker_group:
      entities:
        - media_player.sonos_kitchen
        - media_player.sonos_office
        - media_player.sonos_living_room
        - media_player.sonos_main_bedroom
        - media_player.sonos_playroom
        - media_player.sonos_patio
        - media_player.sonos_pool
        - media_player.sonos_gazebo
        - media_player.sonos_family_room

  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: switch.smart_plug_9_switch
        name: East Wall Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_9_active_power
          confirmation: true

      - type: custom:button-card
        entity: switch.smart_plug_21_switch
        name: Bay Window Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_21_power
          confirmation: true


   # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # Vacuum Clean Dining and Foyer at Night
      - entity: automation.vacuum_clean_dining_and_foyer_at_night
        name: Clean at Night (every 2 days)
        icon: mdi:robot-vacuum
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # # Speech Notifications Toggle
      # - entity: input_boolean.family_room_speech_notifications
      #   name: Speech Notifications
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.dining_room_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # # Adaptive Lighting Toggle
      # - entity: switch.adaptive_lighting_family_room
      #   name: Adaptive Lighting
      #   icon: mdi:theme-light-dark
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # # Adaptive Lighting Toggle
      # - entity: switch.adaptive_lighting_sleep_mode_family_room
      #   name: Adaptive Lighting Sleep Mode
      #   icon: mdi:theme-light-dark
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true


  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.dining_room_north_motion_sensor_occupancy
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.dining_room_north_motion_sensor_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.dining_room_north_motion_sensor_motion
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.dining_room_north_motion_sensor_motion'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml