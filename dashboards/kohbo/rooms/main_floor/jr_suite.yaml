type: custom:vertical-layout
title: Jr. Suite
path: jr-suite
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_nested_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  # - type: horizontal-stack
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        # Back button
        - type: custom:button-card
          template: kohbo_page_back_button
          tap_action:
            action: navigate
            navigation_path: /dashboard-kohbo/rooms
        # Settings button
        # - type: custom:button-card
        #   template: kohbo_page_settings_button
        #   tap_action:
        #     action: navigate
        #     navigation_path: "#jr_suite_settings_popup"
  

  # 
  # Room Header
  # 
  - type: custom:decluttering-card
    template: room_header
    variables:
      - room_name: Jr. Suite
      - room: "jr_suite"

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - mode: input_select.jr_suite
      - occupancy: input_boolean.jr_suite_occupied
      - room: "jr_suite"

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - temperature_sensor: sensor.jr_suite_awair_temperature
      - humidity_sensor: sensor.jr_suite_awair_humidity
      - carbon_dioxide_sensor: sensor.jr_suite_awair_carbon_dioxide
      - vocs_sensor: sensor.jr_suite_awair_vocs
      - pm25_sensor: sensor.jr_suite_awair_pm2_5
      - room_name: Jr. Suite

  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.jr_suite_bedroom_main_lights
    name: Main Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      # Air Purifier
      - type: custom:button-card
        entity: fan.jr_suite_air_purifier
        name: Air Purifier
        template: kohbo_device_air_purifier_entity

      # Awair AQI
      - type: custom:button-card
        entity: sensor.jr_suite_awair_score
        name: Awair AQI
        template: kohbo_device_entity
        icon: mdi:blur\

      # Radiant Heating
      - type: custom:button-card
        entity: climate.jr_suite
        name: Radiant Heating
        template: kohbo_device_entity
        icon: mdi:radiator

      # Desk Outlet
      - type: custom:button-card
        entity: switch.smart_plug_22_switch
        name: Desk Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_22_power
          confirmation: true

      # Door
      - type: custom:button-card
        entity: binary_sensor.jr_suite_door_status
        name: Door
        template: kohbo_device_door_entity


  # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # Air Quality Sensor Detections
      - entity: automation.jr_suite_air_quality_sensor_detections
        name: Air Quality Automations
        icon: mdi:air-filter
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # # 
  # # Quick Settings
  # # 
  # - type: custom:button-card
  #   template: section_title
  #   name: Quick Settings
  # - type: entities
  #   entities:
  #     # Air Quality Sensor Detections
  #     - entity: automation.jr_suite_air_quality_detections
  #       name: Air Quality Automations
  #       icon: mdi:air-filter
  #       card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
  #       secondary_info: last-changed
  #       state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      - type: custom:template-entity-row
        icon: mdi:filter
        name: Air Purifier Filter Life
        entity: sensor.jr_suite_air_purifier_filter_life
        state: "{{ states[config.entity].state }}%"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: >
          {% set filter_left = states[config.entity].state | int(0) %}
          {% if filter_left < 20 %}
            var(--error-color)
          {% else %}
            var(--success-color)
        

  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml