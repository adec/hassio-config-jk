type: custom:vertical-layout
title: Vacuum
path: main-floor-vacuum
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_screen_layout.yaml
cards:
  - type: custom:button-card
    template: kohbo_page_title
    name: Vacuum

  # 
  # Quick Actions
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:horizontal-layout
      layout:
        # grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
      cards:
        - type: horizontal-stack
          cards:            
            - type: custom:mushroom-chips-card
              chips:
                # 
                # Pause Cleaning (if running)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'cleaning'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                    # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                    icon: mdi:pause
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.pause
                      data:
                        entity_id: vacuum.roborock_s7
                # 
                # Resume Cleaning (if paused)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'paused'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                    # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                    icon: mdi:play
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.start
                      data:
                        entity_id: vacuum.roborock_s7
                # 
                # Return to Dock (if cleaning)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 
                        - 'cleaning'
                        - 'paused'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    # icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                    # icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                    icon: mdi:robot-vacuum-off
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.return_to_base
                      data:
                        entity_id: vacuum.roborock_s7
                # 
                # Clean Kitchen & Family (if docked)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    content: "Kitchen/Family"
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.send_command
                      data:
                        entity_id: vacuum.roborock_s7
                        command: app_segment_clean
                        params: [24, 26]

                # 
                # Clean Main Living (if docked)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    content: "Dining/Foyer"
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.send_command
                      data:
                        entity_id: vacuum.roborock_s7
                        command: app_segment_clean
                        params: [20, 23]

                # 
                # Clean Office (if docked)
                # 
                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    content: "Office"
                    tap_action:
                      action: perform-action
                      perform_action: vacuum.send_command
                      data:
                        entity_id: vacuum.roborock_s7
                        command: app_segment_clean
                        params: [29]

                - type: conditional
                  conditions:
                    - entity: vacuum.roborock_s7
                      state: 'docked'
                  chip:
                    type: template
                    card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                    icon: mdi:lightning-bolt
                    tap_action:
                      action: navigate
                      navigation_path: '#main_floor_quick_clean_popup'

  # 
  # Vacuum Status
  # 
  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --vertical-stack-card-gap: 8px;
        }
    cards:
      - type: custom:button-card
        entity: vacuum.roborock_s7
        label: Vacuum Status
        icon: |
          [[[
            if (entity.state == "docked")
              return "mdi:robot-vacuum-off"
            else if (entity.state == "cleaning")
              return "mdi:robot-vacuum"
            else
              return "mdi:robot-vacuum-off"
          ]]]
        show_state: true
        show_icon: true
        show_name: false
        show_label: true
        layout: icon_name_state
        styles:
          card:
            - background: transparent
            - backdrop-filter: none
            - -webkit-backdrop-filter: none
            - padding: 20px 20px 12px 20px
            - box-shadow: none
            - display: flex
            - align-items: center
            - justify-content: flex-start
            - gap: 12px
            - border: none
          grid:
            - grid-template-areas: "\"i n\" \"i l\""
            - grid-template-columns: min-content 1fr
            - align-items: center
          icon:
            - color: >
                [[[
                  return entity.state === 'docked' ? '#06D6A0' : '#FFD166';
                ]]]
            - width: 38px
            - height: 38px
            - margin-right: 15px
          name:
            - font-size: 20px
            - font-weight: regular
            - color: white
            - justify-self: start
            - margin-bottom: 4px;
          label:
            - font-size: 12px
            - color: "#CED4DA"
            - justify-self: start


      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          # Battery level
          - type: custom:button-card
            entity: vacuum.roborock_s7
            name: Battery Level
            template: kohbo_security_item
            icon: mdi:battery
            state_display: |
              [[[
                return entity.attributes.battery_level + '%'
              ]]]
            state:
              - operator: template
                value:  "[[[ return Math.round(parseFloat(entity.attributes.battery_level)) <= 20 ]]]"
                color: var(--error-color)
              # - operator: template
              #   value:  "[[[ return Math.round(parseFloat(entity.attributes.battery_level)) >= 60 ]]]"
              #   color: var(--success-color)
              - operator: template
                value:  "[[[ return Math.round(parseFloat(entity.attributes.battery_level)) > 20 && Math.round(parseFloat(entity.attributes.battery_level)) < 60 ]]]"
                color: var(--warning-color)
          # Cleaning Area
          - type: custom:button-card
            entity: sensor.roborock_s7_current_clean_area
            name: Cleaning Area
            template: kohbo_security_item
            icon: mdi:map-marker-outline
            color: var(--light-grey-color)
          # Cleaning Time
          - type: custom:button-card
            entity: sensor.roborock_s7_last_clean_duration
            name: Cleaning Time
            template: kohbo_security_item
            icon: mdi:timer-outline
            color: var(--light-grey-color)


  #
  # Vacuum Details
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # Main Brush
      - type: custom:template-entity-row
        entity: sensor.roborock_s7_main_brush_left
        icon: mdi:brush-variant
        name: Main Brush
        state: "{{ (states[config.entity].state | float(0) / 3600) | int }} h"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set main_brush_left = states[config.entity].state | int(0) %}
          {% if main_brush_left > 100000 %}
            var(--success-color)
          {% else %}
            var(--error-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # Side Brush
      - type: custom:template-entity-row
        entity: sensor.roborock_s7_side_brush_left
        icon: mdi:brush-variant
        name: Side Brush
        state: "{{ (states[config.entity].state | float(0) / 3600) | int }} h"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set main_brush_left = states[config.entity].state | int(0) %}
          {% if main_brush_left > 100000 %}
            var(--success-color)
          {% else %}
            var(--error-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # Water Level
      - type: custom:template-entity-row
        entity: binary_sensor.roborock_s7_water_shortage
        name: Water Level
        state: "{{ 'Okay' if states[config.entity].state == 'off' else 'Low' }}"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% if states[config.entity].state == "on" %}
            var(--error-color)
          {% else %}
            var(--success-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # Filter life
      - type: custom:template-entity-row
        entity: sensor.roborock_s7_filter_left
        name: Filter Life
        state: "{{ (states[config.entity].state | float(0) / 3600) | int }} h"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set filter_left = states[config.entity].state | int(0) %}
          {% if filter_left < 5000 %}
            var(--error-color)
          {% else %}
            var(--success-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # Sensor Dirty
      - type: custom:template-entity-row
        entity: sensor.roborock_s7_sensor_dirty_left
        name: Sensor Dirty
        state: "{{ (states[config.entity].state | float(0) / 3600) | int }} h"
        secondary: "{{ states[config.entity].last_changed | relative_time }} ago"
        color: >
          {% set sensor_dirty = states[config.entity].state | int(0) %}
          {% if sensor_dirty < 5000 %}
            var(--error-color)
          {% else %}
            var(--success-color)
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml



  # 
  # Vacuum Actions
  # 
  - type: custom:button-card
    template: section_title
    name: Maintenance
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # Reset Filter
      - type: button
        entity: button.roborock_s7_reset_filter
        action_name: Reset
        name: Reset Filter
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_button_styles.yaml
      # Reset Main Brush
      - type: button
        entity: button.roborock_s7_reset_main_brush
        action_name: Reset
        name: Reset Main Brush
        icon: mdi:brush-variant
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_button_styles.yaml
      # Reset Side Brush
      - type: button
        entity: button.roborock_s7_reset_side_brush
        action_name: Reset
        name: Reset Side Brush
        icon: mdi:brush-variant
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_button_styles.yaml
      # Reset Sensor Dirty
      - type: button
        entity: button.roborock_s7_reset_sensor_dirty
        action_name: Reset
        name: Reset Sensors
        card_mod: !include /config/dashboards/templates/includes/card_mod/entities/entity_button_styles.yaml
      
      
  # 
  # Quick Clean Popup
  # 
  - type: vertical-stack
    cards:
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#main_floor_quick_clean_popup'
        close_by_clicking_outside: true
        styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
        margin_top_mobile: calc(100vh - 700px)
        margin_top_desktop: calc(100vh - 700px)
      # 
      # Title
      # 
      - type: custom:button-card
        template: kohbo_page_title
        name: Quick Clean

      - type: conditional
        conditions:
          - entity: input_boolean.main_level_vacuum_clean_when_house_empty
            state: 'on'
        card:
          type: custom:button-card
          name: The following rooms are scheduled to be cleaned when the house is empty
          icon: mdi:alert-circle-outline
          layout: icon_name
          show_icon: true
          size: 24px
          styles:
            card:
              - backdrop-filter: blur(10px)
              - -webkit-backdrop-filter: blur(10px)
              - padding: 10px
            grid:
              - grid-template-areas: '"i n"'
              - grid-template-columns: 40px 1fr
            name:
              - justify-self: start
              - font-weight: 500
              - white-space: normal
          card_mod:
            style: |
              ha-card {
                background: rgba(237, 71, 71, 0.8) !important;
                height: 80px !important;
                width: 100% !important;
                padding-right: 15px !important;
              }



      # 
      # Quick Clean Tiles
      # 
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: input_boolean.vacuum_kitchen
            icon: mdi:fridge
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_family_room
            icon: mdi:sofa
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_dining_room
            icon: mdi:silverware-fork-knife
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_office
            icon: mdi:desk
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_foyer
            icon: mdi:door-open
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_mudroom
            icon: mdi:shoe-formal
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_jr_suite
            icon: mdi:bed-empty
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_laundry_room
            icon: mdi:washing-machine
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_mudroom_bathroom
            icon: mdi:toilet
            state_content: last-changed
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.vacuum_powder_room
            icon: mdi:spray-bottle
            state_content: last-changed
            tap_action:
              action: toggle
      # 
      # Quick Clean Buttons
      # 
      - type: vertical-stack
        cards:
          - type: custom:button-card
            name: Clean Now
            show_icon: false
            tap_action:
              action: perform-action
              perform_action: script.main_level_quick_clean
            card_mod:
              style: |
                :host {
                  padding: 15px 0 0 0 !important;
                }
                ha-card {
                  background: var(--primary-color) !important;
                  color: var(--primary-text-color) !important;
                  border-radius: 30px !important;
                  font-size: 14px !important;
                  font-weight: 500 !important;
                  padding: 15px 10px !important;
                }
          - type: custom:button-card
            name: >
              [[[
                return states['input_boolean.main_level_vacuum_clean_when_house_empty'].state === 'on' ? 'Cancel Scheduled Cleanings' : 'Clean When House Is Empty';
              ]]]
            show_icon: false
            tap_action:
              action: perform-action
              perform_action: >
                [[[
                  return states['input_boolean.main_level_vacuum_clean_when_house_empty'].state === 'on' ? 'script.main_level_vacuum_cancel_clean_when_house_is_empty' : 'script.main_level_vacuum_clean_when_house_is_empty';
                ]]]
            card_mod:
              style: |
                :host {
                  padding: 0 !important;
                }
                ha-card {
                  background: transparent !important;
                  border: 1px solid var(--primary-color) !important;
                  color: var(--primary-text-color) !important;
                  border-radius: 30px !important;
                  font-size: 14px !important;
                  font-weight: 500 !important;
                  padding: 15px 10px !important;
                }

      



  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml


