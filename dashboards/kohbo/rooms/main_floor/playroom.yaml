type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#playroom'
    close_by_clicking_outside: false
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml

  - type: custom:button-card
    template: kohbo_page_title
    name: Playroom

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/cards/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
      cards:
        # 
        # Room State & Occupancy
        # 
        - type: horizontal-stack
          cards:            
            - type: custom:mushroom-chips-card
              chips:
                - type: template
                  card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                  icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                  icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                  content: "{{ states(entity) }}"
                  entity: input_select.playroom
                  tap_action:
                    action: more-info

                - type: template
                  card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod_occupancy.yaml
                  icon: mdi:circle
                  entity: input_boolean.playroom_occupied
                  content: "{{ 'Occupied' if states(entity) == 'on' else 'Unoccupied' }}"
                  icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_occupancy_icon_color.yaml
                  tap_action:
                    action: more-info

        # 
        # People in the room
        # 
        - type: custom:mod-card
          style: !include /config/dashboards/templates/includes/people/kohbo_people_stack_mod_card_styles.yaml
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.john_koht
                template: kohbo_person_entity
                tap_action:
                  action: navigate
                  navigation_path: '#john'
                visibility:
                  - condition: state
                    entity: sensor.john_room_presence
                    state: "playroom"
              - type: custom:button-card
                entity: person.cristina_falbo
                template: kohbo_person_entity
                tap_action:
                  action: navigate
                  navigation_path: '#cristina'
                visibility:
                  - condition: state
                    entity: sensor.cristina_room_presence
                    state: "playroom"
              - type: custom:button-card
                entity: person.mary_falbo
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: sensor.mary_room_presence
                    state: "playroom"
              - type: custom:button-card
                entity: person.katia
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: sensor.katia_room_presence
                    state: "playroom"

  # 
  # Climate Overview
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/cards/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.playroom_temperature
            color: "#59A5D8"
        name: Playroom Climate
        icon: mdi:thermometer
        card_mod: !include /config/dashboards/templates/includes/cards/climate_card/kohbo_climate_card_graph_styles.yaml



  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: custom:mushroom-light-card
    entity: light.playroom_lights
    name: Ceiling Lights
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info

  - type: custom:mushroom-light-card
    entity: switch.christmas_playroom_lights
    name: Party Lights
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info




  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: "custom:mediocre-media-player-card"
    entity_id: media_player.sonos_playroom
    tap_opens_popup: true
    card_mod:
      style: |
        .mmpc-1pnwwh8 {
          align-items: end !important;
        }
    ma_entity_id: media_player.sonos_playroom
    speaker_group:
      entities:
        - media_player.sonos_kitchen
        - media_player.sonos_office
        - media_player.sonos_living_room
        - media_player.sonos_main_bedroom
        - media_player.sonos_family_room
        - media_player.sonos_patio
        - media_player.sonos_pool
        - media_player.sonos_gazebo
        - media_player.sonos_playroom

  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: binary_sensor.playroom_window_sensor
        name: North Window
        template: kohbo_device_window_entity

      - type: custom:button-card
        entity: binary_sensor.playroom_window_west_left_opening
        name: West Window
        template: kohbo_device_window_entity


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # # Speech Notifications Toggle
      # - entity: input_boolean.family_room_speech_notifications
      #   name: Speech Notifications
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.playroom_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_playroom
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_playroom
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # Presence Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Presence Sensor
        entity: binary_sensor.playroom_presence_sensor
        state: "{{ 'Detected' if states['binary_sensor.playroom_presence_sensor'].state == 'on' else 'Clear' }}"
        secondary: "{{ states['binary_sensor.playroom_presence_sensor'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.playroom_occupancy
        state: "{{ 'Occupied' if states['binary_sensor.playroom_occupancy'].state == 'on' else 'Clear' }}"
        secondary: "{{ states['binary_sensor.playroom_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.playroom_motion
        state: "{{ 'Motion Detected' if states['binary_sensor.playroom_motion'].state == 'on' else 'Clear' }}"
        secondary: "{{ states['binary_sensor.playroom_motion'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
      