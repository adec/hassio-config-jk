type: custom:vertical-layout
title: Playroom
path: playroom
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_nested_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  # - type: horizontal-stack
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:
        # Back button
        - type: custom:button-card
          template: kohbo_page_back_button
          tap_action:
            action: navigate
            navigation_path: /dashboard-kohbo/rooms
        # Settings button
        # - type: custom:button-card
        #   template: kohbo_page_settings_button
        #   tap_action:
        #     action: navigate
        #     navigation_path: "#playroom_settings_popup"

  # 
  # Room Header
  # 
  - type: custom:decluttering-card
    template: room_header
    variables:
      - room_name: Playroom
      - room: "playroom"

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:decluttering-card
    template: room_overview
    variables:
      - mode: input_select.playroom
      - occupancy: input_boolean.playroom_occupied
      - room: "playroom"

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_temperature_only
    variables:
      - temperature_sensor: sensor.playroom_temperature
      - room_name: Playroom


  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.playroom_lights
    name: Ceiling Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false
    tap_action:
      action: navigate
      navigation_path: '#playroom_ceiling_lights'

  - type: tile
    entity: light.christmas_playroom_lights
    name: Party Lights
    icon: mdi:string-lights
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false

  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.sonos_playroom
      - room_name: Playroom
      - navigation_path: '#playroom_media_player'

  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: binary_sensor.playroom_window_sensor
        name: North Window
        template: kohbo_device_window_entity

      - type: custom:button-card
        entity: binary_sensor.playroom_window_west_left_opening
        name: West Window
        template: kohbo_device_window_entity


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # # Speech Notifications Toggle
      # - entity: input_boolean.family_room_speech_notifications
      #   name: Speech Notifications
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # Lighting Automations Toggle
      - entity: input_boolean.playroom_lighting_automations
        name: Lighting Automations
        icon: kohbo:kohbo-light-2
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_playroom
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_playroom
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # Presence Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Presence Sensor
        entity: binary_sensor.playroom_presence_sensor
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.playroom_presence_sensor'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.playroom_occupancy
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.playroom_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.playroom_motion
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.playroom_motion'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
      

  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_playroom
      - hash: '#playroom_media_player'


  # 
  # Ceiling Lights Pop Up
  # 
  - type: custom:decluttering-card
    template: light_popup
    variables:
      - light_entity: light.playroom_lights
      - popup_hash: '#playroom_ceiling_lights'
      - popup_title: 'Ceiling Lights'
      - entity_id: 
        - light.playroom_1
        - light.playroom_2
        - light.playroom_3
        - light.playroom_4
        - light.playroom_5
        - light.playroom_6

  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml
  