type: custom:vertical-layout
title: Family Room
path: family-room
theme: kohbo
subview: true
layout: !include /config/dashboards/templates/includes/kohbo_nested_page_layout.yaml
cards:
  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: horizontal-stack
      cards:            
        # Left side buttons
        - type: custom:mushroom-chips-card
          alignment: start
          chips:
            # Back button
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:arrow-left
              icon_color: var(--secondary-text-color)
              tap_action:
                action: navigate
                navigation_path: /dashboard-kohbo/rooms
        # Right side buttons
        - type: custom:mushroom-chips-card
          alignment: end
          chips:
            # Assist
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:comment-processing
              icon_color: var(--secondary-text-color)
              tap_action:
                action: assist
            # Settings button
            - type: template
              card_mod: !include /config/dashboards/templates/includes/card_mod/chips/header_chip_card_mod.yaml
              icon: mdi:cog
              icon_color: var(--secondary-text-color)
              tap_action:
                action: navigate
                navigation_path: "#family_room_settings_popup"
  

  # 
  # Room Header
  # 
  - type: custom:decluttering-card
    template: room_header
    variables:
      - room_name: Family Room
      - room: "family_room"

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    style: !include /config/dashboards/templates/includes/card_mod/chips/page_chip_layout.yaml
    card:
      type: horizontal-stack
      cards:
        # Family Room Mode
        - type: custom:button-card
          template: kohbo_chip_card_room_mode
          entity: input_select.family_room
        # Family Room Occupancy
        - type: custom:button-card
          template: kohbo_chip_card_room_occupancy
          entity: input_boolean.family_room_occupied
        # Family Room Motion
        - type: custom:button-card
          template: kohbo_chip_card
          entity: binary_sensor.family_room_motion_sensor
          show_state: false
        # Vacuum the family room now
        - type: custom:button-card
          template: kohbo_chip_card
          entity: vacuum.roborock_s7
          show_state: false
          tap_action:
            action: perform-action
            perform_action: script.main_level_vacuum_clean_selected_rooms
            data:
              rooms: 
                - family_room

  # 
  # Climate Overview
  # 
  - type: custom:decluttering-card
    template: climate_overview
    variables:
      - temperature_sensor: sensor.kitchen_awair_temperature
      - humidity_sensor: sensor.kitchen_awair_humidity
      - carbon_dioxide_sensor: sensor.kitchen_awair_carbon_dioxide
      - vocs_sensor: sensor.kitchen_awair_vocs
      - pm25_sensor: sensor.kitchen_awair_pm2_5
      - room_name: Family Room

  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: tile
    entity: light.family_room_main_lights
    name: Main Lights
    icon: mdi:ceiling-light-multiple
    show_entity_picture: false
    hide_state: false
    features:
      - type: light-brightness
    features_position: inline
    vertical: false


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: custom:decluttering-card
    template: media_player
    variables:
      - media_player: media_player.sonos_family_room
      - room_name: Family Room
      - navigation_path: '#family_room_media_player'


  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      # Sony Bravia TV
      - type: custom:button-card
        entity: media_player.sony_bravia_tv
        name: Sony Bravia
        template: kohbo_device_entity

      # Apple TV
      - type: custom:button-card
        entity: media_player.apple_tv_family_room
        name: Apple TV
        icon: mdi:apple
        template: kohbo_device_entity

      - type: custom:button-card
        entity: switch.smart_plug_14_switch
        name: South Wall Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_14_active_power
          confirmation: true

      - type: custom:button-card
        entity: switch.smart_plug_4_switch
        name: North Wall Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_4_active_power
          confirmation: true


  # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # Vacuum Clean Family Room at Night
      - entity: input_boolean.vacuum_family_room_at_night
        name: Clean at Night
        icon: mdi:robot-vacuum
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      
      # Clean Family Room When Unoccupied
      - entity: input_boolean.vacuum_family_room_when_house_empty
        name: Clean When House Is Empty
        icon: mdi:robot-vacuum
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # Speech Notifications Toggle
      - entity: input_boolean.family_room_speech_notifications
        name: Speech Notifications
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # # Lighting Automations Toggle
      # - entity: input_boolean.kitchen_lighting_automations
      #   name: Lighting Automations
      #   icon: kohbo:kohbo-light-2
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_family_room
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_family_room
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # # Presence Sensor
      # - type: custom:template-entity-row
      #   icon: kohbo:kohbo-room-occupancy
      #   name: Presence Sensor
      #   entity: binary_sensor.kitchen_presence_sensor
      #   state: "{{ 'Detected' if states['binary_sensor.kitchen_presence_sensor'].state == 'on' else 'Clear' }}"
      #   secondary: "{{ states['binary_sensor.kitchen_presence_sensor'].last_changed | relative_time }} ago"
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
      #   color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.family_room_motion_sensor_occupancy
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.family_room_motion_sensor_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.family_room_motion_sensor
        state: !include /config/dashboards/templates/includes/cards/kohbo_entity_row_occupancy_state_display.yaml
        secondary: "{{ states['binary_sensor.family_room_motion_sensor'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        

  # 
  # Media Player Pop Up
  # 
  - type: custom:decluttering-card
    template: media_player_pop_up
    variables:
      - media_player: media_player.sonos_family_room
      - hash: '#family_room_media_player'


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml