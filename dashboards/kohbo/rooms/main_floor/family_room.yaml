type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#family_room'
    close_by_clicking_outside: false
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml

  - type: custom:button-card
    template: kohbo_page_title
    name: Family Room

  # 
  # Overview Area for house mode and occupancy
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/cards/kohbo_layout_card_mod.yaml
    card:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 60% 40%
        margin: 0px 0px 0px 0px
        padding: 0px
        card_margin: 0px
      cards:
        # 
        # Room State & Occupancy
        # 
        - type: horizontal-stack
          cards:            
            - type: custom:mushroom-chips-card
              chips:
                - type: template
                  card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod.yaml
                  icon: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon.yaml
                  icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_state_icon_color.yaml
                  content: "{{ states(entity) }}"
                  entity: input_select.family_room
                  tap_action:
                    action: more-info

                - type: template
                  card_mod: !include /config/dashboards/templates/includes/kohbo_chip_card_mod_occupancy.yaml
                  icon: mdi:circle
                  entity: input_boolean.family_room_occupied
                  content: "{{ 'Occupied' if states(entity) == 'on' else 'Unoccupied' }}"
                  icon_color: !include /config/dashboards/templates/includes/rooms/kohbo_room_occupancy_icon_color.yaml
                  tap_action:
                    action: more-info

        # 
        # People in the room
        # 
        - type: custom:mod-card
          style: !include /config/dashboards/templates/includes/people/kohbo_people_stack_mod_card_styles.yaml
          card:
            type: horizontal-stack
            cards:
              - type: custom:button-card
                entity: person.john_koht
                template: kohbo_person_entity
                tap_action:
                  action: navigate
                  navigation_path: '#john'
                visibility:
                  - condition: state
                    entity: sensor.john_room_presence
                    state: "family_room"
              - type: custom:button-card
                entity: person.cristina_falbo
                template: kohbo_person_entity
                tap_action:
                  action: navigate
                  navigation_path: '#cristina'
                visibility:
                  - condition: state
                    entity: sensor.cristina_room_presence
                    state: "family_room"
              - type: custom:button-card
                entity: person.mary_falbo
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: sensor.mary_room_presence
                    state: "family_room"
              - type: custom:button-card
                entity: person.katia
                template: kohbo_person_entity
                visibility:
                  - condition: state
                    entity: sensor.katia_room_presence
                    state: "family_room"

  # 
  # Climate Overview
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/cards/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.kitchen_awair_temperature
            color: "#59A5D8"
        name: Family Room Climate
        icon: mdi:thermometer
        card_mod: !include /config/dashboards/templates/includes/cards/climate_card/kohbo_climate_card_graph_styles.yaml

      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/button_cards/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: custom:button-card
            entity: sensor.kitchen_awair_humidity
            template: kohbo_aqi_humidity_item

          - type: custom:button-card
            entity: sensor.kitchen_awair_carbon_dioxide
            template: kohbo_aqi_co2_item
          
          - type: custom:button-card
            entity: sensor.kitchen_awair_vocs
            template: kohbo_aqi_tvocs_item

          - type: custom:button-card
            entity: sensor.kitchen_awair_pm2_5
            template: kohbo_aqi_pm25_item



  # 
  # Lights
  # 
  - type: custom:button-card
    template: section_title
    name: Lights

  - type: custom:mushroom-light-card
    entity: light.family_room_main_lights
    layout: horizontal
    show_brightness_control: true
    show_color_control: false
    fill_container: true
    use_light_color: true
    show_color_temp_control: false
    collapsible_controls: false
    tap_action:
      action: more-info


  # 
  # Media Player
  # 
  - type: custom:button-card
    template: section_title
    name: Music

  - type: "custom:mediocre-media-player-card"
    entity_id: media_player.sonos_family_room
    tap_opens_popup: true
    card_mod:
      style: |
        .mmpc-1pnwwh8 {
          align-items: end !important;
        }
    ma_entity_id: media_player.sonos_family_room
    speaker_group:
      entities:
        - media_player.sonos_kitchen
        - media_player.sonos_office
        - media_player.sonos_living_room
        - media_player.sonos_main_bedroom
        - media_player.sonos_playroom
        - media_player.sonos_patio
        - media_player.sonos_pool
        - media_player.sonos_gazebo
        - media_player.sonos_family_room
  # 
  # Devices
  # 
  - type: custom:button-card
    template: section_title
    name: Devices

  - type: grid
    columns: 2
    square: false
    cards:
      # Sony Bravia TV
      - type: custom:button-card
        entity: media_player.sony_bravia_tv
        name: Sony Bravia
        template: kohbo_device_entity

      # Apple TV
      - type: custom:button-card
        entity: media_player.master_bedroom
        name: Apple TV
        icon: mdi:apple
        template: kohbo_device_entity

      - type: custom:button-card
        entity: switch.smart_plug_14_switch
        name: South Wall Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_14_active_power
          confirmation: true

      - type: custom:button-card
        entity: switch.smart_plug_4_switch
        name: North Wall Outlet
        template: kohbo_device_smart_plug_entity
        variables:
          power_sensor: sensor.smart_plug_4_active_power
          confirmation: true


  # 
  # Automations
  # 
  - type: custom:button-card
    template: section_title
    name: Automations
  - type: entities
    entities:
      # Vacuum Clean Kitchen and Family Room at Night
      - entity: automation.vacuum_clean_kitchen_and_family_room_at_night
        name: Clean at Night
        icon: mdi:robot-vacuum
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true


  # 
  # Quick Settings
  # 
  - type: custom:button-card
    template: section_title
    name: Quick Settings
  - type: entities
    entities:
      # Speech Notifications Toggle
      - entity: input_boolean.family_room_speech_notifications
        name: Speech Notifications
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # # Lighting Automations Toggle
      # - entity: input_boolean.kitchen_lighting_automations
      #   name: Lighting Automations
      #   icon: kohbo:kohbo-light-2
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
      #   secondary_info: last-changed
      #   state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_family_room
        name: Adaptive Lighting
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

      # Adaptive Lighting Toggle
      - entity: switch.adaptive_lighting_sleep_mode_family_room
        name: Adaptive Lighting Sleep Mode
        icon: mdi:theme-light-dark
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true

  # 
  # Sensors
  # 
  - type: custom:button-card
    template: section_title
    name: Sensors
  - type: entities
    entities:
      # # Presence Sensor
      # - type: custom:template-entity-row
      #   icon: kohbo:kohbo-room-occupancy
      #   name: Presence Sensor
      #   entity: binary_sensor.kitchen_presence_sensor
      #   state: "{{ 'Detected' if states['binary_sensor.kitchen_presence_sensor'].state == 'on' else 'Clear' }}"
      #   secondary: "{{ states['binary_sensor.kitchen_presence_sensor'].last_changed | relative_time }} ago"
      #   card_mod: !include /config/dashboards/templates/includes/kohbo_entities_entity_row.yaml
      #   color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
        
      # Occupancy Sensor
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Occupancy Sensor
        entity: binary_sensor.family_room_motion_sensor_occupancy
        state: "{{ 'Occupied' if states['binary_sensor.family_room_motion_sensor_occupancy'].state == 'on' else 'Clear' }}"
        secondary: "{{ states['binary_sensor.family_room_motion_sensor_occupancy'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml

      # Motion Sensor
      - type: custom:template-entity-row
        icon: mdi:motion-sensor
        name: Motion Sensor
        entity: binary_sensor.family_room_motion_sensor
        state: "{{ 'Motion Detected' if states['binary_sensor.family_room_motion_sensor'].state == 'on' else 'Clear' }}"
        secondary: "{{ states['binary_sensor.family_room_motion_sensor'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: !include /config/dashboards/templates/includes/kohbo_entities_entity_icon_color.yaml
      