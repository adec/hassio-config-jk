button_card_templates: !include_dir_merge_named /config/dashboards/templates/button_cards
views:
  - type: sections
    title: Home
    max_columns: 1
    path: home
    theme: kohbo
    layout: !include /config/dashboards/templates/includes/kohbo_screen_layout.yaml
    sections:
      - type: grid
        cards:
          - type: custom:button-card
            template: kohbo_title
            name: Home

          - !include /config/dashboards/templates/button_cards/cards/kohbo_security_overview.yaml
          - !include /config/dashboards/templates/button_cards/cards/aqi/kohbo_climate_overview.yaml

      - type: grid
        card_mod:
          style: |
            .container {
              row-gap: 0;
            }
        cards:
          - type: heading
            heading: Overview
            card_mod: !include /config/dashboards/templates/includes/kohbo_header_layout.yaml

          - type: custom:layout-card
            layout_type: grid
            layout_options: !include /config/dashboards/templates/includes/kohbo_entity_layout.yaml
            cards:
              - type: custom:button-card
                entity: light.interior_lights
                name: Interior Lights
                template: kohbo_device_entity
                icon: kohbo:kohbo-light
                state_display: >
                  [[[
                    if (states['light.interior_lights'].state == "on")
                      return `${states['sensor.interior_lights_on'].state} Lights On`
                    else
                      return "Off"
                  ]]]

              - type: custom:button-card
                entity: light.exterior_lights
                name: Exterior Lights
                template: kohbo_device_entity
                icon: kohbo:kohbo-lamp

              - type: custom:button-card
                entity: binary_sensor.exterior_doors
                name: Exterior Doors
                template: kohbo_device_entity
                icon: |
                  [[[
                    if (entity.state == "on")
                      return "kohbo:kohbo-door-open"
                    else
                      return "kohbo:kohbo-door-closed"
                  ]]]

              - type: custom:button-card
                entity: binary_sensor.windows
                name: Windows
                template: kohbo_device_entity
                icon: >
                  [[[
                    if (entity.state == "on")
                      return "kohbo:kohbo-window-open"
                    else
                      return "kohbo:kohbo-window-closed"
                  ]]]
                  

      - type: grid
        card_mod:
          style: |
            .container {
              row-gap: 0;
            }
        cards:
          - type: heading
            heading: Quick Settings
            card_mod: !include /config/dashboards/templates/includes/kohbo_header_layout.yaml
          - type: entities
            entities:
              - entity: input_boolean.speech_notifications
                icon: none
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-changed
              - entity: input_boolean.lighting_automations
                icon: none
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-changed
              - entity: input_boolean.camera_notifications
                icon: none
                card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
                secondary_info: last-changed
                icon: none