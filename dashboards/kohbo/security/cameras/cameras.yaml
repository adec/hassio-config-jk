  - type: custom:advanced-camera-card
    cameras:
      - name: Front Door
        live_provider: go2rtc
        go2rtc:
          url: http://10.0.10.207:1984
          stream: front_door_low
          modes: [webrtc, mse]
    view:
      actions:
        # entity: camera.camera_proxy_camera_front_door_camera_high_resolution_channel
        tap_action:
          action: navigate
          navigation_path: '#front_door_camera'
    live:
      controls:
        builtin: false
        timeline:
          mode: none
      preload: false
      lazy_load: true
      lazy_unload:
        - hidden
        - unselected
      

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:advanced-camera-card
        cameras:
          - name: Driveway Front
            live_provider: go2rtc
            go2rtc:
              url: http://10.0.10.207:1984
              stream: driveway_front_low
              modes: [webrtc, mse]
        view:
          actions:
            tap_action:
              action: navigate
              navigation_path: '#driveway_front_camera'
        live:
          controls:
            builtin: false
            timeline:
              mode: none
          preload: false
          lazy_load: true
          lazy_unload:
            - hidden
            - unselected

      - type: custom:advanced-camera-card
        cameras:
          - name: Garage Driveway
            live_provider: go2rtc
            go2rtc:
              url: http://10.0.10.207:1984
              stream: garage_driveway
              modes: [webrtc, mse]
        live:
          controls:
            builtin: false
            timeline:
              mode: none
          preload: false
          lazy_load: true
          lazy_unload:
            - hidden
            - unselected

      - type: custom:advanced-camera-card
        cameras:
          - name: Backyard South
            live_provider: go2rtc
            go2rtc:
