  # 
  # Front Door Camera Popup
  # 
  - type: custom:decluttering-card
    template: camera_popup
    variables:
      - hash: '#front_door_camera'
      - name: Front Door
      - notifications_entity: input_boolean.front_door_camera_notifications
      - timer_entity: timer.front_door_camera_notifications_snooze_timer
      - countdown_sensor: sensor.front_door_timer_countdown
      - stream_id: front_door_low
      - motion_entity: binary_sensor.front_door_camera_motion
      - person_entity: binary_sensor.front_door_camera_person_detected


  # 
  # Driveway Front Camera Popup
  # 
  - type: custom:decluttering-card
    template: camera_popup
    variables:
      - hash: '#driveway_front_camera'
      - name: Driveway Front
      - notifications_entity: input_boolean.driveway_front_camera_notifications
      - timer_entity: timer.driveway_front_camera_notifications_snooze_timer
      - countdown_sensor: sensor.driveway_front_timer_countdown
      - stream_id: driveway_front_low
      - motion_entity: binary_sensor.driveway_front_camera_motion
      - person_entity: binary_sensor.driveway_front_camera_person_detected

  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml