          style:
            ha-gauge $: |
              path.dial,
              path.value,
              path.level {
                stroke-width: 10px !important;
              }

              path.dial {
                stroke: var(--darker-primary-color) !important;
              }

              .text {
                bottom: 10px !important;
              }

              .value-text {
                font-size: 35px !important;
              }
              
            .: |
              ha-card {
                padding-top: 0 !important;
              }
              .name {
                margin-top: -15px !important;
                color: var(--secondary-text-color) !important;
                font-size: 12px !important;
              }

      # 
      # Security Items
      # 
      - type: custom:stack-in-card
        mode: vertical
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_bg.yaml
        cards:
          - type: horizontal-stack
            cards:
              # 
              # Alarm
              # 
              - type: custom:button-card
                entity: alarm_control_panel.panel
                name: Alarm
                template: kohbo_security_item
                state:
                  - value: 'disarmed'
                    icon: kohbo:kohbo-alarm-disarmed
                  - value: 'armed_home'
                    icon: kohbo:kohbo-alarm-armed-home
                  - value: 'armed_away'
                    icon: kohbo:kohbo-alarm-armed-away

              # 
              # Locks
              # 
              - type: custom:button-card
                entity: lock.house_locks
                name: Locks
                template: kohbo_security_item
                state_display: |
                  [[[
                    if (entity.state == "locked")
                      return "Locked";
                    else
                      return entity.attributes.entity_id.filter(id => states[id]?.state === 'unlocked').length + " Unlocked";
                  ]]]
                state:
                  - value: 'unlocked'
                    icon: kohbo:kohbo-lock-unlocked
                  - value: 'locked'
                    icon: kohbo:kohbo-lock-locked
                tap_action:
                  action: navigate
                  navigation_path: '#house_locks_popup'

              # 
              # Garage Doors
              # 
              - type: custom:button-card
                entity: cover.garage_doors
                name: Garage
                template: kohbo_security_item
                icon: kohbo:kohbo-garage-closed
                state_display: |
                  [[[
                    if (entity.state == "closed")
                      return "Closed";
                    else
                      return entity.attributes.entity_id.filter(id => states[id]?.state === 'open').length + " Open";
                  ]]]
                state:
                  - value: 'open'
                    icon: kohbo:kohbo-garage-open
                  - value: 'closed'
                    icon: kohbo:kohbo-garage-closed
            
          - type: horizontal-stack
            cards:
              # Exterior Doors
              - type: custom:button-card
                entity: binary_sensor.exterior_doors
                template: kohbo_security_item
                name: Doors
                state:
                  - value: 'on'
                    icon: kohbo:kohbo-door-open
                    state_display: >
                      [[[
                        return entity.attributes.entity_id.filter(id => states[id]?.state === 'on').length + " Open";
                      ]]]
                    color: var(--error-color)
                  - value: 'off'
                    icon: kohbo:kohbo-door-closed
                    color: var(--success-color)
                styles:
                  card:
                    - padding-top: 5px !important;

              # Windows
              - type: custom:button-card
                entity: binary_sensor.windows
                template: kohbo_security_item
                name: Windows
                state:
                  - value: 'on'
                    icon: kohbo:kohbo-window-open
                    color: var(--error-color)
                  - value: 'off'
                    icon: kohbo:kohbo-window-closed
                    color: var(--success-color)
                styles:
                  card:
                    - padding-top: 5px !important;

              # Camera Notifications
              - type: custom:button-card
                entity: input_boolean.camera_notifications
                template: kohbo_security_item
                name: Alerts
                state:
                  - value: 'on'
                    icon: mdi:bell
                    state_display: Active
                    color: var(--success-color)
                  - value: 'off'
                    icon: mdi:bell-off
                    state_display: Suppressed
                    color: var(--error-color)
                styles:
                  card:
                    - padding-top: 5px !important;



  # 
  # Latest Motion Detections
  # 
  - type: custom:stack-in-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/climate_card/kohbo_climate_card_stack_styles.yaml
    cards:
      - type: custom:button-card
        template: kohbo_card_small_header
        name: Latest Motion

      - type: custom:mod-card
        card_mod:
          style:
            .: |
              ha-card {
                padding: 10px 0 20px 16px !important;
              }

            hui-horizontal-stack-card$: |
              #root {
                overflow-x: auto;
                width: 100% !important;
                gap: 5px !important;

                button-card {
                  flex: 0 0 100px !important;
                }
              }
              /*#root::-webkit-scrollbar {
                display: none !important;
              }*/
        card:
          type: custom:auto-entities
          card:
            type: entities
            card_mod:
              style: |
                ha-card #states {
                  display: flex !important;
                  padding: 0 !important;
                  gap: 5px !important;
                  overflow-x: auto !important;

                  &::-webkit-scrollbar {
                    display: none !important;
                  }

                  > div {
                    margin: 0 !important;
                  }
                }
          filter:
            include:
              - domain: binary_sensor
                options:
                  secondary_info: last-changed
                  type: custom:button-card
                  template: motion_detected_card
                attributes:
                  device_class: motion
                last_changed: < 120
            exclude:
              - options: {}
                entity_id: binary_sensor.trisensor_motion_detection
              - options: {}
                entity_id: binary_sensor.first_floor_any_room_presence
              - options: {}
                entity_id: binary_sensor.first_floor_motion
              - options: {}
                device_manufacturer: Browser Mod
              - options: {}
                entity_id: binary_sensor.upper_floor_motion
              - options: {}
                device_manufacturer: Frigate
              - options: {}
                device_manufacturer: ApolloAutomation
              - options: {}
                entity_id: binary_sensor.kitchen_motion_sensor_table_motion_detection
              - options: {}
                entity_id: binary_sensor.kitchen_motion_sensor_main_motion_detection
              - options: {}
                entity_id: binary_sensor.main_bedroom_motion_sensor_back_motion
              - options: {}
                entity_id: binary_sensor.main_bedroom_motion_sensor_entry_motion
              - options: {}
                entity_id: binary_sensor.g4_bullet_motion
              - options: {}
                entity_id: binary_sensor.g4_bullet_motion_2
              - options: {}
                entity_id: binary_sensor.playroom_motion_sensor_motion
              - options: {}
                entity_id: binary_sensor.playroom_motion_sensor_entry_motion_detection

          # type: custom:auto-entities
          # card:
          #   type: entities
          #   state_color: true
          # filter:
          #   include:
