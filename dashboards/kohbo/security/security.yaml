  # 
  # Alarm Panel
  # 
  - type: custom:stack-in-card
    mode: horizontal
    keep:
      border_radius: true
      background: true
    card_mod:
      style:
        hui-horizontal-stack-card$: |
          #root {
            
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px !important;
          }
    cards:
      - type: custom:button-card
        template: kohbo_device_lock_entity
        entity: alarm_control_panel.panel
        name: Alarm System
        icon: kohbo:kohbo-alarm-disarmed
        # tap_action:
        #   action: navigate
        #   navigation_path: "#garage_doors_popup"

      - type: custom:mod-card
        card_mod:
          style: 
            hui-horizontal-stack-card$: |
              #root {
                display: flex;
                justify-content: end;
                align-items: center;
                gap: 5px !important;
              }
        card:
          type: horizontal-stack
          cards:
            # Arm Home Button
            - type: custom:button-card
              template: kohbo_chip_button_card
              icon: kohbo:kohbo-alarm-armed-home
              name: Arm Home
              tap_action:
                action: perform-action
                perform_action: alarm_control_panel.alarm_arm_home
                target:
                  entity_id: alarm_control_panel.panel
              visibility:
                - condition: state
                  entity: alarm_control_panel.panel
                  state: 'disarmed'

            # Disarm Button
            - type: custom:button-card
              template: kohbo_chip_button_card
              icon: kohbo:kohbo-alarm-armed-home
              name: Disarm
              tap_action:
                action: perform-action
                perform_action: alarm_control_panel.alarm_disarm
                target:
                  entity_id: alarm_control_panel.panel
              visibility:
                - condition: state
                  entity: alarm_control_panel.panel
                  state: 
                    - armed_home
                    - armed_away
                    - triggered
                    - armed_custom_bypass
                    - armed_night
                    - armed_vacation

            - type: custom:button-card
              template: kohbo_chip_icon_action_card
              icon: mdi:chevron-right


  # 
  # Garage Doors
  # 
  - type: custom:decluttering-card
    template: horizontal_action_card
    variables:
      - entity: cover.garage_doors
      - name: Garage Doors
      - template: kohbo_device_garage_door_entity
      - tap_action: navigate
      - navigation_path: "#garage_doors_popup"
      - action_cards:
        - type: custom:button-card
          template: kohbo_chip_icon_action_card
          icon: mdi:arrow-down
          tap_action:
            action: perform-action
            perform_action: cover.close_cover
            target:
              entity_id: cover.garage_doors
          visibility:
            - condition: state
              entity: cover.garage_doors
              state: 'open'
        # Open garage door details
        - type: custom:button-card
          template: kohbo_chip_icon_action_card
          icon: mdi:chevron-right


  
