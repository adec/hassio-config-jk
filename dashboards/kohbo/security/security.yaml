  # 
  # Page Header
  # 
  - type: custom:mod-card
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_nested_page_toolbar.yaml
    card:
      type: vertical-stack
      cards:
        - type: custom:decluttering-card
          template: top_toolbar
          variables:
            - cards:
              - type: custom:button-card
                template: empty_column

              # Room Name
              - type: custom:button-card
                template: kohbo_header_page_title
                name: Security

              # Settings button
              - type: custom:button-card
                template: kohbo_header_chip_card
                icon: mdi:dots-horizontal
                icon_color: var(--secondary-text-color)
                tap_action:
                  action: navigate
                  navigation_path: '#security_settings_popup'

        - type: custom:navbar-card
          routes:
            - url: /dashboard-kohbo/security
              icon: mdi:shield-check
              label: Overview
            - url: /dashboard-kohbo/security-cameras
              icon: mdi:camera
              label: Cameras
            - url: /dashboard-kohbo/security-openings
              icon: mdi:door-open
              label: Openings
            - url: /dashboard-kohbo/security-leak-sensors
              icon: mdi:moisture
              label: Leak Sensors
          haptic: true
          mobile:
            show_labels: true
            show_popup_label_backgrounds: true
          styles: |
            .navbar {
              top: 60px !important;
              bottom: auto !important;
            }

            .navbar-card {
              background: var(--app-header-background-color) !important;
              box-shadow: 0px 3px 5px 0px rgba(0, 0, 0, 0.1) !important;
              padding: 0 19px !important;
            }

            .button {
              display: none !important;
            }

            .label {
              padding: 12px 0 !important;
              font-size: 12px !important;
              text-transform: uppercase;
              font-family: 'Inter', sans-serif !important; 
              font-weight: 600 !important;
              color: var(--semi-dark-grey-color) !important;
            }

            .label.active {
              color: var(--primary-text-color) !important;
            }

            .route.active {
              border-bottom: 2px solid var(--primary-text-color) !important;
            }


  # 
  # Security Overview
  # 
  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --keep-border_radius: 'true';
          --keep-background: 'true';
          --keep-border-radius: 'true';
          --stack-card-gap: 10px !important;
          --vertical-stack-card-gap: 10px !important;
        }
    keep:
      border_radius: true
      background: true
    cards:
      - type: custom:button-card
        entity: sensor.house_security_status
        name: Home Security
        show_icon: false
        show_state: true
        styles:
          grid:
            - grid-template-areas: '"n n" "s s"'
            - grid-template-columns: 1fr
          card:
            - justify-content: center
            - padding-bottom: 0
            - padding-top: 10px
          name:
            - justify-self: center
            - font-size: 14px
            - font-weight: 500
            - color: var(--secondary-text-color)
            - align-self: end
            - margin-bottom: 2px
          state:
            - justify-self: center
            - font-size: 28px
            - font-weight: 400
            - color: var(--primary-text-color)
      
      # 
      # Security Score Gauge
      # 
      - type: gauge
        name: Score
        entity: sensor.house_security_score
        min: 0
        max: 100
        # severity:
        #   green: 90
        #   yellow: 50
        #   red: 0
