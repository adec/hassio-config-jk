  - type: custom:stack-in-card
    card_mod:
      style: |
        :host {
          --keep-border_radius: 'true';
          --keep-background: 'true';
          --keep-border-radius: 'true';
        }
    keep:
      border_radius: true
      background: true
    cards:
      # 
      # Security Status / Overview
      # 
      - type: custom:button-card
        template: kohbo_stacked_card_top
        entity: alarm_control_panel.panel
        label: Alarm System Status
        icon: |
          [[[
            if (entity.state == "armed_home")
              return "kohbo:kohbo-alarm-armed-home"
            else if (entity.state == "armed_away")
              return "kohbo:kohbo-alarm-armed-away"
            else if (entity.state == "disarmed")
              return "kohbo:kohbo-alarm-disarmed"
            else
              return "kohbo:kohbo-alarm-disarmed"
          ]]]
        show_state: true
        # state_display: |
        #   [[[
        #     if (entity.state == "armed_home")
        #       return "Partially Secure"
        #     else if (entity.state == "Totally Secure")
        #       return "Totally Secure"
        #     else if (entity.state == "Secure")
        #       return "Home Secure"
        #     else
        #       return "Vulnerable"
        #   ]]]
        show_icon: true
        show_name: false
        show_label: true
        layout: icon_name_state
        # tap_action:
        #   action: navigate
        #   navigation_path: '/dashboard-kohbo/security'
        # styles:
        #   icon:
        #     - color: >
        #         [[[
        #           return entity.state === 'Totally Secure' || entity.state === 'Secure' ? '#06D6A0' : '#FFD166';
        #         ]]]



      # 
      # Security Alarm Overview & Actions
      # 
      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/includes/card_mod/base/kohbo_horizontal_stack_buttons_bg.yaml
        keep:
          border_radius: true
          background: true
        cards:
          # 
          # Arm Home
          # 
          - type: custom:button-card
            entity: alarm_control_panel.panel
            name: Home
            template: security_alarm_action_button
            icon: kohbo:kohbo-alarm-armed-home
            tap_action:
              action: perform-action
              perform_action: alarm_control_panel.alarm_arm_home
              target:
                entity_id: alarm_control_panel.panel
            styles:
              card:
                - background: '[[[ return entity.state === "armed_home" ? "var(--dark-primary-color)" : "transparent"; ]]]'
              icon:
                - color: '[[[ return entity.state === "armed_home" ? "var(--success-color)" : "var(--primary-text-color)"; ]]]'

          # 
          # Disarm
          # 
          - type: custom:button-card
            entity: alarm_control_panel.panel
            name: Disarm
            template: security_alarm_action_button
            icon: kohbo:kohbo-alarm-disarmed
            tap_action:
              action: perform-action
              perform_action: alarm_control_panel.alarm_disarm
              target:
                entity_id: alarm_control_panel.panel
            styles:
              card:
                - background: '[[[ return entity.state === "disarmed" ? "var(--dark-primary-color)" : "transparent"; ]]]'
              icon:
                - color: '[[[ return entity.state === "disarmed" ? "var(--error-color)" : "var(--primary-text-color)"; ]]]'
            

          # 
          # Arm Away
          # 
          - type: custom:button-card
            entity: alarm_control_panel.panel
            name: Away
            template: security_alarm_action_button
            icon: kohbo:kohbo-alarm-armed-away
            tap_action:
              action: perform-action
              perform_action: alarm_control_panel.alarm_arm_away
              target:
                entity_id: alarm_control_panel.panel
            styles:
              card:
                - background: '[[[ return entity.state === "armed_away" ? "var(--dark-primary-color)" : "transparent"; ]]]'
              icon:
                - color: '[[[ return entity.state === "armed_away" ? "var(--success-color)" : "var(--primary-text-color)"; ]]]'

  
  # 
  # Front Door Lock
  # 
  - type: custom:stack-in-card
    mode: horizontal
    keep:
      border_radius: true
      background: true
    card_mod:
      style:
        hui-horizontal-stack-card$: |
          #root {
            /*display: grid !important;
            grid-template-columns: 75% 25% !important;*/
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px !important;
          }
    cards:
      - type: custom:button-card
        template: kohbo_device_lock_entity
        entity: cover.garage_doors
        name: Garage Doors
        icon: kohbo:kohbo-garage-closed
        state_display: |
          [[[
            if (entity.state == "closed")
              return "Closed";
            else
              return entity.attributes.entity_id.filter(id => states[id]?.state === 'open').length + " Open";
          ]]]
        tap_action:
          action: navigate
          navigation_path: "#garage_doors_popup"

      - type: custom:button-card
        template: kohbo_header_chip_card
        icon: mdi:arrow-down
        name: Close Garage Doors
        styles:
          card:
            - background: var(--darker-primary-color)
            - justify-self: end
        tap_action:
          action: perform-action
          perform_action: cover.close_cover
          target:
            entity_id: cover.garage_doors
        visibility:
          - condition: state
            entity: cover.garage_doors
            state: 'open'

    
  
  # 
  # Locks
  # 
  - type: custom:button-card
    template: section_title
    name: Door Locks

  # 
  # Front Door Lock
  # 
  - !include /config/dashboards/kohbo/security/components/front_door_lock_component.yaml

  # 
  # Garage Entry Door Lock
  # 
  - !include /config/dashboards/kohbo/security/components/garage_entry_door_lock_component.yaml


  # 
  # Navbar
  # 
  - !include /config/dashboards/templates/includes/navbar.yaml

  # 
  # Lock popups
  # 
  - !include /config/dashboards/kohbo/security/front_door_lock_popup.yaml
  - !include /config/dashboards/kohbo/security/garage_entry_lock_popup.yaml