# 
# House Locks Popup
# 
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#house_locks_popup'
    close_by_clicking_outside: true
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    # margin_top_mobile: calc(100vh - 700px)
    # margin_top_desktop: calc(100vh - 700px)

  - type: custom:button-card
    template: kohbo_popup_page_title
    name: House Locks


  - type: custom:more-info-card
    entity: lock.house_locks
    title: House Locks
    card_mod: !include /config/dashboards/templates/includes/card_mod/kohbo_more_info_card_mod.yaml


  # 
  # Front Door Lock
  # 
  - type: custom:stack-in-card
    mode: horizontal
    card_mod:
      style:
        hui-horizontal-stack-card$: |
          #root {
            display: grid !important;
            grid-template-columns: 75% 25% !important;
            padding: 20px !important;
          }
    cards:
      - type: custom:button-card
        template: kohbo_device_lock_entity
        entity: lock.front_door
        name: Front Door
        tap_action:
          action: navigate
          navigation_path: "#front_door_lock_popup"

      - type: entities
        card_mod:
          style: |
            ha-card {
              #states {
                padding: 0px !important;
              }
            }
        entities:
          - entity: switch.front_door_lock_switch
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/input_boolean_embedded.yaml
            secondary_info: last-changed

  # 
  # Garage Entry Door Lock
  # 
  - type: custom:stack-in-card
    mode: horizontal
    card_mod:
      style:
        hui-horizontal-stack-card$: |
          #root {
            display: grid !important;
            grid-template-columns: 75% 25% !important;
            padding: 20px !important;
          }
    cards:
      - type: custom:button-card
        template: kohbo_device_lock_entity
        entity: lock.garage_entry_door
        name: Garage Entry Door
        tap_action:
          action: navigate
          navigation_path: "#garage_entry_lock_popup"

      - type: entities
        card_mod:
          style: |
            ha-card {
              #states {
                padding: 0px !important;
              }
            }
        entities:
          - entity: switch.garage_entry_door_lock_switch
            card_mod: !include /config/dashboards/templates/includes/card_mod/entities/input_boolean_embedded.yaml
            secondary_info: last-changed

