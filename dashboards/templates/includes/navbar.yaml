type: custom:navbar-card
routes:
  - url: /dashboard-kohbo/home
    icon: kohbo:kohbo-dashboard
    label: Home
  - url: /dashboard-kohbo/rooms
    icon: kohbo:kohbo-rooms
    label: Rooms
  - url: /dashboard-kohbo/climate
    icon: kohbo:kohbo-climate
    label: Climate
  - url: /dashboard-kohbo/security
    icon: kohbo:kohbo-security
    label: Security
  - icon: mdi:dots-horizontal
    label: More
    tap_action:
      action: open-popup
    popup:
      - icon: mdi:account-circle
        url: /dashboard-kohbo/people
        label: People
      - icon: kohbo:kohbo-devices
        url: /dashboard-kohbo/devices
        label: Devices
      - icon: kohbo:kohbo-media
        url: /dashboard-kohbo/media
        label: Media
      - icon: mdi:halloween
        url: /dashboard-kohbo/halloween
        label: Halloween
      - icon: mdi:hexagram
        url: /dashboard-kohbo/christmas
        label: Christmas
haptic: true
mobile:
  show_labels: true
  show_popup_label_backgrounds: true
styles: |
  .navbar-card {
    border-radius: 20px 20px 0 0;
    border: none;
    background: rgb(33, 37, 41, .90);
    backdrop-filter: blur(4px);
    width: 100%;
    max-width: 500px;
    bottom: -1px;
    padding-bottom: 40px;
  }

  .button.active {
    background: transparent;
  }

  .icon {
    fill: #AAAAAA !important;
  }

  .icon.active {
    fill: white !important;
  }
