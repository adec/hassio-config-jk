type: custom:navbar-card
routes:
  - url: /dashboard-kohbo/home
    icon: kohbo:kohbo-dashboard
    label: Home
  - url: /dashboard-kohbo/rooms
    icon: kohbo:kohbo-rooms
    label: Rooms
  - url: /dashboard-kohbo/climate
    icon: kohbo:kohbo-climate
    label: Climate
  - url: /lovelace/media
    icon: kohbo:kohbo-media
    label: Media
  - url: /lovelace/devices
    icon: kohbo:kohbo-devices
    label: Devices
  - url: /dashboard-kohbo/security
    icon: kohbo:kohbo-security
    label: Security
haptic: true
styles: |
  .navbar-card {
    border-radius: 20px 20px 0 0;
    border: none;
    background: rgb(33, 37, 41, .90);
    backdrop-filter: blur(4px);
    width: 100%;
    max-width: 500px;
    bottom: -1px;
    padding-bottom: 40px;
  }

  .button.active {
    background: transparent;
  }

  .icon {
    fill: #AAAAAA !important;
  }

  .icon.active {
    fill: white !important;
  }
