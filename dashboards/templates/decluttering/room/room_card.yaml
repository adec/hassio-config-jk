# 
# Room Card
# 
room_card:
  card:
    type: custom:stack-in-card
    card_mod:
      style: |
        ha-card {
          opacity: {{"1" if states['[[room_entity]]'].state == "on" else "0.5"}};
        }
    cards:
      - type: custom:button-card
        entity: '[[room_entity]]'
        name: '[[room_name]]'
        template: kohbo_room_card_header
        icon: kohbo:kohbo-chair
        variables:
          temperature: '[[temperature]]'
          humidity: '[[humidity]]'
          aqi: '[[aqi]]'
        tap_action:
          action: navigate
          navigation_path: '[[navigation_path]]'

      - type: custom:stack-in-card
        mode: horizontal
        card_mod: !include /config/dashboards/templates/button_cards/base/kohbo_horizontal_stack_room_devices.yaml
        cards: '[[room_devices]]'