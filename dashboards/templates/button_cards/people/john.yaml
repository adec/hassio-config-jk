type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#john'
    styles: !include /config/dashboards/templates/includes/kohbo_popup_styles.yaml
    
  # 
  # Profile Picture
  # 
  - type: custom:button-card
    entity: person.john_koht
    template: people_profile_picture
    variables:
      status: |
        [[[
          if (states['input_select.john_sleep_state'].state == "Sleep") {
            return "sleeping";
          } else if (states['input_boolean.john_dnd'].state == "on") {
            return "dnd";
          }
        ]]]

  # 
  # Heading
  # 
  - type: custom:button-card
    name: "John"
    template: kohbo_person_heading
    custom_fields:
      location: >
        [[[
          if (states['person.john_koht'].state == "home") {
            if (states['input_select.john_sleep_state'].state == "Sleep") {
              return "Home - Sleeping"
            } else if (states['input_boolean.john_dnd'].state == "on") {
              return "Home - Do Not Disturb"
            } else {
              var location = states['sensor.john_room_presence'].state.replace('_', ' ');
              location = location.charAt(0).toUpperCase() + location.slice(1);
              return "Home - " + location;
            }
          } else {
            if (states['person.john_koht'].state == "not_home") {
              return "Away";
            } else {
              return "Away - " + states['person.john_koht'].state;
            }
          }
        ]]]

  # 
  # Location Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      - type: custom:template-entity-row
        icon: kohbo:kohbo-location
        name: Location
        entity: person.john_koht
        state: "{{ states('person.john_koht') | replace('_', ' ') | title }}"
        secondary: "{{ states['person.john_koht'].last_changed | relative_time }} ago"
        color: >
          {% if states['person.john_koht'].state == "home" %}
            #06D6A0
          {% else %}
            white
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        
      - type: custom:template-entity-row
        icon: kohbo:kohbo-room-occupancy
        name: Room
        entity: sensor.john_room_presence
        state: "{{ states('sensor.john_room_presence') | replace('_', ' ') | title }}"
        secondary: "{{ states['sensor.john_room_presence'].last_changed | relative_time }} ago"
        color: >
          {% if states['sensor.john_room_presence'].state == "not_home" %}
            white
          {% else %}
            #06D6A0
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        
      - type: custom:template-entity-row
        icon: kohbo:kohbo-proximity
        name: Proximity
        entity: sensor.home_john_distance
        secondary: "{{ states['sensor.home_john_distance'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: white

      - type: custom:template-entity-row
        icon: kohbo:kohbo-steps
        name: Steps
        entity: sensor.jk_iphone_14_steps
        state: "{{ '{:,}'.format(states('sensor.jk_iphone_14_steps') | int(0)) }}"
        secondary: "{{ states['sensor.jk_iphone_14_steps'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: white

      - type: custom:template-entity-row
        icon: kohbo:kohbo-train
        name: Commuting
        entity: input_boolean.john_commuting
        state: "{{ states('input_boolean.john_commuting') | title }}"
        secondary: "{{ states['input_boolean.john_commuting'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
        color: >
          {% if states['input_boolean.john_commuting'].state == "on" %}
            #06D6A0
          {% else %}
            white
          {% endif %}

  #
  # work Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # Do Not Disturb
      - entity: input_boolean.john_dnd
        icon: kohbo:kohbo-dnd-on
        name: Do Not Disturb
        card_mod: !include /config/dashboards/templates/includes/kohbo_boolean_entity_layout.yaml
        secondary_info: last-changed
        state_color: true
      # Focus Mode
      - type: custom:template-entity-row
        icon: kohbo:kohbo-focus-mode
        name: Focus Mode
        entity: input_select.john_focus_mode
        state: "{{ states('input_select.john_focus_mode') | title }}"
        secondary: "{{ states['input_select.john_focus_mode'].last_changed | relative_time }} ago"
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml

  # 
  # Sleep Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # 
      # Sleep Status
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-person-status
        name: Status
        entity: input_select.john_sleep_state
        # state: "{{ states('person.john_koht') | replace('_', ' ') | title }}"
        secondary: "{{ states['input_select.john_sleep_state'].last_changed | relative_time }} ago"
        color: >
          {% set status = states['input_select.john_sleep_state'].state %}
          {% if status == "Awake" or status == "Just Got Up" %}
            #06D6A0
          {% else %}
            #E36001
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # 
      # Bed Occupancy
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-bed
        name: Bed Occupancy
        entity: binary_sensor.john_bed_occupied
        state: "{{ 'Detected' if states('binary_sensor.john_bed_occupied') == 'on' else 'Clear' }}"
        secondary: "{{ states['binary_sensor.john_bed_occupied'].last_changed | relative_time }} ago"
        color: >
          {% if states['binary_sensor.john_bed_occupied'].state == "on" %}
            #E36001
          {% else %}
            white
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # 
      # Sleep Score
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-moon-2
        name: Sleep Score
        entity: sensor.withings_sleep_score
        secondary: "{{ states['sensor.withings_sleep_score'].last_changed | relative_time }} ago"
        color: white
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml

  # 
  # Device Details
  # 
  - type: entities
    card_mod: !include /config/dashboards/templates/includes/people/kohbo_person_entities_layout.yaml
    entities:
      # 
      # Phone Battery Level
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-battery-50
        # icon: !include /config/dashboards/templates/includes/people/kohbo_person_battery_icon.yaml
        # icon: >
        #   {% set battery_level = states[config.entity].state | int(0) %}
        #   {% if battery_level >= 90 %}
        #     '{{"kohbo:kohbo-battery-100"}}'
        #   {% elif battery_level >= 75 %}
        #     '{{"kohbo:kohbo-battery-75"}}'
        #   {% elif battery_level >= 50 %}
        #     '{{"kohbo:kohbo-battery-50"}}'
        #   {% else %}
        #     '{{"kohbo:kohbo-battery-25"}}'
        #   {% endif %}
        name: Battery
        entity: sensor.jk_iphone_14_battery_level
        state: "{{ states['sensor.jk_iphone_14_battery_level'].state }}%"
        secondary: "{{ states['sensor.jk_iphone_14_battery_level'].last_changed | relative_time }} ago"
        color: >
          {% set battery_level = states[config.entity].state | int(0) %}
          {% if battery_level > 80 %}
            #06D6A0
          {% elif battery_level <= 20 %}
            #E36001
          {% else %}
            white
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # 
      # Watch Battery Level
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-watch
        name: Watch Battery
        entity: sensor.jk_2_watch_battery
        state: "{{ states[config.entity].state }}%"
        secondary: "{{ states['sensor.jk_2_watch_battery'].last_changed | relative_time }} ago"
        color: >
          {% set battery_level = states[config.entity].state | int(0) %}
          {% if battery_level > 80 %}
            #06D6A0
          {% elif battery_level <= 20 %}
            #E36001
          {% else %}
            white
          {% endif %}
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml
      # 
      # Network Details
      # 
      - type: custom:template-entity-row
        icon: kohbo:kohbo-wifi
        name: Wifi Network
        entity: sensor.jk_iphone_14_ssid
        secondary: "{{ states['sensor.jk_iphone_14_ssid'].last_changed | relative_time }} ago"
        color: white
        card_mod: !include /config/dashboards/templates/includes/kohbo_entity_item_layout.yaml