type: custom:stack-in-card
card_mod:
  style: |
    :host {
      --stack-card-gap: 0;
    }
cards:
  - type: custom:mini-graph-card
    entities:
      - entity: sensor.average_indoor_temperature
        color: "#59A5D8"
    name: Indoor Climate
    icon: mdi:thermometer
    card_mod:
      style: |
        ha-card {
          border: none;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          box-shadow: none;
        }
        ha-card .header {
          padding-bottom: 2px;
        }

  # - type: horizontal-stack
  - type: custom:stack-in-card
    mode: horizontal
    card_mod:
      style: |
        ha-card {
          background: #272A2E;
          border-top-right-radius: 0;
          border-top-left-radius: 0;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          box-shadow: none;
          border: none;
          box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.05);
        }
    cards:
      - type: custom:button-card
        entity: sensor.average_indoor_humidity
        template: kohbo_aqi_humidity_item

      - type: custom:button-card
        entity: sensor.indoor_air_quality_pm2_5
        template: kohbo_aqi_pm25_item
        variables:
          aqi_status: "[[[ return states['sensor.indoor_air_quality_pm2_5_status'].state ]]]"

      - type: custom:button-card
        entity: sensor.indoor_air_quality_co2
        template: kohbo_aqi_co2_item
        variables:
          aqi_status: "[[[ return states['sensor.indoor_air_quality_co2_status'].state ]]]"
      
      - type: custom:button-card
        entity: sensor.indoor_air_quality_tvoc
        template: kohbo_aqi_tvocs_item
        variables:
          aqi_status: "[[[ return states['sensor.indoor_air_quality_tvoc_status'].state ]]]"
