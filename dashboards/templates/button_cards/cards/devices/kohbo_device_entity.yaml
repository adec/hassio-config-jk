kohbo_device_entity:
  template: kohbo_entity
  layout: vertical
  show_state: true
  size: 100%
  tap_action:
    action: more-info
  styles:
    card:
      - height: 155px
      - margin: 0
      - --mdc-ripple-color: var(--darker-primary-color)
      - --mdc-ripple-press-opacity: 0.8
    name:
      - margin-bottom: 8px
    state:
      - color: "#CED4DA"
      - font-size: 12px
      - font-weight: normal
      - opacity: 1
