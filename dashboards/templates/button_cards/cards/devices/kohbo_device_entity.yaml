kohbo_device_entity:
  template: kohbo_entity
  layout: vertical
  show_state: true
  size: 100%
  tap_action:
    action: more-info
  haptic: light
  state_display: >
    [[[
      const last = new Date(entity.last_changed);
      const now = new Date();
      const diff = Math.floor((now - last) / 1000);

      function titleCase(str) {
        return str
          .replace(/_/g, " ")
          .toLowerCase()
          .split(" ")
          .map(word => word.charAt(0).toUpperCase() + word.slice(1))
          .join(" ");
      }

      const state = hass.formatEntityState ? hass.formatEntityState(entity): titleCase(entity.state);

      if (diff < 3600) {
        return `${state} - ${Math.floor(diff / 60) + "m"}`;
      } else if (diff < 86400) {
        return `${state} - ${Math.floor(diff / 3600) + "h"}`;
      } else {
        return `${state} - ${Math.floor(diff / 86400) + "d"}`;
      }
    ]]]
  styles:
    card:
      - height: 155px
      - margin: 0
      - --mdc-ripple-color: var(--darker-primary-color)
      - --mdc-ripple-press-opacity: 0.8
    name:
      - margin-bottom: 8px
    state:
      - color: "#CED4DA"
      - font-size: 12px
      - font-weight: normal
      - opacity: 1
    # icon:
    #   - color: >
    #       [[[
    #         if (entity.state == "on")
    #           return '#FFD166';
    #         else if (entity.state == "open")
    #           return '#59A5D8';
    #         else
    #           return '#F8F9FA';
    #       ]]]
    img_cell:
      - height: 40px
      - width: 40px
      - margin-bottom: 15px
