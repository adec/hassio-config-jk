    #         if (entity.state == "on")
    #           return '#FFD166';
    #         else if (entity.state == "open")
    #           return '#59A5D8';
    #         else
    #           return '#F8F9FA';
    #       ]]]
    img_cell:
      - height: 40px
      - width: 40px
      - margin-bottom: 15px
