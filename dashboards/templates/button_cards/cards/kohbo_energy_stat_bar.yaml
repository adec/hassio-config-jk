#------------------------------------------------------------------------------
# Energy Stat Bar Template
#
# Stat card with segmented bar indicator (uptime-bar style).
#
# Variables:
#   - show_divider: Whether to show right border divider (default: true)
#   - unit_label: Unit label below value (default: kWh)
#   - bar_mode: 'realtime' | 'today' | 'forecast' (determines calculation logic)
#------------------------------------------------------------------------------
kohbo_energy_stat_bar:
  show_icon: false
  show_state: true
  show_name: true
  show_label: false
  variables:
    show_divider: true
    unit_label: kWh
    bar_mode: 'today'
  styles:
    grid:
      - grid-template-areas: '"n n" "s u" "b b"'
      - grid-template-columns: auto 1fr
      - grid-template-rows: auto auto auto
    card:
      - background: transparent
      - padding: 0 16px 2px
      - margin: 16px 0 14px
      - box-shadow: none
      - border-right: |
          [[[
            return variables.show_divider ? '1px solid rgba(255,255,255,0.08)' : 'none';
          ]]]
    name:
      - font-size: 11px
      - font-weight: 600
      - text-transform: uppercase
      - color: var(--semi-dark-grey-color)
      - text-align: left
      - justify-self: start
      - width: 100%
      - margin-bottom: 4px
    state:
      - font-size: 26px
      - font-weight: 600
      - color: var(--primary-text-color)
      - text-align: left
      - justify-self: start
    custom_fields:
      u:
        - font-size: 12px
        - color: var(--semi-dark-grey-color)
        - justify-self: start
        - align-self: end
        - padding-bottom: 3px
        - padding-left: 4px
      b:
        - margin-top: 10px
        - display: flex
        - gap: 3px
        - height: 8px
        - width: 100%
  custom_fields:
    u: '[[[ return variables.unit_label; ]]]'
    b: |
      [[[
        const mode = variables.bar_mode || 'today';
        let pct = 0;
        let color = 'var(--accent-color)';
        
        if (mode === 'realtime') {
          // Real-time power consumption (3000W max)
          // Color thresholds aligned with bar position
          const watts = parseFloat(states['sensor.energy_current_consumption']?.state || 0);
          pct = Math.min(Math.max((watts / 3000) * 100, 0), 100);
          if (watts < 1000) color = 'var(--success-color)';       // 0-33%
          else if (watts < 2000) color = 'var(--accent-color)';   // 33-66%
          else if (watts < 2500) color = 'var(--orange-color)';   // 66-83%
          else color = 'var(--error-color)';                      // 83-100%
        } else if (mode === 'today') {
          // Today's usage vs expected
          const actual = parseFloat(states['sensor.whole_home_energy_daily_usage']?.state || 0);
          const expected = parseFloat(states['sensor.energy_expected_full_day']?.state || 1);
          const expectedSoFar = parseFloat(states['sensor.energy_expected_so_far']?.state || 1);
          pct = Math.min((actual / expected) * 100, 100);
          const ratio = actual / expectedSoFar;
          if (ratio < 0.9) color = 'var(--success-color)';
          else if (ratio <= 1.1) color = 'var(--accent-color)';
          else if (ratio <= 1.3) color = 'var(--orange-color)';
          else color = 'var(--error-color)';
        } else if (mode === 'forecast') {
          // EOD forecast vs expected
          const forecast = parseFloat(states['sensor.energy_forecast_end_of_day']?.state || 0);
          const expected = parseFloat(states['sensor.energy_expected_full_day']?.state || 1);
          pct = Math.min((forecast / expected) * 100, 100);
          const ratio = forecast / expected;
          if (ratio < 0.9) color = 'var(--success-color)';
          else if (ratio <= 1.1) color = 'var(--accent-color)';
          else if (ratio <= 1.3) color = 'var(--orange-color)';
          else color = 'var(--error-color)';
        }
        
        const empty = 'var(--divider-color)';
        let output = '<div style="display:flex;gap:3px;width:100%;height:8px;">';
        for (let i = 1; i <= 10; i++) {
          const filled = pct >= (i * 10);
          const bg = filled ? color : empty;
          output += `<div style="flex:1;height:100%;border-radius:2px;background:${bg};transition:background 0.3s ease;"></div>`;
        }
        output += '</div>';
        return output;
      ]]]
