kohbo_person_entity:
  # template: kohbo_entity
  # layout: vertical
  show_state: false
  show_name: false
  show_entity_picture: true
  size: 45px
  styles:
    card:
      - height: 45px
      - width: 45px
      - padding: 0
      - background: transparent
      - border: none
      - border-radius: 0
    img_cell:
      - border-radius: 50%
    custom_fields:
      occupancy_state:
        - background-color: >
            [[[
              if (entity.state == "home")
                return "#06D6A0";
              return "#ED4747";
            ]]]
        - border-radius: 50%
        - position: absolute
        - bottom: 0
        - right: 0
        - height: 10px
        - width: 10px
        - box-shadow: 0 0 4px 0 rgba(0, 0, 0, 0.5)
  custom_fields:
    occupancy_state: >
      [[[
        return "";
      ]]]