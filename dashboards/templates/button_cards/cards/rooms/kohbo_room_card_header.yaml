kohbo_room_card_header:
  size: 100%
  show_icon: true
  show_state: true
  state_display: >
    [[[
      if (entity.state == "on")
        return "Occupied";
      else
        return "Unoccupied";
    ]]]
  variables: 
    temperature: "72"
    humidity: "40"
  styles:
    grid:
      - grid-template-areas: '"i n temperature" "i s humidity"'
      - grid-template-columns: 40px 1fr 100px
      - grid-template-rows: 1fr 1fr
    card:
      - padding: 20px
      - background: transparent
      - backdrop-filter: none
      - -webkit-backdrop-filter: none
      - box-shadow: none
      - border: none
    name:
      - padding-left: 16px
      # - padding-top: 4px
      - justify-self: start
      - align-self: end
      - font-size: 18px
      - line-height: 19px
      - font-weight: 700
      - color: "#F8F9FA"
    state:
      - padding-left: 32px
      - justify-self: start
      - font-size: 13px
      - line-height: 13px
      - font-weight: 500
      - color: "#CED4DA"
    custom_fields:
      temperature:
        - font-size: 22px
        - line-height: 22px
        - font-weight: 400
        - color: "#F8F9FA"
        - justify-self: end
        - align-self: end
      humidity:
        - font-size: 13px
        - line-height: 13px
        - font-weight: 400
        - color: "#CED4DA"
        - justify-self: end

  custom_fields:
    temperature: >
      [[[ return Math.round(variables.temperature * 10) / 10 + "°" ]]]
    humidity: >
      [[[ return Math.round(variables.humidity * 10) / 10 + "% Humidity" ]]]
  card_mod:
    debug: true
    style: |
      #state {
        position: relative;
      }
      #state:before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background-color: {{"#06D6A0" if states[config.entity].state == "on" else "#ADB5BD"}};
        position: absolute;
        top: 1px;
        left: 16px;
      }
      