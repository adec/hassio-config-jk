kohbo_pill:
  size: 24px
  styles:
    grid:
      - grid-template-columns: 30% 1fr
    card:
      - border-radius: 45px
      - height: 45px
      - padding-left: 10px
      - padding-right: 10px
      - box-shadow: none
    state:
      - color: '#F8F9FA'
      - font-size: 14px
      - font-weight: 600
      - justify-self: start
      - margin-left: 5px
      - line-height: 15px