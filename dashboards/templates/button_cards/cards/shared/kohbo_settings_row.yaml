kohbo_settings_row:
  # template: kohbo_device_entity
  # layout: vertical
  show_state: true
  # size: 100%
  styles:
    grid:
      - grid-template-areas: '"n s carat"'
      - grid-template-columns: auto auto 30px
      - grid-template-rows: auto
      - align-items: center
    card:
      - padding: 20px
    name:
      - font-size: 15px
      - font-weight: 700
      - line-height: 15px
      - justify-self: start
      - align-self: center
    state:
      - font-size: 14px
      - font-weight: 400
      - justify-self: end
      - align-self: center
    custom_fields:
      carat:
        - width: 24px
        - justify-self: end
        - align-self: center
        - justify-items: end
  custom_fields:
    carat: >
      [[[
        return `<ha-icon icon="mdi:chevron-right"></ha-icon>`
      ]]]
