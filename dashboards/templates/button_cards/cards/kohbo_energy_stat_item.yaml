#------------------------------------------------------------------------------
# Energy Stat Item Template
#
# Used for Actual, Expected, EOD Forecast stats in the energy dashboard.
#
# Variables:
#   - state_color: Color for the state value (default: var(--primary-text-color))
#   - show_divider: Whether to show right border divider (default: true)
#
# Usage:
#   - type: custom:button-card
#     template: kohbo_energy_stat_item
#     entity: sensor.whole_home_energy_daily_usage
#     name: Actual
#     variables:
#       state_color: var(--success-color)
#       show_divider: true
#------------------------------------------------------------------------------
kohbo_energy_stat_item:
  show_icon: true
  show_state: true
  show_name: true
  show_label: true
  label: kWh
  icon: mdi:minus
  variables:
    state_color: var(--primary-text-color)
    show_divider: true
  state_display: |
    [[[
      const val = parseFloat(entity?.state || 0);
      return val.toFixed(1);
    ]]]
  styles:
    grid:
      - grid-template-areas: '"n n" "s i" "l l"'
      - grid-template-columns: min-content 1fr
    card:
      - background: transparent
      - padding: 0px 16px 0px 20px
      - box-shadow: none
      - margin-top: 16px
      - margin-bottom: 16px
      - border-right: |
          [[[
            return variables.show_divider ? '1px solid rgba(255,255,255,0.08)' : 'none';
          ]]]
    img_cell:
      - justify-content: flex-start
      - padding-left: 5px
    icon:
      - width: 20px
      - height: 20px
      - color: var(--secondary-text-color)
      - margin: 0
    state:
      - color: '[[[ return variables.state_color ]]]'
      - font-size: 26px
      - font-weight: 600
    name:
      - font-size: 11px
      - font-weight: 600
      - text-transform: uppercase
      - color: var(--light-grey-color)
      - width: 100%
      - text-align: left
    label:
      - font-size: 12px
      - color: var(--light-grey-color)
      - width: 100%
      - text-align: left

