kohbo_security_item:
  show_state: true
  styles:
    card:
      - background: transparent
      - box-shadow: none
      - padding: 20px 10px
      - border: none
      - backdrop-filter: none
      - -webkit-backdrop-filter: none
    icon:
      - color: >
          [[[
            return (entity.state === 'on'
            || entity.state === 'armed_home'
            || entity.state === 'armed'
            || entity.state === 'locked'
            || entity.state === 'closed'
            ) ? '#06D6A0' : '#ED4747';
          ]]]
      - height: 24px;
      - margin-bottom: 15px;
    name:
      - color: white
      - font-size: 10px
      - color: "#ADB5BD"
    state:
      - font-weight: bold
      - color: "#F8F9FA"
      - font-size: 12px;
      - margin-top: 2px;
    