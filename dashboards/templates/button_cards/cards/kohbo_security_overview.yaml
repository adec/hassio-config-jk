type: custom:stack-in-card
cards:
  - type: custom:button-card
    entity: sensor.house_security_status
    label: Security Overview
    icon: |
      [[[
        if (entity.state == "Partially Secure")
          return "kohbo:kohbo-security-low"
        else if (entity.state == "Totally Secure")
          return "kohbo:kohbo-security-high"
        else
          return "kohbo:kohbo-security-low"
      ]]]
    show_state: true
    state_display: |
      [[[
        if (entity.state == "Partially Secure")
          return "Home Partial Secure"
        else if (entity.state == "Totally Secure")
          return "Home Secure"
        else
          return "Home Vulnerable"
      ]]]
    show_icon: true
    show_name: false
    show_label: true
    layout: icon_name_state
    tap_action:
      action: none
    styles:
      card:
        - background: transparent
        - backdrop-filter: none
        - -webkit-backdrop-filter: none
        - padding: 20px
        - box-shadow: none
        - display: flex
        - align-items: center
        - justify-content: flex-start
        - gap: 12px
        - border: none
      grid:
        - grid-template-areas: "\"i n\" \"i l\""
        - grid-template-columns: min-content 1fr
        - align-items: center
      icon:
        - color: >
            [[[
              return entity.state === 'Totally Secure' ? '#06D6A0' : '#FFD166';
            ]]]
        - width: 38px
        - height: 38px
        - margin-right: 15px
      name:
        - font-size: 20px
        - font-weight: regular
        - color: white
        - justify-self: start
        - margin-bottom: 4px;
      label:
        - font-size: 12px
        - color: "#CED4DA"
        - justify-self: start

 
  - type: custom:stack-in-card
    mode: horizontal
    keep:
      background: true
    card_mod:
      style: |
        ha-card {
          background: #272A2E;
          border-top-right-radius: 0;
          border-top-left-radius: 0;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          box-shadow: none;
          border: none;
          box-shadow: inset 0 4px 8px 0 rgba(0, 0, 0, 0.05);
        }
    cards:
      - type: custom:button-card
        entity: alarm_control_panel.panel
        name: Alarm
        template: kohbo_security_item
        #icon: kohbo:kohbo-alarm-armed
        state:
          - value: 'disarmed'
            icon: kohbo:kohbo-alarm-disarmed
          - value: 'armed_home'
            icon: kohbo:kohbo-alarm-armed-home
          - value: 'armed_away'
            icon: kohbo:kohbo-alarm-armed-away

      - type: custom:button-card
        entity: lock.house_locks
        name: Locks
        template: kohbo_security_item
        # icon: kohbo:kohbo-lock-locked
        state:
          - value: 'unlocked'
            icon: kohbo:kohbo-lock-unlocked
          - value: 'locked'
            icon: kohbo:kohbo-lock-locked

      - type: custom:button-card
        entity: cover.garage_doors
        name: Garage
        template: kohbo_security_item
        icon: kohbo:kohbo-garage-closed
