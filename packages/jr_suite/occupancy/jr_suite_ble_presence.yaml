template:
  - sensor:
      - name: "Jr. Suite People List"
        unique_id: jr_suite_people_list
        state: >
          {% set people = expand('group.people_sensors') %}
          {% set in_room = people | selectattr('attributes.room_presence', 'equalto', 'jr_suite') | map(attribute='entity_id') | list %}
          {{ in_room | length }}
        attributes:
          people: >
            {% set people = expand('group.people_sensors') %}
            {% set in_room = people | selectattr('attributes.room_presence', 'equalto', 'jr_suite') | map(attribute='entity_id') | list %}
            {{ in_room }}