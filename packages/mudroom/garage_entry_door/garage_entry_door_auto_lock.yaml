# 
# Garagae Entry Door - Auto Lock
# 
# This automation will lock the garage entry door
# when the house goes into bedtime mode and the
# house becomes unoccupied.
# 
automation:
  - id: "garage_entry_door_lock_auto_lock"
    alias: "Garage Entry Door Lock - Auto Lock"
    initial_state: on
    triggers:
      # House becomes unoccupied
      - trigger: state
        entity_id: input_boolean.house_occupied
        to: "off"
    conditions:
      # Garage entry door is unlocked
      - condition: state
        entity_id: lock.garage_entry_door
        state: "unlocked"
      # Nobody just arrived
      - condition: state
        entity_id: binary_sensor.somebody_just_arrived
        state: "off"
    actions:
      # Lock the door!
      - action: lock.lock
        entity_id: lock.garage_entry_door

  # 
  # Garage Entry Door - Auto Lock When Home
  # An automation to handle autolocking when we're home to help
  # work around some issues and race conditions.
  # 
  - id: "garage_entry_door_lock_auto_lock_when_home"
    alias: "Garage Entry Door Lock - Auto Lock When Home"
    initial_state: on
    triggers:
      # House goes into bedtime mode
      - trigger: state
        entity_id: input_boolean.bedtime
        to: "on"
      # At the lock time
      - trigger: time
        at: input_datetime.garage_entry_door_lock_time
      # House is occupied for 15 minutes
      - trigger: state
        entity_id: input_boolean.house_occupied
        to: "on"
        for:
          minutes: 15
      # Re-evaluate after somebody just arrived clears
      - trigger: state
        entity_id: binary_sensor.somebody_just_arrived
        to: "off"
        for:
          minutes: 10
    conditions:
      # Garage entry door is unlocked
      - condition: state
        entity_id: lock.garage_entry_door
        state: "unlocked"
      # Nobody just arrived
      - condition: state
        entity_id: binary_sensor.somebody_just_arrived
        state: "off"
      - condition: or
        conditions:
          # It's after the time defined in input_datetime.garage_entry_door_lock_time
          # if it's defined, otherwise proceed
          - condition: template
            value_template: >
              {% set t = states('input_datetime.garage_entry_door_lock_time') %}
              {% if t in ['unknown', 'unavailable', '', None] %}
                true
              {% else %}
                {{ as_timestamp(now()) >= as_timestamp(today_at(t)) }}
              {% endif %}
          # OR bedtime mode is enabled
          - condition: state 
            entity_id: input_boolean.bedtime
            state: "on"
    actions:
      # Lock the door!
      - action: lock.lock
        entity_id: lock.garage_entry_door


# 
# Garage Entry Door Lock Time
# 
input_datetime:
  garage_entry_door_lock_time:
    name: Garage Entry Door Lock Time
    icon: mdi:lock
    initial: "22:00:00"
    has_date: false
    has_time: true