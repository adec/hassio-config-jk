automation:
  - id: "garage_entry_door_auto_unlock"
    alias: "Garage Entry Door - Auto Unlock"
    initial_state: on
    triggers:
      # The door is opened
      - trigger: state
        entity_id: binary_sensor.interior_garage_door
        from: "off"
        to: "on"
    conditions:
      # Garage entry door is locked
      - condition: state
        entity_id: lock.garage_entry_door
        state: "locked"
      # House is occupied
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
    actions:
      # Unlock the door!
      - action: lock.unlock
        entity_id: lock.garage_entry_door



