# Announcement Queue - Processor
# 
# This script is used to process the announcement queue.
# It's called by the announcement_queue_enqueue script.
#
# It's responsible for:
# - Filtering out expired messages
# - Maintaining the queue priority order
# - Triggering the announcement engine
#
automation:
  - id: announcement_queue_processor
    alias: "Announcement Queue - Processor"
    mode: single
    initial_state: on

    #
    # Trigger
    #
    # This trigger is used to listen for the announcement queue state
    # and the house occupied state.
    #
    trigger:
      # Announcement Queue State
      - trigger: state
        entity_id: sensor.announcement_queue
      # Announcement Queue Running
      - trigger: state
        entity_id: input_boolean.announcement_queue_running
        to: "off"
      # Announcement Queue State
      - trigger: mqtt
        topic: home/announcement_queue/state
      # House Occupied for 5 minutes
      - trigger: state
        entity_id: input_boolean.house_occupied
        to: "on"
        for:
          minutes: 5
      # Quiet mode is off
      - trigger: state
        entity_id: input_boolean.quiet_mode
        to: "off"
        for:
          minutes: 3

    condition:
      # Make sure the house is occupied
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
      # Make sure quiet mode is off, unless it's before 9am
      - condition: template
        value_template: >
          {% set quiet = is_state('input_boolean.quiet_mode', 'on') %}
          {% set hour = now().hour %}
          {{ not (quiet and hour < 9) }}
      # Make sure the queue is not empty
      - condition: template
        value_template: >
          {% set q = state_attr('sensor.announcement_queue', 'queue') %}
          {{ q is iterable and q | length > 0 }}
      # Make sure the queue is not running
      - condition: state
        entity_id: input_boolean.announcement_queue_running
        state: "off"
      # For non-critical messages, make sure there's an announceable room
      - condition: template
        value_template: >
          {% set q = state_attr('sensor.announcement_queue', 'queue') %}
          {% if q is iterable and q | length > 0 %}
            {% set next_msg = q[0] %}
            {% if next_msg.priority == 'critical' %}
              true
            {% else %}
              {{ states('binary_sensor.announceable_rooms_occupied') == 'on' }}
            {% endif %}
          {% else %}
            false
          {% endif %}

    action:
      # Turn on the announcement queue running flag
      - action: input_boolean.turn_on
        entity_id: input_boolean.announcement_queue_running

      #
      # Variables
      #
      - variables:
          #
          # This is the raw queue from the sensor attributes.
          #
          raw_queue: "{{ state_attr('sensor.announcement_queue', 'queue') }}"
          #
          # This is the queue with the expired messages filtered out.
          #
          queue: >-
            {% if raw_queue is iterable %}
              {# Filter out expired messages and apply priority rules #}
              {% set now_iso = now().isoformat() %}
              {% set valid_msgs = namespace(list=[]) %}
              {% for msg in raw_queue %}
                {% if msg is mapping %}
                  {% set expires_at = msg.get('expires_at') %}
                  {% set priority = msg.get('priority', 'normal') %}
                  {# Keep message if not expired - we process all priorities when occupied #}
                  {% if not expires_at or expires_at > now_iso %}
                    {% set valid_msgs.list = valid_msgs.list + [msg] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ valid_msgs.list }}
            {% else %}
              [] 
            {% endif %}
          #
          # This is the next message to be announced.
          #
          next: "{{ queue[0] if queue | length > 0 else {} }}"
          #
          # This is the updated queue with the next message removed.
          #
          updated: "{{ queue[1:] if queue | length > 1 else [] }}"
          payload_json: '{{ {"queue": updated} | to_json }}'

      #
      # If the queue is not empty then call the announcement engine
      #
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ queue | length > 0 and (next.get('speech_message') is string or next.get('sound_file') is string) }}"
            sequence:
              #
              # Trigger the announcement engine. Continue on error
              # because we don't want to block the queue processor.
              #
              - alias: "Broadcast the announcement"
                continue_on_error: true
                action: script.announcement_engine
                data:
                  speech_message: "{{ next.speech_message }}"
                  sound_file: "{{ next.sound_file }}"
                  sound_length: "{{ next.sound_length }}"
                  sound_volume: "{{ next.sound_volume }}"
                  speech_volume: "{{ next.speech_volume }}"
                  media_players: "{{ next.media_players }}"

              # # Debug notification
              # - action: script.general_notification
              #   data:
              #     message: "{{ next.sound_file }} | {{ next.sound_length }} | {{ next.sound_volume }} | {{ next.speech_volume }} | {{ next.media_players }}"
              #     title: "{{next.speech_message}}"
              #     devices: "jk"
              #     priority: "time-sensitive"
              #     tag: "test-testerson"
      #

      # 
      # Run the following sequence regardless of whether the
      # announcement engine was called or not.
      # 

      #
      # Publish trimmed queue back to MQTT
      #
      - action: mqtt.publish
        data:
          topic: "home/announcement_queue/data"
          payload: "{{ payload_json }}"
          retain: true

      #
      # Publish the updated queue back to MQTT
      #
      - action: mqtt.publish
        data:
          topic: "home/announcement_queue/state"
          payload: "queue"
          retain: true

      # Give the system a breather
      #
      - delay: "00:00:03"

      #
      # Turn off the announcement queue running flag
      #
      - action: input_boolean.turn_off
        entity_id: input_boolean.announcement_queue_running
