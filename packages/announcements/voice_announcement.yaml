# Voice Announcment - TTS Broadcast
#
# The voice announcement is a helper script I run to
# create TTS messages from various automations. For
# example when the laundry is done, somebody arrives,
# or calendar reminders.
#
# This script is a wrapper of the announcement engine,
# which actually broadcasts the chime and TTS message.
# It's mostly for convenience and usability.
#
# USAGE:
#   - action: script.voice_announcement
#     data:
#      media_players: auto
#      sound: "one-chime"
#      speech_message: "The upstairs washer is done and ready to be emptied."
#
#
# Media Player: set to "auto" will automatically broadcast the
# message in occupied rooms. Otherwise, a specific room can be passed.
#
# Sound: different notifications require different chimes. There are
# individualized intro sounds for person arrival/departures or various
# types of chimes that can be used.
#
script:
  voice_announcement:
    alias: Voice Announcement
    mode: "queued"
    # Fields for dynamic attributes
    fields:
      #
      #
      # Sound
      #
      sound:
        name: Sound
        description: The chime sound to play prior to the notification
        example: "arcade"
        default: "default"
        selector:
          select:
            options:
              - default
              - fanfare
              - chirp
              - chime
              - one-chime
              - flute-cell-phone-alert
              - arcade
              - police-whistle
              - arabic-intro
              - school-bell-chime
              - school-bell
              - tarantella
              - success-trumpets
              - games-sfx
              - fox-nfl
              - harp-flourish
              - message-alert
              - musical-flute
              - success-trumpets
              - alex
              - yara
              - shawn
              - jido
              - genny
      #
      #
      # Speech Message Details
      #
      speech_message:
        name: Speech Message
        description: The TTS message that will be broadcast
        example: "Hello, world!"
        selector:
          text:
            type: text
      #
      #
      # Media Player
      media_players:
        name: Media Players
        description: The media players that should broadcast the announcement
        example: "media_player.sonos_office"
        selector:
          entity:
            include_entities:
              - media_player.sonos_office
              - media_player.sonos_family_room
              - media_player.sonos_kitchen
              - media_player.sonos_playroom
              - media_player.sonos_living_room
      # sup
      # Priority
      #
      priority:
        name: Priority
        description: The priority of the announcement
        default: "low"
        example: "high"
        selector:
          select:
            options:
              - "critical" # Emergency alerts only (fire, smoke, leaks)
              - "high" # Important but not emergency
              - "normal" # Regular announcements
              - "low" # Non-essential information
      #
      # Expires In
      #
      expires_in:
        name: Expires In
        description: The number of minutes until the announcement expires
        example: 3
        selector:
          number:
            min: 1
            max: 120

    # Variables
    variables:
      #
      # Passing "sound" to the script is a convenience method so I don't
      # have to remember the file. This will map the sound argument to
      # the file that needs to be loaded for the chime.
      #
      sound_file: >-
        {% if sound == "default" %}
          /local/sounds/Notification-sound.mp3
        {% elif sound == "fanfare" %}
          /local/sounds/medieval-fanfare.mp3
        {% elif sound == "chirp" %}
          /local/sounds/twitter-chirp.mp3
        {% elif sound == "chime" %}
          /local/sounds/two-tone-chime.mp3
        {% elif sound == "one-chime" %}
          /local/sounds/one-tone-chime.mp3
        {% elif sound == "flute-cell-phone-alert" %}
          /local/sounds/flute-cell-phone-alert.mp3
        {% elif sound == "arcade" %}
          /local/sounds/arcade-bonus-alert.mp3
        {% elif sound == "police-whistle" %}
          /local/sounds/police-short-whistle.mp3
        {% elif sound == "arabic-intro" %}
          /local/sounds/arabic_intro.mp3
        {% elif sound == "school-bell-chime" %}
          /local/sounds/school-bell-chime.mp3
        {% elif sound == "school-bell" %}
          /local/sounds/school-bell.mp3
        {% elif sound == "tarantella" %}
          /local/sounds/tarantella.mp3
        {% elif sound == "success-trumpets" %}
          /local/sounds/success-trumpets.mp3
        {% elif sound == "games-sfx" %}
          /local/sounds/games-sfx.mp3
        {% elif sound == "fox-nfl" %}
          /local/sounds/fox-nfl.mp3
        {% elif sound == "harp-flourish" %}
          /local/sounds/harp-flourish.mp3
        {% elif sound == "message-alert" %}
          /local/sounds/Message-alert-tone.mp3
        {% elif sound == "musical-flute" %}
          /local/sounds/musical-flute-alert.mp3
        {% elif sound == "success-trumpets" %}
          /local/sounds/success-trumpets.mp3
        {% elif sound == "alex" %}
          /local/sounds/alex-intro.mp3
        {% elif sound == "yara" %}
          /local/sounds/yara.mp3
        {% elif sound == "shawn" %}
          /local/sounds/shawn.mp3
        {% elif sound == "jido" %}
          /local/sounds/jido.mp3
        {% elif sound == "genny" %}
          /local/sounds/genny.mp3
        {% else %}
          /local/sounds/Notification-sound.mp3
        {% endif %}
      #
      # Sound file length:
      # I've found that the announce feature will sometimes fail to play
      # the entire chime so I set a specific timeout based on the chime
      # length. This has worked very well so far.
      #
      sound_file_length: >-
        {% if sound == "default" %}
          2
        {% elif sound == "fanfare" %}
          8
        {% elif sound == "chirp" %}
          1
        {% elif sound == "chime" %}
          4
        {% elif sound == "one-chime" %}
          5
        {% elif sound == "flute-cell-phone-alert" %}
          3
        {% elif sound == "arcade" %}
          2
        {% elif sound == "police-whistle" %}
          1
        {% elif sound == "arabic-intro" %}
          3
        {% elif sound == "school-bell-chime" %}
          4
        {% elif sound == "school-bell" %}
          4
        {% elif sound == "tarantella" %}
          4
        {% elif sound == "success-trumpets" %}
          4
        {% elif sound == "games-sfx" %}
          1
        {% elif sound == "fox-nfl" %}
          3
        {% elif sound == "harp-flourish" %}
          3
        {% elif sound == "message-alert" %}
          2
        {% elif sound == "musical-flute" %}
          2
        {% elif sound == "success-trumpets" %}
          4
        {% elif sound == "alex" %}
          17
        {% elif sound == "yara" %}
          15
        {% elif sound == "shawn" %}
          14
        {% elif sound == "jido" %}
          11
        {% elif sound == "genny" %}
          22
        {% else %}
          2
        {% endif %}
      #
      # Sound file volume:
      # Some sounds are just too loud or too quiet so I have a few overrides
      # in place to adjust the volume appropriately. The state of the house
      # can also influence the volume of the chime and TTS message.
      #
      sound_file_volume: >-
        {# Sound volumes vary so this is a way to compensate #}
        {% set vol = 35 %}
        {% if sound == "fox-nfl" %}
          {% set vol = 20 %}
        {% elif sound == "arcade" %}
          {% set vol = 40 %}
        {% elif sound == "fanfare" %}
          {% set vol = 30 %}
        {% elif sound == "tarantella" %}
          {% set vol = 30 %}
        {% elif sound == "tarantella" %}
          {% set vol = 40 %}
        {% endif %}

        {# Adjust the volume based on house mode #}
        {% if states.input_boolean.quiet_mode.state == "on" %}
          {% set vol = vol * 0.5 %}
        {% endif %}

        {{ vol }}
      # Sound file volume
      speech_volume: >-
        {# Sound volumes vary so this is a way to compensate #}
        {% set vol = 40 %}

        {# Adjust the volume based on house mode #}
        {% if states.input_boolean.quiet_mode.state == "on" %}
          {% set vol = vol * 0.50%}
        {% endif %}

        {{ vol }}

      #
      # Save announcement:
      # This was originally set as a way to QA test announcements
      # but I've just left it in there. It saves the latest TTS
      # message to an input field for future reference.
      #
      save_announcement: true

      #
      # Default priority:
      # If no priority is provided, default to low
      #
      default_priority: >-
        {% if priority is defined and priority is not none %}
          {{ priority }}
        {% else %}
          "low"
        {% endif %}

      #
      # Calculate default expiration based on priority if not provided
      #
      default_expires_in: >-
        {% if expires_in is defined and expires_in is not none %}
          {{ expires_in }}
        {% else %}
          {% if default_priority == "low" %}
            3
          {% elif default_priority == "normal" %}
            10
          {% else %}
            null
          {% endif %}
        {% endif %}

    sequence:
      # Speech notifications is enabled
      - condition: state
        entity_id: input_boolean.speech_notifications
        state: "on"
      # It's between 7am and 10pm
      - condition: time
        after: "06:00:00"
        before: "23:00:00"
      # Not bedtime
      - condition: state
        entity_id: input_boolean.bedtime
        state: "off"

      # Call the announcement engine and pass the requested media_players
      # or default to ones in occupied rooms
      #
      # Music-aware logic for low/normal priority:
      # - High/Critical priority: always include occupied rooms with speech notifications on
      # - Low/Normal priority: only include if room is occupied, speech notifications on, AND no music playing
      #
      # TODO: Handle explicit media_players (not "auto"/"all") - should music-check apply?
      #
      - action: script.announcement_queue_enqueue
        data:
          speech_message: "{{ speech_message }}"
          sound_file: "{{sound_file}}"
          sound_length: "{{sound_file_length}}"
          sound_volume: "{{sound_file_volume}}"
          speech_volume: "{{speech_volume}}"
          priority: "{{default_priority}}"
          expires_in: "{{ default_expires_in }}"
          media_players: >-
            {% if media_players == "all" or media_players == "auto" %}
              {% set media_players = [] %}
              {% set is_high_priority = default_priority in ["high", "critical"] %}
              {# Check which rooms are occupied and if speech notifications are turned #}
              {# on for them. For low/normal priority, also check if music is NOT playing #}
              {# Office #}
              {% if states.input_boolean.office_occupied.state == "on" and states.input_boolean.office_speech_notifications.state == "on" %}
                {% if is_high_priority or states('media_player.sonos_office') != 'playing' %}
                  {% set media_players = media_players + ["media_player.sonos_office"] %}
                {% endif %}
              {% endif %}
              {# Family Room #}
              {% if states.input_boolean.family_room_occupied.state == "on" and states.input_boolean.family_room_speech_notifications.state == "on" %}
                {% if is_high_priority or states('media_player.sonos_family_room') != 'playing' %}
                  {% set media_players = media_players + ["media_player.sonos_family_room"] %}
                {% endif %}
              {% endif %}
              {# Kitchen #}
              {% if states.input_boolean.kitchen_occupied.state == "on" and states.input_boolean.kitchen_speech_notifications.state == "on" %}
                {% if is_high_priority or states('media_player.sonos_kitchen') != 'playing' %}
                  {% set media_players = media_players + ["media_player.sonos_kitchen"] %}
                {% endif %}
              {% endif %}
              {# Playroom #}
              {% if states.input_boolean.playroom_occupied.state == "on" %}
                {% if is_high_priority or states('media_player.sonos_playroom') != 'playing' %}
                  {% set media_players = media_players + ["media_player.sonos_playroom"] %}
                {% endif %}
              {% endif %}
              {# Main Bedroom #}
              {% if states.input_boolean.main_bedroom_occupied.state == "on" and states.input_boolean.main_bedroom_speech_notifications.state == "on" %}
                {% if is_high_priority or states('media_player.sonos_main_bedroom') != 'playing' %}
                  {% set media_players = media_players + ["media_player.sonos_main_bedroom"] %}
                {% endif %}
              {% endif %}
            {% endif %}

            {{ media_players }}

      # In some cases, we don't need to log the message. If save_announcement
      # is set to false then we'll skip, otherwise, it defaults to true
      - alias: "Check if we should save the message"
        condition: template
        value_template: "{{save_announcement}}"

      # Save the latest message
      - action: input_text.set_value
        entity_id: input_text.latest_voice_announcement
        data:
          value: "{{ speech_message }}"
