  #   action:
  #     - action: script.process_announcement_queue
  #

  - id: process_global_announcement_queue
    alias: "Process Global Announcement Queue"
    mode: single
    initial_state: on

    trigger:
      - trigger: state
        entity_id: sensor.announcement_queue
      - trigger: state
        entity_id: input_boolean.announcement_queue_running
        to: "off"
      - trigger: mqtt
        topic: home/announcement_queue/state

    condition:
      - condition: template
        value_template: >
          {% set q = state_attr('sensor.announcement_queue', 'queue') %}
          {{ q is iterable and q | length > 0 }}
      - condition: state
        entity_id: input_boolean.announcement_queue_running
        state: "off"

    action:
      - action: input_boolean.turn_on
        entity_id: input_boolean.announcement_queue_running

      - variables:
          raw_queue: "{{ state_attr('sensor.announcement_queue', 'queue') }}"
          queue: >-
            {% if raw_queue is iterable %}
              {{ raw_queue }}
            {% else %}
              [] 
            {% endif %}
          next: "{{ queue[0] if queue | length > 0 else {} }}"
          updated: "{{ queue[1:] if queue | length > 1 else [] }}"
          payload_json: "{{ updated | to_json }}"

      # ⛔ Skip if both speech and sound are missing
      - condition: template
        value_template: "{{ queue | length > 0 and (next.get('speech_message') is string or next.get('sound_file') is string) }}"

      # ✅ Publish trimmed queue back to MQTT
      - action: mqtt.publish
        data:
          topic: "home/announcement_queue/data"
          payload: '{{ {"queue": updated} | to_json }}'
          retain: true

      - action: mqtt.publish
        data:
          topic: "home/announcement_queue/state"
          payload: "queue"
          retain: true

      # # 🔊 Trigger your real announcement engine
      # - action: script.announcement_engine
      #   data:
      #     speech_message: "{{ next.speech_message }}"
      #     sound_file: "{{ next.sound_file }}"
      #     sound_length: "{{ next.sound_length }}"
      #     sound_volume: "{{ next.sound_volume }}"
      #     speech_volume: "{{ next.speech_volume }}"
      #     media_players: "{{ next.media_players }}"
      - action: script.general_notification
        data:
          message: "{{ next.sound_file }} | {{ next.sound_length }} | {{ next.sound_volume }} | {{ next.speech_volume }} | {{ next.media_players }}"
          title: "{{next.speech_message}}"
          devices: "jk"
          priority: "active"
          tag: "test-testerson"

      - delay: "00:00:02" # Give the system a breather

      - action: input_boolean.turn_off
        entity_id: input_boolean.announcement_queue_running
  #
  #
  - id: append_to_global_announcement_queue
    alias: "Append to Global Announcement Queue (MQTT, Reliable)"
    mode: single
    trigger:
      - trigger: mqtt
        topic: home/announcement_queue/append

    variables:
      new_item: "{{ trigger.payload | from_json }}"
      queue_data_topic: "home/announcement_queue/data"
      queue_state_topic: "home/announcement_queue/state"

    action:
      # 💡 Fetch current retained queue from MQTT sensor directly
      - wait_for_trigger:
          - trigger: mqtt
            topic: "{{ queue_data_topic }}"
        timeout: "00:00:01"

      - variables:
          raw_queue: "{{ wait.trigger.payload }}"
          current: >-
            {% if raw_queue is string and raw_queue.startswith('[') %}
              {{ raw_queue | from_json }}
            {% elif raw_queue is iterable %}
              {{ raw_queue }}
            {% else %}
              [] 
            {% endif %}
          updated: >-
            {% if new_item.priority == 'critical' %}
              {{ [new_item] + current }}
            {% else %}
              {{ current + [new_item] }}
            {% endif %}
          payload_json: '{{ {"queue": updated} | to_json }}'

      # 🪵 Debug logging (optional)
      - action: system_log.write
        data:
          level: warning
          message: >
            📦 Appended item. New queue: {{ payload_json }}

      # ✅ Publish updated queue to data topic
      - action: mqtt.publish
        data:
          topic: "{{ queue_data_topic }}"
          payload: "{{ payload_json }}"
          retain: true

      # ✅ Trigger sensor update (state value doesn't matter)
      - action: mqtt.publish
        data:
          topic: "{{ queue_state_topic }}"
          payload: "queue"
          retain: true

