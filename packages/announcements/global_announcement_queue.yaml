mqtt:
  sensor:
    - name: "announcement_queue"
      state_topic: "home/announcement_queue/state"
      json_attributes_topic: "home/announcement_queue/data"
      value_template: "queue"

input_boolean:
  announcement_queue_running:
    name: Announcement Queue Running

script:
  global_announcement_enqueue:
    alias: "Global Announcement Enqueue (MQTT)"
    mode: parallel
    fields:
      priority:
        default: "normal"
      speech_message:
        required: false
      sound_file:
        required: false
      sound_length:
        required: false
      sound_volume:
        default: 30
      speech_volume:
        default: 40
      media_players:
        required: true
    sequence:
      - variables:
          topic: "home/announcement_queue"
          new_item: >-
            {{
              {
                "priority": priority,
                "speech_message": speech_message,
                "sound_file": sound_file,
                "sound_length": sound_length,
                "sound_volume": sound_volume,
                "speech_volume": speech_volume,
                "media_players": media_players
              }
            }}
      - action: mqtt.publish
        data:
          topic: "home/announcement_queue/append"
          payload: "{{ new_item | to_json }}"

