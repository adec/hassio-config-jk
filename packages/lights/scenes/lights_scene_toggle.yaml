script:
  lights_scene_toggle:
    alias: Lights Scene Toggle
    mode: "queued"
    fields:
      # 
      # 
      # Select select
      # 
      scene_select:
        name: Scene Select
        description: Input select for the light to manage scene states
        example: input_select.office_scene
        default: input_select.office_scene
        selector:
          select:
            options:
              - input_select.office_scene

      lights:
        name: Lights
        description: Lights to set the scenes to
        example: light.office_lights
        default: light.office_lights
        selector:
          select:
            options:
              - light.office_lights

    sequence:
      - action: input_select.select_next
        target:
          entity_id: "{{ scene_select }}"
      - variables:
          scene: '{{ states(scene_select)}}'
      - choose:
          - alias: Bright — cool white, full brightness
            conditions:
              - condition: template
                value_template: '{{ scene == "Bright" }}'
            sequence:
              - action: light.turn_on
                target:
                  entity_id: "{{ lights }}"
                data:
                  brightness_pct: 100
                  color_temp_kelvin: 5000
                  transition: 1
          - alias: Warm — warm white, 70%
            conditions:
              - condition: template
                value_template: '{{ scene == "Warm" }}'
            sequence:
              - action: light.turn_on
                target:
                  entity_id: "{{ lights }}"
                data:
                  brightness_pct: 70
                  color_temp_kelvin: 3000
                  transition: 1
          - alias: Dim — very warm, low brightness
            conditions:
              - condition: template
                value_template: '{{ scene == "Dim" }}'
            sequence:
              - action: light.turn_on
                target:
                  entity_id: "{{ lights }}"
                data:
                  brightness_pct: 20
                  color_temp_kelvin: 2700
                  transition: 1
          - alias: Focus — neutral daylight, 80%
            conditions:
              - condition: template
                value_template: '{{ scene == "Focus" }}'
            sequence:
              - action: light.turn_on
                target:
                  entity_id: "{{ lights }}"
                data:
                  brightness_pct: 80
                  color_temp_kelvin: 4000
                  transition: 1

