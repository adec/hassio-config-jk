script:
  air_quality_set_air_purifier_mode:
    alias: "Air Quality - Set Air Purifier Mode"
    mode: "queued"
    # description: >
    #   Set purifier mode based on local air quality.
    fields:
      #
      # Purifier device to set
      #
      purifier:
        description: "Entity ID of the fan (purifier)"
        example: "fan.office_air_purifier"
        default: "fan.office_air_purifier"
        selector:
          select:
            options:
              - fan.office_air_purifier
              - fan.ninos_bedroom_air_purifier
              - fan.gianlucas_bedroom_air_purifier
              - fan.main_bedroom_air_purifier
              - fan.jr_suite_air_purifier
              - fan.kitchen_air_purifier
              - fan.winix_basement

      #
      # AQI state to review
      #
      aqi_state:
        name: "AQI State"
        description: "AQI State of the Room"
        example: "Hazardous"
        selector:
          select:
            options:
              - Hazardous
              - Unhealthy
              - Moderate
              - Acceptable

      #
      # Room state to review
      #
      room_state:
        name: "Room State"
        description: "Current State of the Room"
        example: "Bedtime"
        selector:
          select:
            options:
              - Auto
              - Off
              - Bedtime
              - DnD

    variables:
      # 
      # Determine desired mode and percentage
      # 
      # If the AQI is Hazardous, Unhealthy, or Moderate,
      # then set the purifier to Manual mode.
      # 
      # If the AQI is Acceptable and the room is set to Bedtime,
      # then set the purifier to Sleep mode.
      # 
      # If the AQI is Acceptable and the room is set to Auto,
      # then set the purifier to Auto mode.
      # 
      # If the AQI is Acceptable and the room is set to Off,
      # then set the purifier to Off mode.
      set_mode: >-
        {% if aqi_state == 'Hazardous' or aqi_state == 'Unhealthy' or aqi_state == 'Moderate' %}
          Manual
        {% elif aqi_state == 'Acceptable' and room_state == 'Bedtime' %}
          Sleep
        {% elif aqi_state == 'Acceptable' and room_state == 'Auto' %}
          Auto
        {% else %}
          Off
        {% endif %}

      # 
      # Determine desired speed
      #
      # If the AQI is Hazardous, then set the speed to 100%.
      #
      # If the AQI is Unhealthy and the room is set to Bedtime,
      # then set the speed to 50%.
      #
      # If the AQI is Unhealthy, then set the speed to 75%.
      #
      # If the AQI is Moderate and the room is set to Bedtime,
      # then set the speed to 25%.
      #
      set_speed: >-
        {% if aqi_state == 'Hazardous' and room_state == 'Bedtime' %}
          75
        {% elif aqi_state == 'Hazardous' %}
          100
        {% elif aqi_state == 'Unhealthy' and room_state == 'Bedtime' %}
          50
        {% elif aqi_state == 'Unhealthy' %}
          75
        {% elif aqi_state == 'Moderate' and room_state == 'Bedtime' %}
          25
        {% elif aqi_state == 'Moderate' %}
          50
        {% else %}
          0
        {% endif %}

    #
    # Set the air purifier
    #
    sequence:
      - condition: state
        entity_id: input_boolean.construction_mode
        state: "off"
      - choose:
          #
          # Turn OFF the air purifier
          #
          - conditions: "{{ set_mode == 'Off' }}"
            sequence:
              - action: fan.turn_off
                target:
                  entity_id: "{{ purifier }}"

          #
          # Turn ON the air purifier in Sleep mode
          #
          - conditions: "{{ set_mode == 'Sleep' }}"
            sequence:
              - action: fan.turn_on
                target:
                  entity_id: "{{ purifier }}"
              - action: fan.set_preset_mode
                data:
                  entity_id: "{{ purifier }}"
                  preset_mode: Sleep

          #
          # Turn ON the air purifier in Auto mode
          #
          - conditions: "{{ set_mode == 'Auto' }}"
            sequence:
              - action: fan.turn_on
                target:
                  entity_id: "{{ purifier }}"
              - action: fan.set_preset_mode
                data:
                  entity_id: "{{ purifier }}"
                  preset_mode: Auto

          #
          # Turn ON the air purifier in Manual mode
          #
          - conditions: "{{ set_mode == 'Manual' }}"
            sequence:
              - action: fan.turn_on
                target:
                  entity_id: "{{ purifier }}"
              - action: fan.set_preset_mode
                data:
                  entity_id: "{{ purifier }}"
                  preset_mode: Manual
              - action: fan.set_percentage
                data:
                  entity_id: "{{ purifier }}"
                  percentage: "{{ set_speed }}"