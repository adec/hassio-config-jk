template:
  - sensor:
      #-----------------------------------------------------------------------
      # Baseline Mode - weekday or weekend
      #-----------------------------------------------------------------------
      - name: "Energy Baseline Mode"
        unique_id: energy_baseline_mode
        icon: mdi:calendar-today
        state: >
          {% set dow = now().weekday() %}
          {{ 'weekend' if dow >= 5 else 'weekday' }}

      #-----------------------------------------------------------------------
      # Coverage - how many hours have valid baseline data
      #-----------------------------------------------------------------------
      - name: "Energy Baseline Coverage Hours"
        unique_id: energy_baseline_coverage_hours
        unit_of_measurement: "h"
        icon: mdi:chart-timeline-variant
        state: >
          {% set is_weekend = now().weekday() >= 5 %}
          {% set prefix = 'sensor.baseline_weekend_h' if is_weekend else 'sensor.baseline_weekday_h' %}
          {% set n = namespace(c=0) %}
          {% for i in range(0, 24) %}
            {% set v = states(prefix ~ '%02d'|format(i)) %}
            {% if v not in ['unknown', 'unavailable'] and (v | float(0)) > 0 %}
              {% set n.c = n.c + 1 %}
            {% endif %}
          {% endfor %}
          {{ n.c }}

      #-----------------------------------------------------------------------
      # Baseline Ready - true when we have at least 12 hours of coverage
      #-----------------------------------------------------------------------
      - name: "Energy Baseline Ready"
        unique_id: energy_baseline_ready
        icon: mdi:check-circle
        state: >
          {{ states('sensor.energy_baseline_coverage_hours') | int(0) >= 12 }}

      #-----------------------------------------------------------------------
      # Expected So Far - sum of baselines for hours 0 through current hour
      # Uses input_number values directly as fallback when stats aren't ready
      #-----------------------------------------------------------------------
      - name: "Energy Expected So Far"
        unique_id: energy_expected_so_far
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:chart-bell-curve-cumulative
        state: >
          {% set h = now().hour %}
          {% set is_weekend = now().weekday() >= 5 %}
          {% set stat_prefix = 'sensor.baseline_weekend_h' if is_weekend else 'sensor.baseline_weekday_h' %}
          {% set input_prefix = 'input_number.energy_weekend_h' if is_weekend else 'input_number.energy_weekday_h' %}
          {% set total = namespace(v=0) %}
          {% for i in range(0, h + 1) %}
            {% set stat_val = states(stat_prefix ~ '%02d'|format(i)) %}
            {% set input_val = states(input_prefix ~ '%02d'|format(i)) %}
            {% if stat_val not in ['unknown', 'unavailable'] and (stat_val | float(0)) > 0 %}
              {% set total.v = total.v + (stat_val | float(0)) %}
            {% elif input_val not in ['unknown', 'unavailable'] and (input_val | float(0)) > 0 %}
              {% set total.v = total.v + (input_val | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ total.v | round(2) }}

      #-----------------------------------------------------------------------
      # Expected Remaining - sum of baselines for remaining hours in the day
      #-----------------------------------------------------------------------
      - name: "Energy Expected Remaining"
        unique_id: energy_expected_remaining
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:chart-bell-curve
        state: >
          {% set h = now().hour %}
          {% set is_weekend = now().weekday() >= 5 %}
          {% set stat_prefix = 'sensor.baseline_weekend_h' if is_weekend else 'sensor.baseline_weekday_h' %}
          {% set input_prefix = 'input_number.energy_weekend_h' if is_weekend else 'input_number.energy_weekday_h' %}
          {% set total = namespace(v=0) %}
          {% for i in range(h + 1, 24) %}
            {% set stat_val = states(stat_prefix ~ '%02d'|format(i)) %}
            {% set input_val = states(input_prefix ~ '%02d'|format(i)) %}
            {% if stat_val not in ['unknown', 'unavailable'] and (stat_val | float(0)) > 0 %}
              {% set total.v = total.v + (stat_val | float(0)) %}
            {% elif input_val not in ['unknown', 'unavailable'] and (input_val | float(0)) > 0 %}
              {% set total.v = total.v + (input_val | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ total.v | round(2) }}

      #-----------------------------------------------------------------------
      # Expected Full Day - total expected for entire day
      #-----------------------------------------------------------------------
      - name: "Energy Expected Full Day"
        unique_id: energy_expected_full_day
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:calendar-clock
        state: >
          {% set is_weekend = now().weekday() >= 5 %}
          {% set stat_prefix = 'sensor.baseline_weekend_h' if is_weekend else 'sensor.baseline_weekday_h' %}
          {% set input_prefix = 'input_number.energy_weekend_h' if is_weekend else 'input_number.energy_weekday_h' %}
          {% set total = namespace(v=0) %}
          {% for i in range(0, 24) %}
            {% set stat_val = states(stat_prefix ~ '%02d'|format(i)) %}
            {% set input_val = states(input_prefix ~ '%02d'|format(i)) %}
            {% if stat_val not in ['unknown', 'unavailable'] and (stat_val | float(0)) > 0 %}
              {% set total.v = total.v + (stat_val | float(0)) %}
            {% elif input_val not in ['unknown', 'unavailable'] and (input_val | float(0)) > 0 %}
              {% set total.v = total.v + (input_val | float(0)) %}
            {% endif %}
          {% endfor %}
          {{ total.v | round(2) }}

      #-----------------------------------------------------------------------
      # Forecast End of Day - actual so far + expected remaining
      #-----------------------------------------------------------------------
      - name: "Energy Forecast End Of Day"
        unique_id: energy_forecast_end_of_day
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:crystal-ball
        state: >
          {% set actual = states('sensor.whole_home_energy_daily_usage') | float(0) %}
          {% set remaining = states('sensor.energy_expected_remaining') | float(0) %}
          {{ (actual + remaining) | round(2) }}

      #-----------------------------------------------------------------------
      # Delta So Far - how much actual differs from expected
      #-----------------------------------------------------------------------
      - name: "Energy Delta So Far"
        unique_id: energy_delta_so_far
        unit_of_measurement: "kWh"
        icon: mdi:delta
        state: >
          {% set actual = states('sensor.whole_home_energy_daily_usage') | float(0) %}
          {% set expected = states('sensor.energy_expected_so_far') | float(0) %}
          {{ (actual - expected) | round(2) }}

      #-----------------------------------------------------------------------
      # Trend Percent - delta as percentage of expected
      #-----------------------------------------------------------------------
      - name: "Energy Trend Percent"
        unique_id: energy_trend_percent
        unit_of_measurement: "%"
        icon: mdi:percent
        state: >
          {% set expected = states('sensor.energy_expected_so_far') | float(0) %}
          {% set delta = states('sensor.energy_delta_so_far') | float(0) %}
          {% if expected < 0.5 %}
            0
          {% else %}
            {{ (delta / expected * 100) | round(1) }}
          {% endif %}

      #-----------------------------------------------------------------------
      # Trend Status - above, below, or normal
      #-----------------------------------------------------------------------
      - name: "Energy Trend Status"
        unique_id: energy_trend_status
        icon: >
          {% set pct = states('sensor.energy_trend_percent') | float(0) %}
          {% if pct > 10 %}
            mdi:trending-up
          {% elif pct < -10 %}
            mdi:trending-down
          {% else %}
            mdi:trending-neutral
          {% endif %}
        state: >
          {% set pct = states('sensor.energy_trend_percent') | float(0) %}
          {% if pct > 10 %}
            above
          {% elif pct < -10 %}
            below
          {% else %}
            normal
          {% endif %}

      #-----------------------------------------------------------------------
      # Current Hour Baseline - expected kWh for the current hour
      #-----------------------------------------------------------------------
      - name: "Energy Current Hour Baseline"
        unique_id: energy_current_hour_baseline
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:clock-outline
        state: >
          {% set h = now().hour %}
          {% set is_weekend = now().weekday() >= 5 %}
          {% set stat_prefix = 'sensor.baseline_weekend_h' if is_weekend else 'sensor.baseline_weekday_h' %}
          {% set input_prefix = 'input_number.energy_weekend_h' if is_weekend else 'input_number.energy_weekday_h' %}
          {% set stat_val = states(stat_prefix ~ '%02d'|format(h)) %}
          {% set input_val = states(input_prefix ~ '%02d'|format(h)) %}
          {% if stat_val not in ['unknown', 'unavailable'] and (stat_val | float(0)) > 0 %}
            {{ stat_val | float(0) | round(3) }}
          {% elif input_val not in ['unknown', 'unavailable'] %}
            {{ input_val | float(0) | round(3) }}
          {% else %}
            0
          {% endif %}

      #-----------------------------------------------------------------------
      # Hourly Baselines as JSON - for ApexCharts data_generator
      # Returns array of 24 hourly baseline values for the current day type
      #-----------------------------------------------------------------------
      - name: "Energy Hourly Baselines JSON"
        unique_id: energy_hourly_baselines_json
        icon: mdi:code-json
        state: "OK"
        attributes:
          baselines: >
            {% set is_weekend = now().weekday() >= 5 %}
            {% set stat_prefix = 'sensor.baseline_weekend_h' if is_weekend else 'sensor.baseline_weekday_h' %}
            {% set input_prefix = 'input_number.energy_weekend_h' if is_weekend else 'input_number.energy_weekday_h' %}
            {% set result = namespace(arr=[]) %}
            {% for i in range(0, 24) %}
              {% set stat_val = states(stat_prefix ~ '%02d'|format(i)) %}
              {% set input_val = states(input_prefix ~ '%02d'|format(i)) %}
              {% if stat_val not in ['unknown', 'unavailable'] and (stat_val | float(0)) > 0 %}
                {% set result.arr = result.arr + [stat_val | float(0) | round(3)] %}
              {% elif input_val not in ['unknown', 'unavailable'] and (input_val | float(0)) > 0 %}
                {% set result.arr = result.arr + [input_val | float(0) | round(3)] %}
              {% else %}
                {% set result.arr = result.arr + [0] %}
              {% endif %}
            {% endfor %}
            {{ result.arr | to_json }}
