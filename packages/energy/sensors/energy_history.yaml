###############################################################################
# Hour-of-day baseline (weekday vs weekend) using hourly utility meter buckets
#
# Inputs required:
#   - sensor.whole_home_energy_hourly_usage  (kWh for last completed hour)
#   - sensor.whole_home_energy_daily_usage   (kWh used today so far)
#
# How it works:
#   - Every hour at :00:10, we snapshot the *previous hour* kWh into an
#     input_number bucket for that hour-of-day (00-23), split into weekday/weekend
#   - Statistics sensors compute the rolling 30-day mean for each bucket
#   - Templates sum those 24 means to compute expected-so-far and forecast
###############################################################################

