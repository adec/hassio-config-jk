###############################################################################
# Energy History & Forecasting System
#
# Creates hour-of-day baselines (weekday vs weekend) for energy forecasting.
#
# How it works:
#   1. Every hour at :05, we snapshot the previous hour's kWh into an
#      input_number bucket for that hour-of-day (00-23), split by weekday/weekend
#   2. Statistics sensors compute the rolling 30-day mean for each bucket
#   3. Template sensors provide expected usage, forecasts, and trend analysis
#
# Dependencies:
#   - sensor.whole_home_energy_hourly_usage (utility meter with hourly cycle)
#   - sensor.whole_home_energy_daily_usage (utility meter with daily cycle)
###############################################################################

