automation:
  - id: "energy_history_hourly_snapshot"
    alias: "Energy History Hourly Snapshot"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "20"
        seconds: "00"

    variables:
      prev_hour: "{{ (now().hour - 1) % 24 }}"
      prev_dow: >
        {% set ts = as_timestamp(now()) %}
        {% if now().hour == 0 %}
          {{ (ts - 86400) | timestamp_custom('%w', true) | int }}
        {% else %}
          {{ ts | timestamp_custom('%w', true) | int }}
        {% endif %}
      is_weekend: "{{ prev_dow in [0, 6] }}"
      bin_prefix: "{{ 'energy_weekend_h' if is_weekend else 'energy_weekday_h' }}"
      target_entity: "{{ 'input_number.' ~ bin_prefix ~ '%02d'|format(prev_hour) }}"

    action:
      # Wait up to 90s for the hourly meter to settle to a real number
      - wait_template: >
          {% set v = states('sensor.whole_home_energy_hourly_usage') %}
          {{ v not in ['unknown','unavailable','none'] and (v | float(-1)) > 0 }}
        timeout: "00:01:30"
        continue_on_timeout: true

      - variables:
          prev_val: >
            {% set v = states('sensor.whole_home_energy_hourly_usage') %}
            {{ 0 if v in ['unknown','unavailable','none'] else (v | float(0)) }}

      - service: input_number.set_value
        target:
          entity_id: "{{ target_entity }}"
        data:
          value: "{{ prev_val }}"


