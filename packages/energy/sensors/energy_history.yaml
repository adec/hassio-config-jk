automation:
  #---------------------------------------------------------------------------
  # Hourly snapshot - captures previous hour's energy into the appropriate bin
  # Runs at :05 to ensure utility meter has reset and last_period is available
  #---------------------------------------------------------------------------
  - id: "energy_history_hourly_snapshot"
    alias: "Energy History Hourly Snapshot"
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "5"
        seconds: "0"

    variables:
      # Previous hour (0-23)
      prev_hour: "{{ (now().hour - 1) % 24 }}"
      # Day of week for the previous hour (handles midnight crossover)
      prev_dow: >
        {% set ts = as_timestamp(now()) %}
        {% if now().hour == 0 %}
          {{ (ts - 86400) | timestamp_custom('%w', true) | int }}
        {% else %}
          {{ ts | timestamp_custom('%w', true) | int }}
        {% endif %}
      # Weekend = Sunday (0) or Saturday (6)
      is_weekend: "{{ prev_dow in [0, 6] }}"
      bin_prefix: "{{ 'energy_weekend_h' if is_weekend else 'energy_weekday_h' }}"
      target_entity: "{{ 'input_number.' ~ bin_prefix ~ '%02d'|format(prev_hour) }}"

    action:
      # Wait for utility meter to have last_period available (up to 3 min)
      - wait_template: >
          {{ state_attr('sensor.whole_home_energy_hourly_usage', 'last_period') is not none }}
        timeout: "00:03:00"
        continue_on_timeout: false

      # Get the previous hour's energy value
      - variables:
          prev_val: >
            {% set v = state_attr('sensor.whole_home_energy_hourly_usage', 'last_period') %}
            {{ 0 if v is none else (v | float(0)) }}

      # Only update if we got a valid value > 0
      - condition: template
        value_template: "{{ prev_val > 0 }}"

      - service: input_number.set_value
        target:
          entity_id: "{{ target_entity }}"
        data:
          value: "{{ prev_val }}"


