template:
  - sensor:
      - name: "Energy Current Consumption"
        unique_id: energy_current_consumption
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ 
            (
              (states('sensor.home_energy_meter_1_electric_consumption_w') | float(0)
              + states('sensor.home_energy_meter_1_electric_consumption_w_2') | float(0))
              + states('sensor.home_energy_meter_2_electric_consumption_w') | float(0)
              + states('sensor.home_energy_meter_2_electric_consumption_w_1') | float(0)
            )
            | round(0)
          }}


  - sensor:
      - name: "Total Energy Meter Combined"
        unique_id: total_energy_meter_combined
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{ (states('sensor.home_energy_meter_1_electric_consumption_kwh') | float(0) + states('sensor.home_energy_meter_2_electric_consumption_kwh') | float(0)) | round(2) }}

utility_meter:
  energy_combined_daily:
    source: sensor.total_energy_meter_combined
    cycle: daily

  energy_combined_monthly:
    source: sensor.total_energy_meter_combined
    cycle: monthly