template:
  - sensor:
      - name: "Energy Current Consumption"
        unique_id: energy_current_consumption
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {{
            (
              states('sensor.home_energy_meter_1_electric_consumption_w') | float(0)
              + states('sensor.home_energy_meter_2_electric_consumption_w') | float(0)
            ) | round(0)
          }}
        


  - sensor:
      - name: "Total Energy Meter Combined"
        unique_id: total_energy_meter_combined
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {{
            (states('sensor.home_energy_meter_1_electric_consumption_kwh') | float(0))
            + (states('sensor.home_energy_meter_2_electric_consumption_kwh') | float(0))
          }}

utility_meter:
  energy_combined_daily:
    name: Daily Energy Usage (Combined Sensor)
    source: sensor.total_energy_meter_combined
    cycle: daily
    always_available: true

  energy_combined_monthly:
    name: Monthly Energy Usage (Combined Sensor)
    source: sensor.total_energy_meter_combined
    cycle: monthly
    always_available: true