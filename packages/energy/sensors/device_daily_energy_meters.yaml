#-----------------------------------------------------------------------------
# Device Daily Energy Meters
# Utility meters that reset daily to track daily energy consumption per device
#-----------------------------------------------------------------------------

utility_meter:
  #---------------------------------------------------------------------------
  # Z-Wave Appliances (use _electric_consumption_kwh sensors)
  #---------------------------------------------------------------------------
  
  # Upstairs Washer (Z-Wave)
  # Note: Verify this sensor exists - might be sensor.upstairs_washing_machine_electric_consumption_kwh
  upstairs_washer_daily_energy:
    name: "Upstairs Washer Daily Energy"
    source: sensor.upstairs_washing_machine_electric_consumption_kwh
    cycle: daily
    always_available: true

  # Downstairs Washer (Z-Wave) - Main Level
  downstairs_washer_daily_energy:
    name: "Downstairs Washer Daily Energy"
    source: sensor.main_level_washing_machine_electric_consumption_kwh
    cycle: daily
    always_available: true

  # Downstairs Dryer (Z-Wave) - Main Level
  downstairs_dryer_daily_energy:
    name: "Downstairs Dryer Daily Energy"
    source: sensor.main_level_drying_machine_electric_consumption_kwh
    cycle: daily
    always_available: true

  #---------------------------------------------------------------------------
  # Zigbee Smart Plugs (use _summation_delivered sensors)
  #---------------------------------------------------------------------------

  # Upstairs Dryer (Zigbee smart plug)
  upstairs_dryer_daily_energy:
    name: "Upstairs Dryer Daily Energy"
    source: sensor.upstairs_drying_machine_summation_delivered
    cycle: daily
    always_available: true

  # John's Desk
  johns_desk_daily_energy:
    name: "John's Desk Daily Energy"
    source: sensor.johns_desk_summation_delivered
    cycle: daily
    always_available: true

  # Cristina's Desk
