# Main Bedroom Mode Bedtime
#
automation:
  - id: "main_bedroom_mode_bedtime"
    initial_state: on
    alias: "Main Bedroom mode bedtime"
    triggers:
      # # Bedtime is enabled
      - trigger: state
        entity_id: input_boolean.bedtime
        to: "on"
      # Bedtime hours active
      - trigger: state
        entity_id: binary_sensor.bedtime
        to: "on"
      # If we're in bed (boolean)
      - trigger: state
        entity_id:
          - input_boolean.john_is_in_bed
          - input_boolean.cristina_in_bed
        to: "on"
      # Bed is occupied
      - trigger: state
        entity_id:
          - input_select.john_sleep_state
          - input_select.cristina_sleep_state
        to: "Just Laid Down"
      # Lights are turned off
      - trigger: state
        entity_id: light.main_bedroom_main_lights
        to: "off"
    conditions:
      # Main bedroom is occupied
      - condition: state
        entity_id: input_boolean.main_bedroom_occupied
        state: "on"
      # Bedroom is not already Bedtime
      - condition: template
        value_template: "{{ not is_state('input_select.main_bedroom','Bedtime') }}"
      # Lights are OFF
      - condition: state
        entity_id: light.main_bedroom_main_lights
        state: "off"
      # Bedtime is enabled
      # OR somebody is in bed
      # OR lights are off door is closed and somebody detected via BLE
      - condition: or
        conditions:
          # Bedtime mode is active
          - condition: state
            entity_id: input_boolean.bedtime
            state: "on"
          # John's in bed
          - condition: state
            entity_id: input_boolean.john_is_in_bed
            state: "on"
          # Cristina's in bed
          - condition: state
            entity_id: input_boolean.cristina_in_bed
            state: "on"
          # Sleep state changes
          - condition: state
            entity_id:
              - input_select.john_sleep_state
              - input_select.cristina_sleep_state
            state: "Just Laid Down"
    actions:
      - action: input_select.select_option
        data:
          entity_id: input_select.main_bedroom
          option: "Bedtime"
      # Turn on some bedtime automations
      - action: automation.turn_on
        entity_id:
          - automation.main_bedroom_john_night_light_off
          - automation.main_bedroom_night_light_for_john
      # Turn on adaptive lighting
      - action: switch.turn_on
        entity_id: 
          - switch.adaptive_lighting_sleep_mode_main_bedroom
          - switch.adaptive_lighting_sleep_mode_main_bedroom_lamps
