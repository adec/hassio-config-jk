script:
  main_level_vacuum_clean_selected_rooms:
    alias: Main Level Vacuum Clean Selected Rooms
    mode: single

    fields:
      rooms:
        name: Rooms
        description: The rooms to vacuum
        required: true
        selector:
          select:
            multiple: true
            options:
              - playroom
              - foyer
              - jr_suite
              - dining_room
              - kitchen
              - mudroom
              - family_room
              - laundry_room
              - mudroom_bathroom
              - office

    variables:
      # 
      # Map rooms to the segment ID
      # 
      room_map:
        playroom: 18
        foyer: 20
        jr_suite: 21
        dining_room: 23
        kitchen: 24
        mudroom: 25
        family_room: 26
        laundry_room: 27
        mudroom_bathroom: 30
        office: 29

      # 
      # Get the selected segments for the vacuum
      # 
      selected_segments: >
        {% set data = namespace(rooms=[]) %}
        {% for key in rooms %}
          {% set k = (key | string).lower() %}
          {% set id = room_map.get(k) %}

          {% if id is not none %}
            {% set data.rooms = data.rooms + [id] %}
          {% endif %}
        {% endfor %}
        {{ data.rooms }}


    sequence:
      # Only proceed if the vacuum is docked
      - condition: state
        entity_id: vacuum.roborock_s7
        state: "docked"

      # Jr. Suite door is OPEN
      # otherwise the vacuum will get stuck in the Jr. Suite
      - condition: state
        entity_id: binary_sensor.jr_suite_door_status
        state: "on"

      # Only proceed if rooms were selected
      - condition: template
        value_template: "{{ selected_segments | length > 0 }}"

      # Set the rooms that are currently being cleaned
      - action: input_text.set_value
        target:
          entity_id: input_text.main_level_vacuum_currently_cleaning
        data:
          value: "{{ rooms }}"

      # Start cleaning the selected rooms
      - service: vacuum.send_command
        target:
          entity_id: vacuum.roborock_s7
        data:
          command: app_segment_clean
          params: "{{ selected_segments }}" 