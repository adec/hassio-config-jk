# Vacuum - Clean Dining and Foyer at Night
#
# Automation logic to handle vacuuming the
# dining and foyer at night. The vacuum should
# clean the dining room and foyer every other night
# unless we were entertaining the previous day then it
# should run again.
#
automation:
  - id: "vacuum_clean_dining_and_foyer_at_night"
    alias: "Vacuum - Clean Dining and Foyer at Night"
    mode: "single"
    triggers:
      # Run daily at 9pm
      - trigger: time
        at: "21:00:00"
        id: nightly_check
      # When guest mode turns off between 9pm and 11pm
      - trigger: state
        entity_id: input_boolean.guest_mode
        to: "off"
        for: 
          minutes: 15
        enabled: true
        id: guest_mode_off
    conditions:
      # Time window check for guest mode trigger
      - condition: or
        conditions:
          # Either it's the scheduled trigger
          - condition: trigger
            id: nightly_check
          # Or it's the guest mode trigger and within time window
          - condition: and
            conditions:
              - condition: trigger
                id: guest_mode_off
              - condition: time
                after: "21:00:00"
                before: "23:00:00"
      # Guest mode is OFF
      - condition: state
        entity_id: input_boolean.guest_mode
        state: "off"
      # Entertainment mode is OFF
      - condition: state
        entity_id: input_boolean.entertainment_mode
        state: "off"
      # If vacation mode is ON and the vacuum hasn't been run in the last 24 hours
      # then proceed (and run the vacuum). If vacation mode is ON and it's run
      # then fail the condition.
      # Otherwise, proceed (and run the vacuum).
      - condition: template
        value_template: >
          {% set vacation = states.input_boolean.vacation_mode %}
          {% if vacation.state == "on" %}
            {{ (now() - vacation.last_changed).total_seconds() < 86400 }}
          {% else %}
            true
          {% endif %}
      # Jr. Suite door is OPEN
      # otherwise the vacuum will get stuck in the Jr. Suite
      - condition: state
        entity_id: binary_sensor.jr_suite_door_status
        state: "on"
      # Check if we should run today based on last run and entertainment history
      - condition: template
        value_template: >
          {% set last_run = state_attr('automation.vacuum_clean_dining_and_foyer_at_night', 'last_triggered') %}
          {% set yesterday_start = now().replace(hour=0, minute=0, second=0) - timedelta(days=1) %}
          {% set yesterday_end = now().replace(hour=0, minute=0, second=0) %}
          {% set entertainment_yesterday = states.input_boolean.entertainment_mode.last_changed.replace(hour=0, minute=0, second=0) >= yesterday_start 
             and states.input_boolean.entertainment_mode.last_changed < yesterday_end %}

          {% if last_run != None %}
            {% set days_since_last_run = (now() - last_run).total_seconds() / 108000 %}
            {% if entertainment_yesterday %}
              {# Run if there was entertainment yesterday, regardless of last run #}
              {{ true }}
            {% else %}
              {# Otherwise run if it's been at least 2 days since last run #}
              {{ days_since_last_run >= 2 }}
            {% endif %}
          {% else %}
            {{ true }}
          {% endif %}
      # Only run if Sylvia has been away for more than 24 hours
      - condition: template
        value_template: >
          {{ states('input_boolean.sylvia_home') == 'off' 
             and (now() - states.input_boolean.sylvia_home.last_changed).total_seconds() > 86400 }}
    actions:
      # Vacuum the dining room and foyer
      - action: vacuum.send_command
        target:
          entity_id: vacuum.roborock_s7
        data:
          command: app_segment_clean
          params: [20, 23]

      # Update the last cleaning text
      - action: input_text.set_value
        target:
          entity_id: input_text.vacuum_main_floor_last_cleaning
        data:
          value: "Foyer & Dining Room"
