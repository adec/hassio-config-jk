# 
# Alex Person
# 
# The Person sensor is way of creating a Person
# with additional attributes that the standard 
# person sensor doesn't have.
# 
template:
  - sensor:
      - name: "Alex Person"
        unique_id: alex_person
        state: "{{ states.person.alex.state }}"
        attributes:
          unlock_privilege: "{{ states.input_boolean.alex_unlock_privilege.state }}"


