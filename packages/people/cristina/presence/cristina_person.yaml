# 
# Cristina Person
# 
# The Person sensor is way of creating a Person
# with additional attributes that the standard 
# person sensor doesn't have.
# 
template:
  - sensor:
      - name: "Cristina Person"
        unique_id: cristina_person
        state: "{{ states.person.cristina_falbo.state }}"
        attributes:
          unlock_privilege: "{{ states.input_boolean.cristina_unlock_privilege.state }}"
          avatar: "{{ states.person.cristina_falbo.attributes.entity_picture }}"
          room_presence: "{{ states.sensor.cristina_room_presence.state }}"


