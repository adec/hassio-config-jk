automation:
  - id: "tayta_announce_departure"
    alias: Tayta Announce Departure
    mode: queued
    initial_state: on
    triggers:
      - trigger: state
        entity_id: person.sonia_koht
        from: "home"
        to: "not_home"
    conditions:
      # Not home
      - condition: state
        entity_id: person.sonia_koht
        state: "not_home"
      # We've been home for at least 5 minutes
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
        for:
          minutes: 5
    actions:
      # Announcement script
      - action: script.person_announcement
        data:
          person: tayta
          announcement_type: departure
