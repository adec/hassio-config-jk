# Automation to detect and initiate away for Nonno
#
#
automation:
  - id: "nonno_is_away"
    alias: "Nonno Presence - Away"
    initial_state: on
    triggers:
      # Nonno not home
      - trigger: state
        entity_id: person.nonno
        to: "not_home"
      # Handle restarts and reloads of HA
      - trigger: event
        event_type: automation_reloaded
      - trigger: homeassistant
        event: start
    conditions:
      # Didn't just leave
      - condition: not
        conditions:
          - condition: state
            entity_id: input_select.nonno_status
            state: "Just Left"
      - or:
          # Not detected home
          - condition: state
            entity_id: person.nonno
            state: "not_home"
          # # iPhone detect NOT home
          # - condition: state
          #   entity_id: device_tracker.nonno_iphone_detect
          #   state: "not_home"
    actions:
      - action: input_boolean.turn_off
        entity_id: input_boolean.nonno_home
