# 
# Katia Person
# 
# The Person sensor is way of creating a Person
# with additional attributes that the standard 
# person sensor doesn't have.
# 
template:
  - sensor:
      - name: "Katia Person"
        unique_id: katia_person
        state: "{{ states.person.katia.state }}"
        attributes:
          unlock_privilege: "{{ states.input_boolean.katia_unlock_privilege.state }}"
          avatar: "{{ states.person.katia.attributes.entity_picture }}"
          room_presence: "{{ states.sensor.katia_room_presence.state }}"


