automation:
  - id: "joe_announce_arrival"
    alias: Joe Announce Arrival
    mode: queued
    initial_state: on
    triggers:
      - trigger: state
        entity_id: person.joe_falbo
        from: "not_home"
        to: "home"
    conditions:
      # Joe is home
      - condition: state
        entity_id: person.joe_falbo
        state: "home"
      # We've been home for at least 5 minutes
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
        for:
          minutes: 5
    action:
      # Announcement script
      - action: script.person_announcement
        data:
          person: joe
          announcement_type: arrival
