# Automation to detect and initiate home for Joe
#
# This automation will detect if Joe's home based on
# a bunch of triggers and conditions and then run a
# script to handle home actions.
#
automation:
  - id: "nonna_is_home"
    initial_state: on
    alias: "Nonna is Home"
    triggers:
      # Nonna detected home
      - trigger: state
        entity_id: person.mary_falbo
        to: "home"
      # Bayesian sensor ON
      - trigger: state
        entity_id: binary_sensor.nonna_presence
        to: "on"
      - trigger: event
        event_type: automation_reloaded
      - trigger: homeassistant
        event: start
    conditions:
      # nonna_home boolean is OFF
      - condition: state
        entity_id: input_boolean.nonna_home
        state: "off"
      - or:
          # Bayesian presence is ON
          - condition: state
            entity_id: binary_sensor.nonna_presence
            state: "on"
          # OR person is HOME
          - condition: state
            entity_id: person.mary_falbo
            state: "home"
    actions:
      - action: input_boolean.turn_on
        entity_id: input_boolean.nonna_home
