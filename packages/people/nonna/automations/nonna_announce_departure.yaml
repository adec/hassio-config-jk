automation:
  - id: "nonna_announce_departure"
    alias: Nonna Announce Departure
    mode: queued
    initial_state: on
    triggers:
      - trigger: state
        entity_id: person.mary_falbo
        from: "home"
    conditions:
      # Not home
      - condition: state
        entity_id: person.mary_falbo
        state: "not_home"
      # We've been home for at least 5 minutes
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
        for:
          minutes: 5
    actions:
      # Announcement script
      - action: script.person_announcement
        data:
          person: nonna
          announcement_type: departure
