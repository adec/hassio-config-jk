# Garage Occupied
#
automation:
  - id: "garage_occupied"
    initial_state: on
    alias: "Garage occupied"
    triggers:
      # Motion detected
      - trigger: state
        entity_id: binary_sensor.garage_motion_sensor_motion
        to: "on"
      # Garage lights are turned on
      - trigger: state
        entity_id: light.garage_lights
        to: "on"
      # Garage door is open
      - trigger: state
        entity_id: cover.garage_doors
        to: "open"
      # Hassio resloads/starts
      - trigger: event
        event_type: automation_reloaded
      - trigger: homeassistant
        event: start
    conditions:
      # Garage is not already occupied
      - condition: state
        entity_id: input_boolean.garage_occupied
        state: "off"
      # Bluetooth detected somebody or Aqara detects occupancy
      - condition: or
        conditions:
          # No BLE devices detected
          - condition: state
            entity_id: binary_sensor.garage_ble_occupancy
            state: "off"
            for:
              minutes: 2
          # Garage sensor detects occupancy
          - condition: state
            entity_id: binary_sensor.garage_motion_sensor_occupancy
            state: "on"
          # Lights are on
          - condition: state
            entity_id: light.garage_lights
            state: "on"
          # A garage door is open
          - condition: state
            entity_id: cover.garage_doors
            state: "open"
    actions:
      - action: input_boolean.turn_on
        entity_id: input_boolean.garage_occupied
