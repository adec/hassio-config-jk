binary_sensor:
  - platform: template
    sensors:
      everybody_in_bed:
        friendly_name: Bedtime Mode - Everybody in Bed
        unique_id: everybody_in_bed
        value_template: >-
          {% set kids = [
            is_state('input_boolean.gianluca_in_bed', 'on'),
            is_state('input_boolean.nino_in_bed', 'on')
          ] %}

          {% set adults = [
            {
              'home': is_state('person.john_koht', 'home'),
              'in_bed': is_state('input_boolean.john_is_in_bed', 'on')
            },
            {
              'home': is_state('person.cristina_falbo', 'home'),
              'in_bed': is_state('input_boolean.cristina_in_bed', 'on')
            }
          ] %}

          {% set all_adults_in_bed = adults | selectattr('home') | selectattr('in_bed') | list %}
          {% set num_adults_home = adults | selectattr('home') | list | length %}

          {% set all_kids_in_bed = kids | select('equalto', true) | list | length == kids | length %}

          {{ all_kids_in_bed and (all_adults_in_bed | length == num_adults_home and num_adults_home > 0) }}
