# 
# Jr Suite Room Sensor
# 
template:
  - sensor:
      - name: "Jr Suite"
        unique_id: jr_suite_room
        state: "{{ states('input_boolean.jr_suite_occupied') }}"
        attributes:
          mode: "{{ states('input_select.jr_suite') | default('Auto') }}"
          icon: "kohbo:kohbo-bed-single"
          permalink: "/dashboard-kohbo/rooms-jr-suite"
          temperature: >
            {% if states('sensor.jr_suite_awair_temperature') not in ['unavailable', 'unknown', ''] %}
              {{ states('sensor.jr_suite_awair_temperature') | float }}
            {% else %}
              ""
            {% endif %}
          humidity: >
            {% if states('sensor.jr_suite_awair_humidity') not in ['unavailable', 'unknown', ''] %}
              {{ states('sensor.jr_suite_awair_humidity') | float }}
            {% else %}
              ""
            {% endif %}
          aqi: >
            {% if states('sensor.jr_suite_air_quality') not in ['unavailable', 'unknown', ''] %}
              {{ states('sensor.jr_suite_air_quality') }}
            {% else %}
              ""
            {% endif %}
          last_changed: >
            {% if states.input_boolean.jr_suite_occupied.last_changed %}
              {{ states.input_boolean.jr_suite_occupied.last_changed.isoformat() }}
            {% else %}
              {{ now().isoformat() }}
            {% endif %}
          occupied_duration_seconds: >
            {% if is_state('input_boolean.jr_suite_occupied', 'on') %}
              {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.jr_suite_occupied.last_changed)) | int }}
            {% else %}
              0
            {% endif %}
          occupied_duration_minutes: >
            {% if is_state('input_boolean.jr_suite_occupied', 'on') %}
              {{ ((as_timestamp(now()) - as_timestamp(states.input_boolean.jr_suite_occupied.last_changed)) / 60) | int }}
            {% else %}
              0
            {% endif %}
          people: "{{ state_attr('sensor.jr_suite_people_list', 'people') | default([]) }}"
          people_count: "{{ states('sensor.jr_suite_people_list') | int | default(0) }}"
