# 
# Mudroom Room Sensor
# 
template:
  - sensor:
      - name: "Mudroom"
        unique_id: mudroom_room
        state: "{{ states('input_boolean.mudroom_occupied') }}"
        attributes:
          mode: "{{ states('input_select.mudroom') | default('Auto') }}"
          icon: "mdi:shoe-formal"
          permalink: "/dashboard-kohbo/rooms-mudroom"
          temperature: ""
          humidity: ""
          aqi: ""
          last_changed: >
            {% if states.input_boolean.mudroom_occupied.last_changed %}
              {{ states.input_boolean.mudroom_occupied.last_changed.isoformat() }}
            {% else %}
              {{ now().isoformat() }}
            {% endif %}
          occupied_duration_seconds: >
            {% if is_state('input_boolean.mudroom_occupied', 'on') %}
              {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.mudroom_occupied.last_changed)) | int }}
            {% else %}
              0
            {% endif %}
          occupied_duration_minutes: >
            {% if is_state('input_boolean.mudroom_occupied', 'on') %}
              {{ ((as_timestamp(now()) - as_timestamp(states.input_boolean.mudroom_occupied.last_changed)) / 60) | int }}
            {% else %}
              0
            {% endif %}
          people: "{{ [] }}"
          people_count: "0"
