# 
# House Sensor
# 
# This sensor provides a unified object representation of the House
# with occupancy state and various attributes based on room sensors.
# 
template:
  - sensor:
      - name: "House"
        unique_id: house
        state: "{{ states.input_boolean.house_occupied.state }}"
        attributes:
          mode: "{{ states.input_select.house.state }}"
          
          # Room sensor entity IDs
          rooms: >
            {{ 
              expand('group.room_sensors')
              | map(attribute='entity_id')
              | list
              | join(', ')
            }}

          # Occupied room sensor entity IDs
          occupied_rooms: >
            {{ 
              expand('group.room_sensors')
              | selectattr('state', 'eq', 'on')
              | map(attribute='entity_id')
              | list
              | join(', ')
            }}

          occupied_rooms_count: >
            {{ 
              expand('group.room_sensors')
              | selectattr('state', 'eq', 'on')
              | map(attribute='entity_id')
              | list
              | length
            }}

          # Unoccupied room sensor entity IDs
          unoccupied_rooms: >
            {{ 
              expand('group.room_sensors')
              | selectattr('state', 'eq', 'off')
              | map(attribute='entity_id')
              | list
              | join(', ')
            }}

          unoccupied_rooms_count: >
            {{ 
              expand('group.room_sensors')
              | selectattr('state', 'eq', 'off')
              | map(attribute='entity_id')
              | list
              | length
            }}

# 
# House Areas Group (Legacy - kept for backward compatibility)
# 
# This group is maintained for backward compatibility with existing
# automations and sensors that reference input_boolean entities directly.
# New code should use group.room_sensors instead.
# 
group:
  house_areas:
    name: House Areas
    entities:
      - group.first_floor_areas
      - group.upper_floor_areas