# 
# Basement Main Sensor
# 
template:
  - sensor:
      - name: "Basement Main"
        unique_id: basement_main
        state: "{{ states('input_boolean.basement_occupied') }}"
        attributes:
          mode: "{{ states('input_select.basement') | default('Auto') }}"
          icon: "mdi:basement"
          permalink: "/dashboard-kohbo/rooms-basement"
          temperature: ""
          humidity: ""
          aqi: ""
          last_changed: >
            {% if states.input_boolean.basement_occupied.last_changed %}
              {{ states.input_boolean.basement_occupied.last_changed.isoformat() }}
            {% else %}
              {{ now().isoformat() }}
            {% endif %}
          occupied_duration_seconds: >
            {% if is_state('input_boolean.basement_occupied', 'on') %}
              {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.basement_occupied.last_changed)) | int }}
            {% else %}
              0
            {% endif %}
          occupied_duration_minutes: >
            {% if is_state('input_boolean.basement_occupied', 'on') %}
              {{ ((as_timestamp(now()) - as_timestamp(states.input_boolean.basement_occupied.last_changed)) / 60) | int }}
            {% else %}
              0
            {% endif %}
          people: "{{ [] }}"
          people_count: "0"
