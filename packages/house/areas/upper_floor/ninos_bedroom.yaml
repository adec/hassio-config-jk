# 
# Nino's Bedroom Sensor
# 
template:
  - sensor:
      - name: "Nino's Bedroom"
        unique_id: ninos_bedroom
        state: "{{ states('input_boolean.ninos_bedroom_occupied') }}"
        attributes:
          mode: "{{ states('input_select.ninos_bedroom') | default('Auto') }}"
          icon: "kohbo:kohbo-bed-single"
          permalink: "/dashboard-kohbo/rooms-ninos-bedroom"
          temperature: >
            {% if states('sensor.nino_bedroom_awair_temperature') not in ['unavailable', 'unknown', ''] %}
              {{ states('sensor.nino_bedroom_awair_temperature') | float }}
            {% else %}
              ""
            {% endif %}
          humidity: >
            {% if states('sensor.nino_bedroom_awair_humidity') not in ['unavailable', 'unknown', ''] %}
              {{ states('sensor.nino_bedroom_awair_humidity') | float }}
            {% else %}
              ""
            {% endif %}
          aqi: >
            {% if states('sensor.nino_bedroom_air_quality') not in ['unavailable', 'unknown', ''] %}
              {{ states('sensor.nino_bedroom_air_quality') }}
            {% else %}
              ""
            {% endif %}
          last_changed: >
            {% if states.input_boolean.ninos_bedroom_occupied.last_changed %}
              {{ states.input_boolean.ninos_bedroom_occupied.last_changed.isoformat() }}
            {% else %}
              {{ now().isoformat() }}
            {% endif %}
          occupied_duration_seconds: >
            {% if is_state('input_boolean.ninos_bedroom_occupied', 'on') and states.input_boolean.ninos_bedroom_occupied.last_changed %}
              {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.ninos_bedroom_occupied.last_changed)) | int }}
            {% else %}
              0
            {% endif %}
          occupied_duration_minutes: >
            {% if is_state('input_boolean.ninos_bedroom_occupied', 'on') and states.input_boolean.ninos_bedroom_occupied.last_changed %}
              {{ ((as_timestamp(now()) - as_timestamp(states.input_boolean.ninos_bedroom_occupied.last_changed)) / 60) | int }}
            {% else %}
              0
            {% endif %}
          people: "{{ state_attr('sensor.ninos_room_people_list', 'people') | default([]) }}"
          people_count: "{{ states('sensor.ninos_room_people_list') | int | default(0) }}"
