# 
# Upstairs Hallway Sensor
# 
template:
  - sensor:
      - name: "Upstairs Hallway"
        unique_id: upstairs_hallway
        state: "{{ states('input_boolean.upstairs_hallway_occupied') }}"
        attributes:
          mode: "{{ states('input_select.upstairs_hallway') | default('Auto') }}"
          icon: "mdi:stairs"
          permalink: "/dashboard-kohbo/rooms-upstairs-hallway"
          temperature: ""
          humidity: ""
          aqi: ""
          last_changed: >
            {% if states.input_boolean.upstairs_hallway_occupied.last_changed %}
              {{ states.input_boolean.upstairs_hallway_occupied.last_changed.isoformat() }}
            {% else %}
              {{ now().isoformat() }}
            {% endif %}
          occupied_duration_seconds: >
            {% if is_state('input_boolean.upstairs_hallway_occupied', 'on') %}
              {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.upstairs_hallway_occupied.last_changed)) | int }}
            {% else %}
              0
            {% endif %}
          occupied_duration_minutes: >
            {% if is_state('input_boolean.upstairs_hallway_occupied', 'on') %}
              {{ ((as_timestamp(now()) - as_timestamp(states.input_boolean.upstairs_hallway_occupied.last_changed)) / 60) | int }}
            {% else %}
              0
            {% endif %}
          people: "{{ [] }}"
          people_count: "0"
