binary_sensor:
  # First Floor Motion Group
  #
  - platform: group
    name: First Floor Motion
    unique_id: first_floor_motion
    device_class: motion
    entities:
      - binary_sensor.kitchen_motion_sensor_status
      - binary_sensor.family_room_motion_sensor
      - binary_sensor.playroom_motion
      - binary_sensor.office_aqara_motion_sensor
      - binary_sensor.mudroom_motion_sensor_motion_detection

  # First Floor Occupancy Group
  #
  - platform: group
    name: First Floor Occupancy
    unique_id: first_floor_occupancy
    device_class: occupancy
    entities:
      - binary_sensor.kitchen_motion_sensor_occupancy
      - binary_sensor.family_room_motion_sensor_occupancy
      - binary_sensor.playroom_occupancy
      - binary_sensor.office_aqara_occupancy


  # First Floor Room Presence
  #
  # Binary sensor to reeturn if anybody is detected
  # via BLE presence.
  - platform: template
    sensors:
      first_floor_any_room_presence:
        friendly_name: First Floor Any Room Presence
        value_template: >-
          {{ 
            expand('group.room_presence_devices') |
            selectattr('state', 'in', ['playroom', 'kitchen', 'family_room', 'office']) |
            map(attribute='name') |
            list |
            length > 0
          }}

  - platform: template
    sensors:
      first_floor_occupied:
        friendly_name: First Floor Occupied
        unique_id: first_floor_occupied
        value_template: >-
          {{
            states.input_boolean.kitchen_occupied.state == "on"
            or states.input_boolean.family_room_occupied.state == "on"
            or states.input_boolean.playroom_occupied.state == "on"
            or states.input_boolean.office_occupied.state == "on"
            or states.input_boolean.dining_room_occupied.state == "on"
            or states.input_boolean.mudroom_occupied.state == "on"
            or states.input_boolean.foyer_occupied.state == "on"
            or states.input_boolean.jr_suite_occupied.state == "on"
          }}

# 
# First Floor Areas Group
# 
group:
  first_floor_areas:
    name: First Floor Areas
    entities:
      - input_boolean.kitchen_occupied
      - input_boolean.family_room_occupied
      - input_boolean.playroom_occupied
      - input_boolean.office_occupied
      - input_boolean.dining_room_occupied
      - input_boolean.mudroom_occupied
      - input_boolean.foyer_occupied
      - input_boolean.jr_suite_occupied
      - input_boolean.laundry_room_occupied

# 
# First Floor Sensor
# 
# This is a sensor that's acts like an object with various 
# attributes based on the first floor areas.
# 
template:
  - sensor:
      - name: "First Floor"
        unique_id: first_floor
        state: "{{ states.binary_sensor.first_floor_occupied.state }}"
        attributes:
          motion: "{{ states.binary_sensor.first_floor_motion.state }}"
          occupancy: "{{ states.binary_sensor.first_floor_occupancy.state }}"
          presence: "{{ states.binary_sensor.first_floor_any_room_presence.state }}"
          areas: >
            {{ 
              expand('group.first_floor_areas')
              | map(attribute='entity_id')
              | list
              | join(', ')
            }}
          occupied_rooms: >
            {{ 
              expand('group.first_floor_areas')
              | selectattr('state', 'eq', 'on')
              | map(attribute='entity_id')
              | list
              | join(', ')
            }}
          occupied_rooms_count: >
            {{ 
              expand('group.first_floor_areas')
              | selectattr('state', 'eq', 'on')
              | map(attribute='entity_id')
              | list
              | length
            }}
          unoccupied_rooms: >
            {{ 
              expand('group.first_floor_areas')
              | selectattr('state', 'eq', 'off')
              | map(attribute='entity_id')
              | list
              | join(', ')
            }}
          unoccupied_rooms_count: >
            {{ 
              expand('group.first_floor_areas')
              | selectattr('state', 'eq', 'off')
              | map(attribute='entity_id')
              | list
              | length
            }}


