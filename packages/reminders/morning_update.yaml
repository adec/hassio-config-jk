# Family Morning Update
#
# Every morning, provide an overview of the day for the family
# that includes calendar events, weather, and some fun additions
#
automation:
  - id: "morning_update"
    alias: "Morning Update"
    mode: "single"
    triggers:
      # # Bedtime mode is disabled
      # - platform: state
      #   entity_id: input_boolean.bedtime
      #   from: "on"
      #   to: "off"
      - trigger: time
        at: "07:05:00"
    condition:
      # House is occupied
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
    action:
      # Wait for quiet mode to be disabled
      - wait_template: "{{ is_state('input_boolean.quiet_mode', 'off') }}"
        timeout: "00:45:00"
      # Kitchen has been occupied for more than 10 minutes
      - wait_template: >-
          {{
            states.binary_sensor.kitchen_motion_sensor_occupancy.state == "on" and
            (as_timestamp(now()) - as_timestamp(states.binary_sensor.kitchen_motion_sensor_occupancy.last_changed)) | int >= 600
          }}

        timeout: "00:30:00"
        continue_on_timeout: false
      # Wait for motion in the kitchen
      - wait_template: "{{ is_state('binary_sensor.kitchen_motion_sensor_status', 'on') }}"
        timeout: "00:30:00"
        continue_on_timeout: false
      - alias: "Wait 2 seconds"
        delay: 2
      - action: script.morning_update_announcement

script:
  morning_update_announcement:
    alias: "Morning Update Announcement"
    mode: "single"
    icon: mdi:air-horn

    sequence:
      #
      # Use ChatGPT to get the daily briefing
      #
      - action: conversation.process
        data:
          agent_id: conversation.chatgpt
          text: >-
            You're part of the Koht family's smart home! Every morning, you'll create a single-paragraph spoken briefing to be broadcast throughout the house via text-to-speech. Be warm, playful, and conversational — like a friendly morning host who knows us personally. 

            Include these details only when relevant:
            - Weather (current, high, low)
            - School events or holidays
            - Lunch menu highlights
            - Birthdays (only if there are any)
            - Air quality (only if poor or under alert)
            - Fun holiday flair

            Avoid emojis, lists, or symbols like &, #, or similar. Use full sentences only. Keep everything in one single paragraph with no line breaks. 

            ---

            Today's date: {{ now() }}

            ### HOLIDAY PERSONALITY
            {% set today = now().strftime('%m-%d') %}
            {% if today == '10-31' %}
              Use a spooky and fun Halloween tone — be playful and mischievous, like a friendly ghost.
            {% elif today == '12-25' %}
              Use a cheerful, festive Christmas tone — think Santa vibes with a "Ho ho ho! Merry Christmas, Koht family!"
            {% elif today == '12-31' %}
              Use a cheerful, festive New Year's Eve tone — think New Year's Eve vibes with a "Happy New Year, Koht family!"
            {% elif today == '11-28' %}
              Use a warm, grateful Thanksgiving tone — mention gratitude and family.
            {% elif today == '04-01' %}
              It's April Fool's Day! Make it funny with one or two playful pranks, like silly weather or "Enderdragon burgers" for Nino's lunch.
            {% elif today == '05-12' %}
              It's Mother's Day — be extra sweet and thankful to Cristina.
            {% elif today == '06-16' %}
              It's Father's Day — make John feel like the hero of the day.
            {% endif %}

            ---

            ### WEATHER
            Today's weather: Please share the current weather as well as today's high and low temperatures.
            - Weather Conditions: {{ states.weather.pirateweather.state }}
            - Current Temperature: {{ states.sensor.tempest_temperature.state }}
            - Today's High: {{ states.sensor.pirateweather_daytime_high_temperature_0d.state | float | round(0) }}
            - Today's Low: {{ states.sensor.pirateweather_overnight_low_temperature_0d.state | float | round(0) }}

            {% if (states.sensor.pirateweather_daytime_high_temperature_0d.state | int) > 93 %}
              Remind us kindly to leave cold water for delivery people since it's going to be hot today.
            {% endif %}

            {% if now().strftime('%A') in ['Tuesday','Wednesday', "Thursday"] %}
              Cristina commutes today — if rain probability is high, remind her to bring an umbrella. 
              1h rain chance: {{ states.sensor.pirateweather_precip_probability_1h.state }}%
              6h rain chance: {{ states.sensor.pirateweather_precip_probability_6h.state }}%
            {% endif %}

            ---

            ### SCHOOL & LUNCH
            {% if states.binary_sensor.primary_school_closed.state == "on" %}
              Let Nino know there's no school today!
            {% elif states.input_boolean.primary_school_day.state == "on" %}
              Today is a school day, so remind Nino to get ready and check the lunch menu.  

              {% set menu = states.sensor.primary_school_lunch_menu.attributes.lunch_menu | lower %}
              {% set favorites = ['chicken nugget', 'pizza', 'cheeseburger', 'caesar salad', 'beef nachos'] %}
              {% set ns = namespace(liked_items=[]) %}
              {% for fav in favorites %}
                {% if fav in menu %}
                  {% set ns.liked_items = ns.liked_items + [fav] %}
                {% endif %}
              {% endfor %}

              {% if ns.liked_items | length > 0 %}
                The lunch menu includes some items that Nino likes today! Please let him know about those items and don't forget to see what else is on the menu.
                You can say somethign like: "Yum! Nino, the lunch menu includes {{ ns.liked_items | join(', ') }} today! Don't forget to see what else is on the menu."
              {% else %}
                Hey Nino, don't forget to check the lunch menu today!
              {% endif %}
            {% endif %}

            {% if states.binary_sensor.gianluca_is_today_school_day.state == "on" %}
              Today is a school day, so let Gianluca know that he has school today!
            {% endif %}

            ---

            ### BIRTHDAYS
            {% set birthdays = states.sensor.calendar_events_today.attributes.events | selectattr('type','equalto','birthday') | list %}
            {% if birthdays | length > 0 %}
            {% for event in birthdays %}
              It's {{ event.summary }}'s birthday today! Be sure to wish them a happy birthday.
            {% endfor %}
            {% endif %}

            ### BIRTHDAY COUNTDOWN
            {% set now_utc = now().astimezone() %}
            {% set nino_birthday = as_datetime(states.sensor.ninos_birthday.state).astimezone() %}
            {% set gian_birthday = as_datetime(states.sensor.gianlucas_birthday.state).astimezone() %}

            {% set nino_days = (nino_birthday - now_utc).days %}
            {% set gian_days = (gian_birthday - now_utc).days %}

            {% if 0 < nino_days <= 14 %}
            Hey Nino, it's only {{ nino_days }} days until your birthday! 
            {% elif nino_days == 0 %}
            Happy birthday Nino! Have the best day ever!
            {% endif %}

            {% if 0 < gian_days <= 14 %}
            Hey Gianluca, it's only {{ gian_days }} days until your birthday! 
            {% elif gian_days == 0 %}
            Happy birthday Gianluca! Hope you're ready for cake and fun!
            {% endif %}

            ---

            ### AIR QUALITY
            {% set aqi = states.sensor.desplns_illinois_usa_air_quality_index.state | int(0) %}
            {% if aqi >= 75 %}
            Air quality isn't great today, with an index of {{ aqi }}. Consider keeping windows closed.
            {% endif %}

            ---

            ### CALENDAR EVENTS
            {% if states.sensor.calendar_events_today.attributes.events | length > 0 %}
            Here's what's happening today: {{ states.sensor.calendar_events_today.attributes.events }}
            {% else %}
            Looks like a calm day ahead!
            {% endif %}

            ---

            Remember: output only one single paragraph with no line breaks or bullet points, combining all relevant sections naturally and conversationally.
        response_variable: chatgpt
      #
      # Push Notification
      #
      - action: script.general_notification
        data:
          title: "Daily Update!"
          message: '{{chatgpt.response.speech.plain.speech | trim | replace(''"'','''')}}'
          devices: "jk"
          priority: "time-sensitive"
          tag: "daily-update"
      #
      # Voice Announcement
      #
      - action: script.voice_announcement
        data:
          media_players: "auto"
          sound: "default"
          priority: high
          expires_in: 10
          speech_message: '{{chatgpt.response.speech.plain.speech | trim | replace(''"'','''')}}'

#
#
# Calendar Events for Today Template Sensor
#
template:
  - trigger:
      - trigger: time_pattern
        hours: /1
    action:
      - action: calendar.get_events
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ now().strftime('%Y-%m-%d 23:59:59') }}"
        target:
          entity_id:
            - calendar.gianluca_school
            - calendar.ninos_school
            - calendar.kohbocal
            - calendar.lyon_school
            - calendar.holidays_in_united_states
        response_variable: calendar
      - variables:
          e: |-
            {% set ns = namespace(cal_events=[]) %}

            {%- for key, value in calendar.items() %}
              {%- for event in value.events %}
                {%- set ns.cal_events = ns.cal_events + [event] %}
              {%- endfor %}
            {%- endfor %}

            {{ ns.cal_events | sort(attribute='start') | list }}
    #
    # This is the sensor that will provide a list of events
    sensor:
      - name: Calendar Events Today
        unique_id: calendar_events_today
        state: "{{ now().isoformat() }}"
        attributes:
          events: "{{ e }}"

  #
  #
  # Weather Forecast Sensor
  #
  - trigger:
      # - platform: state
      #   entity_id: weather.pirateweather
      - trigger: time_pattern
        hours: /1
    action:
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.pirateweather
        response_variable: weather_forecast
    #
    # This is the sensor that provide the forecast data (first 10)
    sensor:
      - name: Weather Forecast Today
        unique_id: weather_forecast_today
        state: "{{ now().isoformat() }}"
        attributes:
          forecast: "{{ weather_forecast['weather.pirateweather'].forecast[:10] }}" # note the array index with the weather provider name. This is what is different with get_forecasts (plural)
