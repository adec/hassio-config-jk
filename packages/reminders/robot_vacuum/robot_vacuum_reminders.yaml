automation:
  - id: "robot_vacuum_maintenance_reminder"
    alias: "Robot Vacuum Maintenance Reminder"
    mode: "single"
    triggers:
      # At 8:45pm
      - trigger: time
        at: "20:45:00"
        id: reminder_time
      # At 7:05am
      - trigger: time
        at: "07:05:00"
        id: reminder_time
    conditions:
      # House is occupied
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
    actions:
      # Wait for the kitchen to be occupied for 5 minutes
      - wait_for_trigger:
          - trigger: state
            entity_id: binary_sensor.kitchen_motion_sensor_occupancy
            to: "on"
            for:
              minutes: 5
        timeout:
          minutes: 20
        continue_on_timeout: true

      # wait for the kitchen motion sensor to trigger
      - wait_for_trigger:
          - trigger: state
            entity_id: binary_sensor.kitchen_motion_sensor_status
            to: "on"
        timeout:
          minutes: 10
        continue_on_timeout: true

      # Call the announcement engine
      - action: script.voice_announcement
        data:
          media_players: auto
          sound: "one-chime"
          priority: high
          speech_message: >-
            {% if trigger.entity_id == "binary_sensor.roborock_s7_water_shortage" %}
              "The robot vacuum is water tank is empty, please refill it as soon as possible."
            {% elif trigger.entity_id == "sensor.roborock_s7_sensor_dirty_left" %}
              "The robot vacuum sensors are dirty and need to be cleaned."
            {% else %}
              "The robot vacuum needs maintenance, please check the app for more details."
            {% endif %}

      # Send a push notification
      - action: script.general_notification
        data:
          message: >-
            {% if trigger.entity_id == "binary_sensor.roborock_s7_water_shortage" %}
              "The robot vacuum is water tank is empty, please refill it as soon as possible."
            {% elif trigger.entity_id == "sensor.roborock_s7_sensor_dirty_left" %}
              "The robot vacuum sensors are dirty and need to be cleaned."
            {% else %}
              "The robot vacuum needs maintenance, please check the app for more details."
            {% endif %}
          title: Robot Vacuum Maintenance
          devices: "jk"
          priority: "time-sensitive"
          tag: "vacuum-notifications"
