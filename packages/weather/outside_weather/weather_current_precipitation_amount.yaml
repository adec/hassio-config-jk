template:
  - sensor:
      - name: "Weather - Current Precipitation Amount"
        state: >
          {{ states('sensor.pirateweather_precip_intensity_0h') | float | round(1, default=0) }}
        state_class: measurement
        unit_of_measurement: "in"
        icon: mdi:water-percent
        device_class: precipitation


# 
# Binary Sensor if rain probability is > 0
# 
binary_sensor:
  - platform: template
    sensors:
      weather_incoming_rain:
        friendly_name: "Weather Incoming Rain"
        value_template: >
          {{ states.sensor.pirateweather_precip_probability.state | float(2) > 0 }}