template:
  #
  # 
  #
  - trigger:
      - trigger: time_pattern
        # hours: /1
        # minutes: /15
        minutes: /1
    action:
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.pirateweather
        response_variable: weather_forecast
    #
    # This is the sensor that provide the forecast data (first 10)
    sensor:
      - name: Pirateweather Hourly Forecast
        unique_id: pirateweather_hourly_forecast
        state: "{{ now().isoformat() }}"
        attributes:
          forecast: "{{ weather_forecast['weather.pirateweather'].forecast }}"
