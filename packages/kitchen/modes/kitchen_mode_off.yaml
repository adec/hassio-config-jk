automation:
  - id: "kitchen_mode_off"
    initial_state: on
    alias: "Kitchen mode off"
    triggers:
      # House becomes unoccupied
      - trigger: state
        entity_id: input_boolean.house_occupied
        to: "off"
      # # Kitchen becomes unoccupied
      # - trigger: state
      #   entity_id: input_boolean.kitchen_occupied
      #   to: "off"
      # House is turned to Away
      - trigger: state
        entity_id: input_select.house
        to: "Away"
      # # House is turned to Bedtime
      # - trigger: state
      #   entity_id: input_select.house
      #   to: "Bedtime"
      # Bedtime mode is enabled
      - trigger: state
        entity_id: input_boolean.bedtime
        to: "on"
      # Hassio restart/relaod
      - trigger: homeassistant
        event: start
      - trigger: event
        event_type: automation_reloaded
    conditions:
      # # Kitchen is not occupied
      # - condition: state
      #   entity_id: input_boolean.kitchen_occupied
      #   state: "off"
      # Not currently Off
      - condition: template
        value_template: "{{ not is_state('input_select.kitchen','Off') }}"
      - condition: or
        conditions:
          # House is not occupied
          - condition: state
            entity_id: input_boolean.house_occupied
            state: "off"
          # OR House is in Away mode
          - condition: state
            entity_id: input_select.house
            state: "Away"
          # # OR House is in Bedtime mode
          # - condition: state
          #   entity_id: input_select.house
          #   state: "Bedtime"
          # Bedtime mode is enabled
          - condition: state
            entity_id: input_boolean.bedtime
            state: "on"
          # # OR Kitchen is not occupied
          # - condition: state
          #   entity_id: input_boolean.kitchen_occupied
          #   state: "off"
    actions:
      - action: input_select.select_option
        data:
          entity_id: input_select.kitchen
          option: "Off"
      # Make the kitchen as unoccupied
      - action: input_boolean.turn_off
        entity_id: input_boolean.kitchen_occupied
