# Office Air Quality Detections
#
# If PM2.5, CO2, or TVOCs breach thresholds
# then turn on the air purifier.
#
automation:
  - id: "office_air_quality_detections"
    alias: Office Air Quality Sensor Detections
    mode: single
    initial_state: on
    triggers:
      # Triggered by any change to the air quality state
      - trigger: state
        entity_id: sensor.office_air_quality
        to: "Hazardous"
        for:
          minutes: 2

      # Triggered by any change to the air quality state
      - trigger: state
        entity_id: sensor.office_air_quality
        to: "Unhealthy"
        for:
          minutes: 3

      # Triggered by any change to the air quality state
      - trigger: state
        entity_id: sensor.office_air_quality
        to: "Moderate"
        for:
          minutes: 5

      # Triggered by any change to the air quality state
      - trigger: state
        entity_id: sensor.office_air_quality
        to: "Acceptable"

      # Trigger if office occupancy changes
      - trigger: state
        entity_id: input_boolean.office_occupied
    conditions:
      - or:
          # House is occupied
          - condition: state
            entity_id: input_boolean.house_occupied
            state: "on"
          # Or we're almost home
          - condition: state
            entity_id: input_boolean.almost_home
            state: "on"
    variables:
      purifier: fan.office_air_purifier
      aqi_state: "{{ trigger.to_state.state }}"
      room_state: "{{ states.input_select.office.state }}"
    actions:
      # Call the air quality set purifier mode script
      # and let it handle the logic for speed and mode
      - action: script.air_quality_set_air_purifier_mode
        data:
          purifier: "{{ purifier }}"
          aqi_state: "{{ aqi_state }}"
          room_state: "{{ room_state }}"