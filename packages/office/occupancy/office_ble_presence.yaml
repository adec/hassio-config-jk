template:
  - sensor:
      - name: "Office People List"
        unique_id: office_people_list
        state: >
          {% set people = expand('group.people_sensors') %}
          {% set in_room = people | selectattr('attributes.room_presence', 'equalto', 'office') | map(attribute='entity_id') | list %}
          {{ in_room | length }}
        attributes:
          people: >
            {% set people = expand('group.people_sensors') %}
            {% set in_room = people | selectattr('attributes.room_presence', 'equalto', 'office') | map(attribute='entity_id') | list %}
            {{ in_room }}