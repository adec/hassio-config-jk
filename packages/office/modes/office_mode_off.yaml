# Office Mode Off
#
# The Office becomes Off when we're not home
# or it's bedtime.
#
automation:
  - id: "office_mode_off"
    initial_state: on
    alias: "Office mode off"
    triggers:
      # House becomes unoccupied
      - trigger: state
        entity_id: input_boolean.house_occupied
        to: "off"
      # House is turned to Away
      - trigger: state
        entity_id: input_select.house
        to: "Away"
      # House is turned to Bedtime
      - trigger: state
        entity_id: input_select.house
        to: "Bedtime"
    conditions:
      - condition: or
        conditions:
          # Office is not occupied
          - condition: state
            entity_id: input_boolean.office_occupied
            state: "off"
          # House is not occupied
          - condition: state
            entity_id: input_boolean.house_occupied
            state: "off"
          # House is in Away mode
          - condition: state
            entity_id: input_select.house
            state: "Away"
          # House is in Bedtime mode
          - condition: state
            entity_id: input_select.house
            state: "Bedtime"
    actions:
      - action: input_select.select_option
        data:
          entity_id: input_select.office
          option: "Off"
