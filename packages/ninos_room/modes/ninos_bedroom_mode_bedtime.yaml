# Nino's Room Mode Bedtime
#
automation:
  - id: "ninos_bedroom_mode_bedtime"
    initial_state: on
    alias: "Nino's Bedroom - Mode Bedtime"
    triggers:
      # Nino is in bed
      - trigger: state
        entity_id: input_boolean.nino_in_bed
        to: "on"
    conditions:
      # House is occupied
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
      # Nino's Bedroom is not already Bedtime
      - condition: template
        value_template: "{{ not is_state('input_select.ninos_bedroom','Bedtime') }}"
    action:
      - action: input_select.select_option
        data:
          entity_id: input_select.ninos_bedroom
          option: "Bedtime"
