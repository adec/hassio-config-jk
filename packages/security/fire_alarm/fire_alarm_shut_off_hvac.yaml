automation:
  - id: "fire_alarm_shut_off_hvac"
    alias: "Fire Alarm - Shut Off HVAC"
    mode: "single"
    triggers:
      # Smoke detector detects smoke
      - trigger: state
        entity_id: binary_sensor.smoke_detector
        from: "off"
        to: "on"
    actions:
      # Turn OFF the HVAC
      - action: climate.turn_off
        target:
          entity_id:
            - climate.nest_main_floor
            - climate.nest_2nd_floor

      # Send a push notification
      - action: script.general_notification
        data:
          message: The smoke detector has activated, I'm turning off the HVAC
          title: Fire & Smoke Alarm
          devices: "jk"
          priority: "critical"
          tag: "home-fire-alarm"


script:
  fire_alarm_alert:
    alias: "Fire Alarm - Alert"
    mode: "single"
    icon: mdi:alert
    sequence:
      # Turn OFF the HVAC
      - action: climate.turn_off
        target:
          entity_id:
            - climate.nest_main_floor
            - climate.nest_2nd_floor

      # Announcement
      - service: script.voice_announcement
        data:
          media_players: auto
          sound: "nuclear"
          speech_message: >-
            {{
              [
                "Arrivederci! Mamma has left the house.",
                "Ciao Mamma! See you later.",
                "Mamma just left, but she misses you dearly!",
                "Mamma just left, but don't worry, she'll be back soon.",
                "Pardon the interruption but Mamma has left the house.",
                "Attention! Mamma left the house."
              ] | random
            }}

      # Send a push notification
      - action: script.general_notification
        data:
          message: The smoke detector has activated, I'm turning off the HVAC
          title: Fire & Smoke Alarm
          devices: "jk"
          priority: "critical"
          tag: "home-fire-alarm"
