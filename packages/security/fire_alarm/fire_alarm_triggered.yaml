automation:
  - id: "fire_alarm_trigger"
    alias: "Fire Alarm - Triggered"
    mode: "single"
    triggers:
      # Smoke detector detects smoke
      - trigger: state
        entity_id: binary_sensor.smoke_detector_2
        from: "off"
        to: "on"
    actions:
      - action: script.fire_alarm_alert
        data: {}

script:
  fire_alarm_alert:
    alias: "Fire Alarm - Alert"
    mode: "single"
    icon: mdi:alert
    sequence:
      # Turn OFF the HVAC
      - action: climate.turn_off
        target:
          entity_id:
            - climate.nest_main_floor
            - climate.nest_2nd_floor

      # 
      # The use of script.turn_on is intentional here as
      # we don't want to wait for the scripts to finish 
      # before proceeding, instead, it will call each script
      # and move on to the next.
      # see https://www.home-assistant.io/integrations/script/#waiting-for-script-to-complete
      # 

      # Trigger a critical announcement
      - action: script.turn_on
        target:
          entity_id: script.critical_announcement
        data:
          variables:
            media_players: all
            sound: "nuclear"
            speech_message: Alert! The smoke detector has been trigger. Get to safety immediately!

      # Flash the lights
      - action: script.turn_on
        target:
          entity_id: script.alarm_flash_lights
        data: {}

      # Send a push notification
      - action: script.turn_on
        target:
          entity_id: script.general_notification
        data:
          variables:
            message: The smoke detector has activated, I'm turning off the HVAC. Please get to safety!
            title: Fire & Smoke Alarm
            devices: "jk"
            priority: "critical"
            tag: "home-fire-alarm"
