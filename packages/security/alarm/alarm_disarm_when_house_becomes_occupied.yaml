automation:
  - id: "alarm_disarm_when_house_becomes_occupied"
    alias: "Alarm - Disarm When House Becomes Occupied"
    mode: "single"
    triggers:
      # House becomes occupied
      - trigger: state
        entity_id: input_boolean.house_occupied
        from: "off"
        to: "on"
    conditions:
      # Alarm is currently armed
      - condition: state
        entity_id: alarm_control_panel.alarmo
        state:
          - "armed_home"
          - "armed_away"
      # House is occupied
      - condition: state
        entity_id: input_boolean.house_occupied
        state: "on"
    actions:
      # Disarm the alarm
      # - action: alarm_control_panel.alarm_disarm
      #   entity_id: alarm_control_panel.kohbo
      - action: alarmo.disarm
        entity_id: alarm_control_panel.alarmo
        data:
          code: !secret alarmo_code

      # Reset the inovelli light switch led bar
      - type: issue_all_led_effect
        domain: zha
        device_id: 0526b246502b6d36f56506a277cbab48
        effect_type: Solid
        color: 170
        level: 10
        duration: 255

      - action: script.general_notification
        data:
          message: Home is now disarmed upon the arrival of somebody.
          title: Home Security System
          devices: "jk"
          priority: "active"
          tag: "home-security"
          url: /dashboard-kohbo/security
