automation:
  - id: "alarm_arm_at_bedtime"
    alias: "Alarm - Arm at Bedtime"
    mode: "single"
    triggers:
      # Bedtime mode enabled for 5 minutes
      - trigger: state
        entity_id: input_boolean.bedtime
        to: "on"
    conditions:
      # Alarm is current disarmed
      - condition: state
        entity_id: alarm_control_panel.panel
        state: "disarmed"
      # Between 8pm and 5am
      - condition: time
        after: "20:00:00"
        before: "05:00:00"
    actions:
      # Call the script to arm the home
      - action: script.alarm_arm_home
