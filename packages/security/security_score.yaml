template:
  - sensor:
      - name: "House Security Score"
        unique_id: house_security_score
        state: >
          {% set score = 0 %}

          {# ------------------------------------------------------------------- #}
          {# CONTEXT VARIABLES                                                  #}
          {# ------------------------------------------------------------------- #}

          {% set hour = now().hour %}
          {% set dark_outside = is_state('input_boolean.dark_outside', 'on') %}
          {% set occupied = is_state('input_boolean.house_occupied', 'on') %}
          {% set vacation = is_state('input_boolean.vacation_mode', 'on') %}
          {% set alarm_state = states('alarm_control_panel.alarmo') %}
          {% set ups_status = states('sensor.apc_ups_status_data') %}
          {% set runtime = states('sensor.apc_ups_battery_runtime') | int(9999) %}
          {% set bad_weather = is_state('input_boolean.bad_weather', 'on') %}

          {# ------------------------------------------------------------------- #}
          {# SECURITY MEASURES (0-100 points)                                   #}
          {# These are things you CAN control - max out at 100 when all secure  #}
          {# ------------------------------------------------------------------- #}

          {# Alarm state (0-30 points) #}
          {% if alarm_state == 'armed_away' %}
            {% set score = score + 30 %}
          {% elif alarm_state == 'armed_home' %}
            {% set score = score + 25 %}
          {% elif alarm_state == 'disarmed' %}
            {% if occupied %}
              {% set score = score + 15 %}
            {% else %}
              {% set score = score - 20 %}
            {% endif %}
          {% elif alarm_state == 'triggered' %}
            {% set score = score - 40 %}
          {% endif %}

          {# Front door lock (0-18 points) #}
          {% if is_state('lock.front_door', 'locked') %}
            {% set score = score + 18 %}
          {% else %}
            {% set score = score - 15 %}
          {% endif %}

          {# Garage entry door lock (0-12 points) #}
          {% if is_state('lock.garage_entry_door', 'locked') %}
            {% set score = score + 12 %}
          {% else %}
            {% set score = score - 10 %}
          {% endif %}

          {# Exterior doors closed (0-12 points) #}
          {% if is_state('binary_sensor.exterior_doors', 'off') %}
            {% set score = score + 12 %}
          {% else %}
            {% set score = score - 12 %}
          {% endif %}

          {# Garage doors (0-10 points) #}
          {% if is_state('cover.garage_doors', 'closed') %}
            {% set score = score + 10 %}
          {% else %}
            {% set score = score - 15 %}
          {% endif %}

          {# Windows (0-6 points) #}
          {% if is_state('binary_sensor.windows', 'off') %}
            {% set score = score + 6 %}
          {% else %}
            {% if occupied and not dark_outside %}
              {% set score = score - 2 %}
            {% else %}
              {% set score = score - 8 %}
            {% endif %}
          {% endif %}

          {# Camera notifications (0-8 points) #}
          {% if is_state('input_boolean.camera_notifications', 'on') %}
            {% set score = score + 8 %}
          {% else %}
            {% if not occupied %}
              {% set score = score - 10 %}
            {% endif %}
          {% endif %}

          {# UPS / Power status (0-4 points) #}
          {% if ups_status == 'OL' %}
            {% set score = score + 4 %}
          {% elif ups_status == 'OB' %}
            {% set score = score - 10 %}
          {% elif ups_status == 'LB' %}
            {% set score = score - 20 %}
          {% elif runtime < 600 %}
            {% set score = score - 15 %}
          {% endif %}

          {# ------------------------------------------------------------------- #}
          {# INHERENT VULNERABILITY DEDUCTIONS                                  #}
          {# These represent risk you CANNOT fully mitigate                     #}
          {# Even with perfect security, these factors reduce your score        #}
          {# ------------------------------------------------------------------- #}

          {% set vulnerability = 0 %}

          {# Empty house is inherently more vulnerable #}
          {% if vacation %}
            {% set vulnerability = vulnerability + 8 %}
          {% elif not occupied %}
            {% set vulnerability = vulnerability + 5 %}
          {% endif %}

          {# Dark/nighttime increases vulnerability #}
          {% if dark_outside %}
            {% set vulnerability = vulnerability + 4 %}
          {% elif hour >= 22 or hour < 5 %}
            {% set vulnerability = vulnerability + 4 %}
          {% elif hour >= 20 or hour < 6 %}
            {% set vulnerability = vulnerability + 2 %}
          {% endif %}

          {# Bad weather can mask break-in attempts #}
          {% if bad_weather %}
            {% set vulnerability = vulnerability + 2 %}
          {% endif %}

          {# Apply vulnerability deduction #}
          {% set score = score - vulnerability %}

          {# ------------------------------------------------------------------- #}
          {# MITIGATING FACTORS (partial recovery of vulnerability)             #}
          {# Good practices that help offset inherent risk                      #}
          {# ------------------------------------------------------------------- #}

          {# Exterior lights at night reduce vulnerability slightly #}
          {% if dark_outside and is_state('group.exterior_lights', 'on') %}
            {% set score = score + 2 %}
          {% endif %}

          {# Proper alarm mode for situation #}
          {% if not occupied and alarm_state == 'armed_away' %}
            {% set score = score + 3 %}
          {% elif not occupied and alarm_state == 'armed_home' %}
            {% set score = score + 1 %}
          {% endif %}

          {# ------------------------------------------------------------------- #}
          {# FINAL SCORE (clamped 0-100)                                        #}
          {# ------------------------------------------------------------------- #}
          {% if score < 0 %}
            0
          {% elif score > 100 %}
            100
          {% else %}
            {{ score | round(0) }}
          {% endif %}

        attributes:
          friendly_name: "House Security Score"
          last_updated: "{{ now().isoformat() }}"
          alarm_state: "{{ states('alarm_control_panel.alarmo') }}"
          occupancy: "{{ states('input_boolean.house_occupied') }}"
          ups_status: "{{ states('sensor.apc_ups_status_data') }}"
          ups_runtime: "{{ states('sensor.apc_ups_battery_runtime') }}"
          dark_outside: "{{ states('input_boolean.dark_outside') }}"
          windows: "{{ states('binary_sensor.windows') }}"
          exterior_doors: "{{ states('binary_sensor.exterior_doors') }}"
          garage_doors: "{{ states('cover.garage_doors') }}"
          front_door: "{{ states('lock.front_door') }}"
          garage_entry_door: "{{ states('lock.garage_entry_door') }}"
          camera_notifications: "{{ states('input_boolean.camera_notifications') }}"
          vulnerability: >
            {% set hour = now().hour %}
            {% set dark = is_state('input_boolean.dark_outside', 'on') %}
            {% set occupied = is_state('input_boolean.house_occupied', 'on') %}
            {% set vacation = is_state('input_boolean.vacation_mode', 'on') %}
            {% set bad_weather = is_state('input_boolean.bad_weather', 'on') %}
            {% set v = 0 %}
            {% if vacation %}
              {% set v = v + 8 %}
            {% elif not occupied %}
              {% set v = v + 5 %}
            {% endif %}
            {% if dark or hour >= 22 or hour < 5 %}
              {% set v = v + 4 %}
            {% elif hour >= 20 or hour < 6 %}
              {% set v = v + 2 %}
            {% endif %}
            {% if bad_weather %}
              {% set v = v + 2 %}
            {% endif %}
            {{ v }}

