# Driveway Front Camera Detects a Person
#
automation:
  - id: "driveway_front_camera_detections_person"
    alias: "Driveway Front Camera Detections - Person"
    mode: "single"
    triggers:
      #
      # Drivewy Front Camera detects a person
      - trigger: state
        entity_id: binary_sensor.driveway_front_camera_person_detected
        to: "on"
        variables:
          camera_name: "Driveway Front Camera"
          nvr_id: "{{ config_entry_id(trigger.entity_id) }}"
          event_id: "{{ trigger.to_state.attributes.event_id }}"
          image_path: /api/unifiprotect/thumbnail/{{ nvr_id }}/{{ event_id }}
          proxy_camera: camera.camera_proxy_camera_driveway_front_camera_high
    conditions:
      #
      # Automation wasn't run in the past 90 seconds
      - condition: template
        value_template: "{{ ( now().timestamp() - as_timestamp(state_attr('automation.driveway_front_camera_detections_person','last_triggered'), 0) ) | int > 60 }}"
      # Only alert if camera notifications are enabled
      - condition: state
        entity_id: input_boolean.camera_notifications
        state: "on"
      # If somebody is in the garage or doing something on the driveway
      # like taking out the trash, etc. we don't want to trigger the notifications
      - condition: or
        conditions:
          # Garage is NOT occupied
          # We only want to trigger when the garage is not occupied
          - condition: state
            entity_id: input_boolean.garage_occupied
            state: "off"
          # OR garage is closed
          # we only want to trigger if the garage doors are closed
          - condition: state
            entity_id: cover.garage_doors
            state: "closed"
          # OR nobody is in the garage
          # We only want to trigger when nobody is detected through BLE
          - condition: state
            entity_id: binary_sensor.garage_ble_occupancy
            state: "off"
            for:
              minutes: 2
    actions:
      #
      # Call the camera detection alert service to handle
      - action: script.camera_detection_alert
        data:
          detection_type: "person"
          camera_name: "{{ camera_name }}"
          image_path: "{{ image_path }}"
          proxy_camera: "{{ proxy_camera }}"
