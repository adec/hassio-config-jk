# Garage Drivewy camera detects a Person
#
automation:
  - id: "garage_driveway_camera_detections_person"
    alias: "Garage Driveway Camera Detections - Person"
    mode: "single"
    triggers:
      #
      # Garage Driveway camera detects a person
      - trigger: state
        entity_id: binary_sensor.garage_driveway_person_detected
        to: "on"
        variables:
          camera_name: "Garage Driveway Camera"
          nvr_id: "{{ config_entry_id(trigger.entity_id) }}"
          event_id: "{{ trigger.to_state.attributes.event_id }}"
          image_path: /api/unifiprotect/thumbnail/{{ nvr_id }}/{{ event_id }}
          proxy_camera: camera.camera_proxy_camera_garage_driveway_camera_high
          snooze_timer: timer.garage_driveway_camera_notifications_snooze_timer
          notifications_boolean: input_boolean.garage_driveway_camera_notifications
    conditions:
      - condition: template
        value_template: "{{ ( now().timestamp() - as_timestamp(state_attr('automation.garage_driveway_camera_detections_person','last_triggered'), 0) ) | int > 60 }}"
      - condition: state
        entity_id: input_boolean.garage_driveway_camera_notifications
        state: "on"
      # Don't alert if residents are actively using the driveway/garage
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.garage_occupied
            state: "off"
          - condition: state
            entity_id: cover.garage_doors
            state: "closed"
          - condition: state
            entity_id: binary_sensor.garage_ble_occupancy
            state: "off"
            for:
              minutes: 2
    actions:
      - action: script.camera_detection_alert
        data:
          detection_type: "person"
          camera_name: "{{ camera_name }}"
          image_path: "{{ image_path }}"
          proxy_camera: "{{ proxy_camera }}"
          snooze_timer: "{{ snooze_timer }}"
          notifications_boolean: "{{ notifications_boolean }}"
