# Backyard Porch Camera Detects a Person
#
automation:
  - id: "backyard_porch_camera_detections_person"
    alias: "Backyard Porch Camera Detections - Person"
    mode: "single"
    triggers:
      - trigger: state
        entity_id: binary_sensor.backyard_porch_camera_person_detected
        to: "on"
        variables:
          camera_name: "Backyard Porch Camera"
          nvr_id: "{{ config_entry_id(trigger.entity_id) }}"
          event_id: "{{ trigger.to_state.attributes.event_id }}"
          image_path: /api/unifiprotect/thumbnail/{{ nvr_id }}/{{ event_id }}
          proxy_camera: camera.camera_proxy_camera_backyard_porch_camera_high_resolution_channel
          snooze_timer: timer.backyard_porch_camera_notifications_snooze_timer
          notifications_boolean: input_boolean.backyard_porch_camera_notifications
    conditions:
      - condition: template
        value_template: "{{ ( now().timestamp() - as_timestamp(state_attr('automation.backyard_porch_camera_detections_person','last_triggered'), 0) ) | int > 180 }}"
      - condition: state
        entity_id: input_boolean.backyard_porch_camera_notifications
        state: "on"
      # Always alert when away; when home only alert if kitchen door wasn't opened recently
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.house_occupied
            state: "off"
          - condition: and
            conditions:
              - condition: state
                entity_id: input_boolean.house_occupied
                state: "on"
              - condition: template
                value_template: "{{ ( now().timestamp() - as_timestamp(state_attr('binary_sensor.kitchen_doors','last_changed'), 0) ) | int > 600 }}"
    actions:
      - action: script.camera_detection_alert
        data:
          detection_type: "person"
          camera_name: "{{ camera_name }}"
          image_path: "{{ image_path }}"
          proxy_camera: "{{ proxy_camera }}"
          snooze_timer: "{{ snooze_timer }}"
          notifications_boolean: "{{ notifications_boolean }}"
