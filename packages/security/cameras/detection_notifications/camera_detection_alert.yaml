script:
  camera_detection_alert:
    alias: "Camera Detection Alert"
    mode: "parallel"
    icon: mdi:alert

    fields:
      detection_type:
        name: Detection Type
        description: The type of detection the camera alerted about
        example: "person"
      camera_name:
        name: Camera Name
        description: The name of the Camera
        example: "Backyard South"
      camera:
        name: Camera
        description: The Camera device that triggered the detection
        example: "camera.backyard_south_camera_high"
      image_path:
        name: Image Path
        description: A URL to the image that we can send with the notification
        example: "/api/unifiprotect/thumbnail/de6377033b8c80f45813234a37a9389f/66bd12d000810303e401b870"
      video_path:
        name: Video Path
        description: A URL to the video that we can send with the notification
        example: "/api/unifiprotect/video/de6377033b8c80f45813234a37a9389f/635c4f66018d72038704f79c/2024-08-22T03:15:43+00:00/2024-08-22T03:16:06+00:00"
      proxy_camera:
        name: Proxy Camera
        description: A camera proxy to the Unifi Protect device
        example: camera.camera_proxy_camera_front_door_camera_high_resolution_channel
      snooze_timer:
        name: Snooze Timer
        description: The snooze timer entity for this camera
        example: "timer.front_door_camera_notifications_snooze_timer"
      notifications_boolean:
        name: Notifications Boolean
        description: The per-camera notifications input_boolean
        example: "input_boolean.front_door_camera_notifications"

    variables:
      local_image_name: >-
        "{{ camera_name | lower | replace(" ", "_") }}_alert"
      title: >-
        {{ detection_type | title }} Detected
      message: >-
        A {{ detection_type }} has been detected in {{ camera_name }}

    sequence:
      - condition: state
        entity_id: binary_sensor.somebody_just_arrived
        state: "off"

      # If the house is occupied AND a TV is ON, display on TV with snapshot
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.house_occupied
                state: "on"
              - condition: or
                conditions:
                  - condition: state
                    entity_id: media_player.sony_bravia_tv
                    state: "on"
                  - condition: state
                    entity_id: media_player.basement_tv
                    state: "on"
            sequence:
              - action: camera.snapshot
                data:
                  filename: "/config/www/images/{{ local_image_name }}.jpg"
                  entity_id: "{{ proxy_camera }}"
              - action: script.security_detection_display_notification_on_screens
                data:
                  title: "{{title}}"
                  message: "{{message}}"
                  image_path: "/config/www/images/{{ local_image_name }}.jpg"

      # House occupied + bedtime: send critical push
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.house_occupied
                state: "on"
              - condition: state
                entity_id: input_boolean.bedtime
                state: "on"
            sequence:
              - action: notify.ios_family
                metadata: {}
                data:
                  title: "{{title}}"
                  message: "{{message}}"
                  data:
                    image: "{{image_path}}"
                    entity_id: "{{ proxy_camera }}"
                    push:
                      sound:
                        name: default
                        critical: 1
                        volume: 1
                    url: /dashboard-kohbo/security-cameras
                    actions:
                      - action: "SNOOZE_{{ snooze_timer }}"
                        title: "Snooze 15 min"
                      - action: "PAUSE_{{ notifications_boolean }}"
                        title: "Pause notifications"
                      - action: "PAUSE_ALL_CAMERA_NOTIFICATIONS"
                        title: "Pause ALL camera notifications"

      # House occupied + not bedtime: send active push
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.house_occupied
                state: "on"
              - condition: state
                entity_id: input_boolean.bedtime
                state: "off"
            sequence:
              - action: notify.ios_family
                metadata: {}
                data:
                  title: "{{title}}"
                  message: "{{message}}"
                  data:
                    image: "{{image_path}}"
                    entity_id: "{{ proxy_camera }}"
                    push:
                      interruption-level: active
                    url: /dashboard-kohbo/security-cameras
                    actions:
                      - action: "SNOOZE_{{ snooze_timer }}"
                        title: "Snooze 15 min"
                      - action: "PAUSE_{{ notifications_boolean }}"
                        title: "Pause notifications"
                      - action: "PAUSE_ALL_CAMERA_NOTIFICATIONS"
                        title: "Pause ALL camera notifications"

      # Family away: send time-sensitive push
      - choose:
          - conditions:
              - condition: state
                entity_id: group.family
                state: "not_home"
            sequence:
              - action: notify.ios_family
                metadata: {}
                data:
                  title: "{{title}}"
                  message: "{{message}}"
                  data:
                    image: "{{image_path}}"
                    entity_id: "{{ proxy_camera }}"
                    push:
                      interruption-level: time-sensitive
                    url: /dashboard-kohbo/security-cameras
                    actions:
                      - action: "SNOOZE_{{ snooze_timer }}"
                        title: "Snooze 15 min"
                      - action: "PAUSE_{{ notifications_boolean }}"
                        title: "Pause notifications"
                      - action: "PAUSE_ALL_CAMERA_NOTIFICATIONS"
                        title: "Pause ALL camera notifications"

      # Dark outside + no guest + door closed >5 min: voice announcement
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.guest_mode
                state: "off"
              - condition: state
                entity_id: input_boolean.dark_outside
                state: "on"
              - condition: template
                value_template: "{{ (as_timestamp(now()) - as_timestamp(states.binary_sensor.exterior_doors.last_changed)) | int > 300 }}"
            sequence:
              - action: script.voice_announcement
                data:
                  media_players: auto
                  speech_message: "Attention: {{ message }}"
                  priority: high
                  expires_in: 2
