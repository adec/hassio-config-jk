# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

homeassistant:
  # packages: !include_dir_named include #theme
  packages: !include_dir_named packages/
  allowlist_external_dirs:
    - "/tmp"

prometheus:

# Text to speech
tts:
  - platform: picotts
    language: en-GB
#   - platform: google_translate
#     #base_url: !secret base_url
#     service_name: google_say

#group: !include groups.yaml
group: !include_dir_merge_named group
automation: !include automations.yaml
automation mine: !include_dir_list automation/
script: !include scripts.yaml
script mine: !include_dir_named scripts/
#intent_script: !include_dir_named intent_script/
intent:
intent_script: !include intents.yaml
scene: !include scenes.yaml
scene mine: !include_dir_list scenes/
notify: !include notify.yaml
# input_select: !include input_select.yaml
stream:
#proximity: !include_dir_merge_named proximity/
binary_sensor: !include_dir_merge_list binary_sensors/

input_number: !include_dir_named input_number/
input_boolean: !include_dir_named input_boolean/
input_select: !include_dir_named input_select/
# input_datetime: !include_dir_named input_datetime/
# input_text: !include_dir_named input_text/
# timer: !include_dir_named timers/
sensor: !include_dir_merge_list sensors/
switch: !include_dir_merge_list switch/

# alert: !include_dir_named alerts/

frontend:
  extra_module_url:
    - /hacsfiles/hass-hue-icons/hass-hue-icons.js
  themes: !include_dir_merge_named themes

lovelace:
  mode: storage
  dashboards:
    dashboard-kohbo:
      mode: yaml
      title: "kohbo"
      icon: mdi:home-assistant
      show_in_sidebar: true
      filename: dashboards/kohbo/kohbo.yaml
    dashboard-kohbo-rooms:
      mode: yaml
      title: "Rooms"
      icon: mdi:home-assistant
      show_in_sidebar: false
      filename: dashboards/kohbo/rooms/rooms.yaml
  

zone:
  - name: Home
    latitude: !secret home_latitude
    longitude: !secret home_longitude
    radius: !secret home_radius
    icon: mdi:home

logger:
  default: info
  logs:
    serialpy: debug

    homeassistant.core: debug
    homeassistant.components.zha: debug

    bellows.zigbee.application: debug
    bellows.ezsp: debug
    zigpy: debug
    zigpy_deconz.zigbee.application: debug
    zigpy_deconz.api: debug
    zigpy_deconz.uart: debug
    zigpy_xbee.zigbee.application: debug
    zigpy_xbee.api: debug
    zigpy_zigate: debug
    zigpy_znp: debug
    zhaquirks: debug
    asyncio: debug
    # Header Auth for HA
    custom_components.auth_header: debug

camera:
  # Main Level Vacuum
  - platform: xiaomi_cloud_map_extractor
    name: Main Level Vacuum
    host: !secret main_level_xiaomi_vacuum_host
    token: !secret main_level_xiaomi_vacuum_token
    username: !secret xiaomi_cloud_username
    password: !secret xiaomi_cloud_password
    draw: ["all"]
    scan_interval: 60
    auto_update: false
    attributes:
      - calibration_points
  #
  # Upper Level vacuum
  - platform: xiaomi_cloud_map_extractor
    name: Upper Level Vacuum
    host: !secret upper_level_xiaomi_vacuum_host
    token: !secret upper_level_xiaomi_vacuum_token
    username: !secret xiaomi_cloud_username
    password: !secret xiaomi_cloud_password
    draw: ["all"]
    scan_interval: 60
    auto_update: false
    attributes:
      - calibration_points

http:
  use_x_forwarded_for: true
  cors_allowed_origins:
    - "http://10.0.10.80:3001"
    - "http://192.168.1.0/24" 
  trusted_proxies:
    #- 192.168.1.14
    - 192.168.1.0/24

auth_header:
  # Optionally set this if you're not using authentik proxy or oauth2_proxy
  #username_header: X-Forwarded-Preferred-Username
  username_header: X-authentik-username
  # Optionally set this if you don't want to bypass the login prompt
  # allow_bypass_login: false
  # Optionally enable debug mode to see the headers Home-Assistant gets
  debug: true
