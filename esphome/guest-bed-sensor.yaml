esphome:
  name: guest-bed-sensor
  friendly_name: Nino Bed Sensor

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "2SG51n4USRmt/XdTRDY0OX2Hzfr4iPebtT9FKstmCxo="

ota:
  - platform: esphome
    password: "cb902b92d21ae07757bf3b792177aa70"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Nino-Bed-Sensor"
    password: "d8OLuEisgTVu"

captive_portal:

binary_sensor:
  - platform: template
    name: "Nino Bed Occupied"
    id: "nino_bed_occupied"
    lambda: |-
      if (id(nino_bed_left_sensor).state < id(nino_bed_trigger_level_left).state || id(nino_bed_right_sensor).state < id(nino_bed_trigger_level_right).state) {
        return true;
      } else {
        return false;
      }

sensor:
  # Left side (green/black)
  - platform: adc
    pin: GPIO34
    name: "Guest Bed Left Sensor"
    id: "nino_bed_left_sensor"
    icon: mdi:bed
    attenuation: 12db
    update_interval: 0.5s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1
      - or:
          - throttle: 180s
          - delta: 0.02

  # Right side (red)
  - platform: adc
    pin: GPIO35
    name: "Guest Bed Right Sensor"
    id: "nino_bed_right_sensor"
    icon: mdi:bed
    attenuation: 12db
    update_interval: 0.5s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1
      - or:
          - throttle: 180s
          - delta: 0.02

number:
  - platform: template
    name: "Nino Bed Trigger Level Right"
    id: "nino_bed_trigger_level_right"
    icon: mdi:arrow-collapse-down
    min_value: 0
    max_value: 3.5
    step: 0.05
    optimistic: true
    initial_value: 2.8
    restore_value: true

  - platform: template
    name: "Nino Bed Trigger Level Left"
    id: "nino_bed_trigger_level_left"
    icon: mdi:arrow-collapse-down
    min_value: 0
    max_value: 3.5
    step: 0.05
    optimistic: true
    initial_value: 2.8
    restore_value: true

    
