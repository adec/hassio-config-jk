id: "bedtime"
initial_state: "on"
alias: "Bedtime"
trigger:
  - platform: state
    entity_id:
      - input_boolean.john_is_in_bed
      - input_boolean.cristina_in_bed
    to: "on"
  # At 9pm
  - platform: time
    at: "21:00:00"
condition:
  # After 9pm and before 5am
  - condition: time
    after: "21:00:00"
    before: "05:00:00"
  - condition: and
    conditions:
      # John is in bed OR out of town
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.john_is_in_bed
            state: "on"
          # If I'm not home the house should
          # skip my bed detection
          - condition: state
            entity_id: input_boolean.john_home
            state: "off"
      # Cristina is in bed OR out of town
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.cristina_in_bed
            state: "on"
          # If Cristina's NOT HOME then the house should
          # skip my bed detection
          - condition: state
            entity_id: input_boolean.cristina_home
            state: "off"
action:
  - service: input_boolean.turn_on
    entity_id: input_boolean.bedtime
