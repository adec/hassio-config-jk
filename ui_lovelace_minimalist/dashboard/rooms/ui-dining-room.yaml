decluttering_templates:
  person_chip:
    card:
      type: custom:button-card
      entity: "[[entity]]"
      #aspect_ratio: 1/1
      name: Person
      show_entity_picture: true
      show_name: false
      tap_action:
        action: navigate
        navigation_path: "#[[id]]"
      styles:
        card:
          - background-color: transparent !important
          - background: none
          - border: none
          - width: 50px
          - height: 50px
          - overflow: visible
        entity_picture:
          - border-radius: 50%
        icon:
          - height: 100%
          - width: 100%
        custom_fields:
          status:
            - position: absolute
            - top: -13px
            - right: -13px
            - width: 80%
            - height: 80%
            - color: |
                [[[
                  if (states['[[entity]]'].state == 'home') {
                    return "green";
                  } else {
                    return "red"
                  }
                ]]]
      custom_fields:
        status: |
          [[[
            return `<ha-icon icon="mdi:circle-medium"></ha-icon>`;                          
          ]]]

title: "Dining Room"
theme: kohbo
#background: "var(--background-image)"
