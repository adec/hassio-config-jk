  GetWeather:
    description: Return the weather and notify the user
    speech:
      text: "It is currently {{ states('weather.pirateweather') }}, and {{ state_attr('weather.pirateweather','temperature') }} degrees, with {{ state_attr('weather.pirateweather','humidity') }} percent humidity now."

  Test:
    speech:
      text: "Hello!"
  Ping:
    speech:
      text: "Pong"

  WhatWeather:
    speech:
      text: "It is currently {{ states('weather.pirateweather') }}, and {{ state_attr('weather.pirateweather','temperature') }} degrees, with {{ state_attr('weather.pirateweather','humidity') }} percent humidity now."

  WhereIsJohn:
    speech:
      text: >-
        {% if states.input_boolean.john_home.state == 'on' %}
          John is in the {{ states.sensor.john_room_presence.state }}
        {% else %}
          {% if states.person.john_koht.state == 'away' %}
            John is away
          {% else %}
            John is at {{ states.person.john_koht.state }}
          {% endif %}
        {% endif %}

  WhereIsCristina:
    speech:
      text: >-
        {% if states.input_boolean.cristina_home.state == 'on' %}
          Cristina is in the {{ states.sensor.cristina_room_presence.state }}
        {% else %}
          {% if states.person.cristina_falbo.state == 'away' %}
            Cristina is away
          {% else %}
            Cristina is at {{ states.person.cristina_falbo.state }}
          {% endif %}
        {% endif %}